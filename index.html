                        <span style={{ fontSize:10, padding:'2px 7px', borderRadius:10, background: b.type==='estimated'?'#1c1917':'#0f172a', color:b.type==='estimated'?'#fb923c':'#60a5fa', border:`1px solid ${b.type==='estimated'?'#92400e':'#1e3a5f'}` }}>
                          {b.type==='estimated'?'estimated':'recurring'}
                        </span>
                      </td>
                      <td style={{ ...S.td, color:'#94a3b8' }}>{ordinal(b.dueDay)}</td>
                      <td style={{ ...S.td, color:'#60a5fa' }}>{nextDueDate(b.dueDay)}</td>
                      <td style={{ ...S.td, color:b.linkedDebtId?'#a78bfa':'#475569', fontSize:12 }}>
                        {b.linkedDebtId ? (debts.find(d=>d.id===b.linkedDebtId)?.name||b.linkedDebtId) : '—'}
                      </td>
                      <td style={{ ...S.td, whiteSpace:'nowrap' }}>
                        <button onClick={()=>startEdit(b)} style={{ ...S.btn, padding:'3px 9px', fontSize:12, color:'#60a5fa', marginRight:4 }}>Edit</button>
                        <DelBtn onDelete={()=>confirmDelete(`Remove bill "${b.name}"?`, ()=>setBills(p=>p.filter(x=>x.id!==b.id)))} title="Delete bill" />
                      </td>
                    </>
                  )}
                </tr>
              );
            })}
          </tbody>
        </table>}
        {bills.length > 0 && <div style={{ marginTop:10, fontSize:12, color:'#475569', textAlign:'right' }}>
          Total / month: <span style={{ color:'#f87171', fontWeight:600 }}>{fmt(totalMonthlyBills)}</span>
        </div>}
      </>
    ),
    categories: (
      <>
        <p style={{ fontSize:12, color:'#475569', marginBottom:12 }}>
          Default monthly allocations per category. Month Budget lets you activate and adjust these per pay period.
        </p>
        {showAddCat && (
          <div style={{ display:'flex', gap:10, flexWrap:'wrap', marginBottom:14, padding:12, background:'#0f1117', borderRadius:8, alignItems:'flex-end' }}>
            <div style={{ flex:2 }}><label style={S.lbl}>Category Name</label><input style={S.input} value={newCat.name} onChange={e=>setNewCat(f=>({...f,name:e.target.value}))} placeholder="e.g. Groceries" /></div>
            <div><label style={S.lbl}>Monthly Amount</label><input type="number" step="10" style={S.input} value={newCat.amount} onChange={e=>setNewCat(f=>({...f,amount:e.target.value}))} placeholder="0" /></div>
            <div style={{ display:'flex', gap:6 }}>
              <PrimaryBtn onClick={addCat}>Save</PrimaryBtn>
              <button style={S.btn} onClick={()=>setShowAddCat(false)}>Cancel</button>
            </div>
          </div>
        )}
        {(cats||[]).length === 0 && <EmptyState icon="fa-sliders" message="No categories yet." action={<PrimaryBtn onClick={()=>setShowAddCat(true)}>+ Add Category</PrimaryBtn>} />}
        {(cats||[]).length > 0 && <table className="resp-table" style={{ width:'100%', borderCollapse:'collapse' }}>
          <thead><tr>{['Category','Monthly Amount','Actions'].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
          <tbody>
            {(cats||[]).map(c => {
              const isEditing = editCatId === c.id;
              return (
                <tr key={c.id} style={{ borderBottom:'1px solid #0f1117', background:isEditing?'#0f1117':'transparent' }}>
                  {isEditing ? (
                    <>
                      <td style={S.td}><input style={{ ...S.input, padding:'4px 8px', fontSize:12 }} value={editCat.name} onChange={e=>setEditCat(f=>({...f,name:e.target.value}))} /></td>
                      <td style={S.td}><input type="number" step="10" style={{ ...S.input, padding:'4px 8px', fontSize:12, width:120 }} value={editCat.amount} onChange={e=>setEditCat(f=>({...f,amount:e.target.value}))} /></td>
                      <td style={{ ...S.td, whiteSpace:'nowrap' }}>
                        <PrimaryBtn onClick={saveCat} style={{ padding:'4px 10px', fontSize:12, marginRight:4 }}>Save</PrimaryBtn>
                        <button onClick={()=>setEditCatId(null)} style={{ ...S.btn, padding:'4px 10px', fontSize:12 }}>Cancel</button>
                      </td>
                    </>
                  ) : (
                    <>
                      <td style={S.td}>{c.name}</td>
                      <td style={{ ...S.td, color:'#60a5fa', fontWeight:600 }}>{fmt(c.amount)}</td>
                      <td style={{ ...S.td, whiteSpace:'nowrap', textAlign:'right' }}>
                        <button onClick={()=>{ setEditCatId(c.id); setEditCat({name:c.name,amount:String(c.amount)}); }} style={{ ...S.btn, padding:'3px 9px', fontSize:12, color:'#60a5fa', marginRight:4 }}>Edit</button>
                        <DelBtn onDelete={()=>confirmDelete(`Remove category "${c.name}"?`, ()=>setCats(p=>p.filter(x=>x.id!==c.id)))} />
                      </td>
                    </>
                  )}
                </tr>
              );
            })}
          </tbody>
        </table>}
        {(cats||[]).length > 0 && <div style={{ marginTop:10, fontSize:12, color:'#475569', textAlign:'right' }}>
          Total / month: <span style={{ color:'#60a5fa', fontWeight:600 }}>{fmt(totalMonthlyCatBudget)}</span>
        </div>}
      </>
    ),
  };

  const sectionMeta = {
    payschedule: { icon:'fa-calendar-check', title:'Pay Schedule',      accent:ACCENT.budget,  headerRight:null },
    income:      { icon:'fa-hand-holding-dollar', title:'Income Sources', accent:ACCENT.income, headerRight:<PrimaryBtn onClick={()=>setShowAddIncome(v=>!v)}>+ Add</PrimaryBtn> },
    bills:       { icon:'fa-receipt',         title:'Recurring Bills',   accent:ACCENT.bills,   headerRight:<PrimaryBtn onClick={()=>setShowAddBill(v=>!v)}>+ Add</PrimaryBtn> },
    categories:  { icon:'fa-sliders',         title:'Category Budgets',  accent:ACCENT.budget,  headerRight:<PrimaryBtn onClick={()=>setShowAddCat(v=>!v)}>+ Add</PrimaryBtn> },
  };

  return (
    <div>
      {ConfirmDialog}
      <div className="stat-row" style={{ display:'flex', gap:10, flexWrap:'wrap', marginBottom:18 }}>
        <StatCard label="Monthly Income"   value={fmt(totalMonthlyIncome)}      color={ACCENT.income}  sub="est." icon="fa-arrow-trend-up" />
        <StatCard label="Bills"            value={fmt(totalMonthlyBills)}       color={ACCENT.bills}   icon="fa-file-invoice-dollar" />
        <StatCard label="Tithing (10%)"    value={fmt(totalMonthlyTithe)}       color={ACCENT.tithe}   icon="fa-church" />
        <StatCard label="Cat. Budgets"     value={fmt(totalMonthlyCatBudget)}   color={ACCENT.budget}  sub="this month" icon="fa-sliders" />
        <StatCard label="Sinking Funds"    value={fmt(totalMonthlyFundContrib)} color={ACCENT.funds}   sub="/mo contrib." icon="fa-piggy-bank" />
        <StatCard label="Net Monthly"      value={fmtS(netMonthly)}             color={netMonthly>=0?ACCENT.income:ACCENT.bills} icon="fa-scale-balanced" />
      </div>
      {sectionOrder.map(id => {
        const meta = sectionMeta[id];
        if (!meta) return null;
        return (
          <CollapsibleCard key={id} id={id}
            icon={meta.icon} title={meta.title} accent={meta.accent}
            collapsed={!!collapsed[id]}
            onToggle={()=>toggleCollapse(id)}
            onDragStart={handleDragStart}
            onDragOver={handleDragOver}
            onDrop={handleDrop}
            onDragEnd={handleDragEnd}
            isDragOver={dragOver===id}
            headerRight={meta.headerRight}
          >
            {sectionBody[id]}
          </CollapsibleCard>
        );
      })}
    </div>
  );
}

// ── PWA Mobile Period Swiper ──────────────────────────────────────────────────
// Only rendered when running as an installed PWA (display-mode: standalone).
// Presents each pay period as a full-width swipeable card.
function MobilePeriodSwiper({
  mo, updMo, bills, income, ym, toggleBillPaid, periods,
  effectiveIncomes, numPeriods, funds, setFunds, cats, months,
  perPeriod, paid, periodBudgets, spentByPeriod, catNames,
  effectiveBillAmt, effectiveBillPeriod, setBillOverride, clearBillOverride,
  billPeriodOverrides, setSourceAmt, setRollover, setPBudget, hasPeriods,
}) {
  const [activePeriod, setActivePeriod] = useState(0);
  const [dragX,  setDragX]  = useState(0);   // live drag offset px
  const [dragging, setDragging] = useState(false);
  const startXRef = useRef(0);
  const trackRef  = useRef(null);

  // Accordion open state per section per period
  const [open, setOpen] = useState({ bills:true, cats:false, txns:false });
  const toggleOpen = key => setOpen(p => ({ ...p, [key]: !p[key] }));

  // Quick-add sheet state
  const [showSheet, setShowSheet] = useState(false);
  const defaultCat = catNames[0] || 'Food';
  const [qform, setQform] = useState({ date:today(), desc:'', cat:defaultCat, amount:'' });
  const [qerr, setQerr] = useState({});
  const addQuick = () => {
    const errs = {};
    if (!qform.desc.trim()) errs.desc = 'Required';
    if (!qform.amount || isNaN(parseFloat(qform.amount))) errs.amount = 'Required';
    if (Object.keys(errs).length) { setQerr(errs); return; }
    updMo(m=>({...m, txns:[{...qform, amount:parseFloat(qform.amount), id:uid(), periodIdx:activePeriod, recurring:'none'}, ...(m.txns||[])]}));
    setQform({ date:today(), desc:'', cat:defaultCat, amount:'' });
    setQerr({});
    setShowSheet(false);
  };
  const suggestions = React.useMemo(() => buildSuggestions(months||{}), [months]);

  // Touch swipe handlers
  const onTouchStart = e => {
    startXRef.current = e.touches[0].clientX;
    setDragging(true);
    setDragX(0);
  };
  const onTouchMove = e => {
    if (!dragging) return;
    const dx = e.touches[0].clientX - startXRef.current;
    // Resist at edges
    const atStart = activePeriod === 0 && dx > 0;
    const atEnd   = activePeriod === numPeriods - 1 && dx < 0;
    setDragX(atStart || atEnd ? dx * 0.25 : dx);
  };
  const onTouchEnd = () => {
    setDragging(false);
    const threshold = 60;
    if (dragX < -threshold && activePeriod < numPeriods - 1) setActivePeriod(p => p + 1);
    else if (dragX > threshold && activePeriod > 0) setActivePeriod(p => p - 1);
    setDragX(0);
  };

  const translateX = -(activePeriod * 100) + (dragX / (trackRef.current?.offsetWidth || 390)) * 100;

  const pp = perPeriod[activePeriod];
  const p  = periods[activePeriod];
  const usedPct = pp.totalInc > 0 ? Math.min(100, (pp.used/pp.totalInc)*100) : 0;
  const pBills = [...pp.pBills].sort((a,b)=>(a.dueDay||0)-(b.dueDay||0));
  const pBudgets = periodBudgets[activePeriod] || {};
  const pTxns = (mo.txns||[]).filter(t=>(t.periodIdx??0)===activePeriod).sort((a,b)=>b.date.localeCompare(a.date));
  const pSpent = spentByPeriod[activePeriod] || {};

  // Velocity for current period
  const todayD = new Date();
  let dayPct = null;
  if (p) {
    const end = new Date(p.payDate.getTime() + 13*86400000);
    if (todayD >= p.payDate && todayD <= end) dayPct = (todayD - p.payDate) / (end - p.payDate) * 100;
    else if (todayD > end) dayPct = 100;
  }

  // Shared section style — no border-radius on sides, bleeds edge to edge
  const SEC = { background:'#1e293b', marginBottom:2, width:'100%' };
  const HDR = { display:'flex', justifyContent:'space-between', alignItems:'center',
                padding:'16px 16px', cursor:'pointer', userSelect:'none' };

  return (
    <div style={{ position:'relative', width:'100%', overflowX:'hidden' }}>

      {/* ── Balance hero — swipeable ── */}
      <div ref={trackRef} style={{ overflow:'hidden', width:'100%', touchAction:'pan-y' }}
        onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>
        <div style={{ display:'flex', transition: dragging?'none':'transform 0.3s cubic-bezier(.4,0,.2,1)',
                      transform:`translateX(calc(${-activePeriod*100}% + ${dragX}px))` }}>
          {Array.from({length:numPeriods}, (_,pi) => {
            const ppi = perPeriod[pi];
            const pp_p = periods[pi];
            const uPct = ppi.totalInc>0 ? Math.min(100,(ppi.used/ppi.totalInc)*100) : 0;
            return (
              <div key={pi} style={{ flex:'0 0 100%', width:'100%', background:'#1e293b', padding:'20px 16px 18px' }}>
                {/* Period label */}
                <div style={{ fontSize:12, color:'#64748b', marginBottom:8, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                  <span style={{ textTransform:'uppercase', letterSpacing:'0.07em' }}>
                    Period {pi+1}{pp_p ? ` · ${pp_p.dateLabel}` : ''}
                  </span>
                  {numPeriods > 1 && (
                    <div style={{ display:'flex', gap:6 }}>
                      {Array.from({length:numPeriods},(_,di)=>(
                        <div key={di} onClick={()=>setActivePeriod(di)}
                          style={{ width:7, height:7, borderRadius:'50%', cursor:'pointer',
                            background: di===activePeriod?'#3b82f6':'#334155',
                            transform: di===activePeriod?'scale(1.4)':'scale(1)',
                            transition:'all 0.2s' }} />
                      ))}
                    </div>
                  )}
                </div>

                {/* BIG remaining balance */}
                <div style={{ marginBottom:16 }}>
                  <div style={{ fontSize:13, color:'#94a3b8', marginBottom:4 }}>Remaining</div>
                  <div style={{ fontSize:52, fontWeight:900, color:ppi.remaining>=0?'#34d399':'#f87171',
                                lineHeight:1, letterSpacing:'-0.02em' }}>
                    {fmtS(ppi.remaining)}
                  </div>
                  {ppi.unpaidAmt > 0 && (
                    <div style={{ fontSize:13, color:'#fbbf24', marginTop:6 }}>
                      ⚠ {fmt(ppi.unpaidAmt)} in unpaid bills
                    </div>
                  )}
                </div>

                {/* Progress bar */}
                <div style={{ height:8, background:'#0f1117', borderRadius:4, overflow:'hidden', marginBottom:16 }}>
                  <div style={{ height:'100%', borderRadius:4, transition:'width 0.4s',
                                width:`${uPct}%`, background:ppi.remaining>=0?'#3b82f6':'#f87171' }} />
                </div>

                {/* 3 stat tiles */}
                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:8 }}>
                  {[
                    { label:'Bills paid',  value:fmt(ppi.paidBillAmt),  sub:`of ${fmt(ppi.billsTotal-ppi.tithe)}`, color:'#f87171' },
                    { label:'Spent',       value:fmt(ppi.txnSpent),      sub:`${(mo.txns||[]).filter(t=>(t.periodIdx??0)===pi).length} txns`, color:'#fbbf24' },
                    { label:'Estimated',   value:fmtS(ppi.estimated),    sub:'after all',  color:ppi.estimated>=0?'#60a5fa':'#f87171' },
                  ].map(({label,value,sub,color}) => (
                    <div key={label} style={{ background:'#0f1117', borderRadius:10, padding:'12px 8px', textAlign:'center' }}>
                      <div style={{ fontSize:11, color:'#64748b', marginBottom:4, textTransform:'uppercase', letterSpacing:'0.05em' }}>{label}</div>
                      <div style={{ fontSize:17, fontWeight:800, color }}>{value}</div>
                      <div style={{ fontSize:10, color:'#334155', marginTop:3 }}>{sub}</div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* ── Bills ── */}
      <div style={SEC}>
        <div style={HDR} onClick={()=>toggleOpen('bills')}>
          <span style={{ fontSize:17, fontWeight:700, color:'#e2e8f0', display:'flex', alignItems:'center', gap:10 }}>
            <i className="fa-solid fa-receipt" style={{ color:ACCENT.bills }} />
            Bills
            <span style={{ fontSize:14, color:pp.unpaidAmt>0?'#fbbf24':'#34d399', fontWeight:500 }}>
              {pBills.filter(b=>paid[b.id]).length}/{pBills.length} paid
            </span>
          </span>
          <i className={`fa-solid fa-chevron-${open.bills?'up':'down'}`} style={{ color:'#475569' }} />
        </div>
        {open.bills && (
          <div style={{ paddingBottom:8 }}>
            {pBills.length === 0 && <div style={{ color:'#475569', fontSize:15, padding:'10px 16px' }}>No bills this period</div>}
            {pBills.map(b => (
              <div key={b.id} onClick={()=>toggleBillPaid(b.id)}
                style={{ display:'flex', alignItems:'center', gap:14, padding:'14px 16px',
                         borderTop:'1px solid #0f1117', cursor:'pointer',
                         background: paid[b.id] ? '#0f1117' : 'transparent' }}>
                {/* Custom checkbox */}
                <div style={{ width:28, height:28, borderRadius:8, flexShrink:0, display:'flex',
                              alignItems:'center', justifyContent:'center',
                              background: paid[b.id]?'#3b82f6':'transparent',
                              border: paid[b.id]?'2px solid #3b82f6':'2px solid #334155',
                              transition:'all 0.15s' }}>
                  {paid[b.id] && <i className="fa-solid fa-check" style={{ fontSize:14, color:'#fff' }} />}
                </div>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:17, fontWeight:600,
                                color:paid[b.id]?'#475569':'#e2e8f0',
                                textDecoration:paid[b.id]?'line-through':'none',
                                overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                    {b.name}
                  </div>
                  {b.dueDay && <div style={{ fontSize:13, color:'#64748b', marginTop:2 }}>Due {ordinal(b.dueDay)}</div>}
                </div>
                <div style={{ fontSize:18, fontWeight:700, color:paid[b.id]?'#334155':'#e2e8f0', flexShrink:0 }}>
                  {fmt(effectiveBillAmt(b))}
                </div>
              </div>
            ))}
            <div style={{ display:'flex', justifyContent:'space-between', padding:'12px 16px',
                          borderTop:'1px solid #0f1117', fontSize:14, color:'#475569' }}>
              <span>Bills total</span>
              <span style={{ color:'#f87171', fontWeight:700, fontSize:16 }}>{fmt(pp.billsTotal - pp.tithe)}</span>
            </div>
          </div>
        )}
      </div>

      {/* ── Category Budgets ── */}
      {Object.keys(pBudgets).length > 0 && (
        <div style={SEC}>
          <div style={HDR} onClick={()=>toggleOpen('cats')}>
            <span style={{ fontSize:17, fontWeight:700, color:'#e2e8f0', display:'flex', alignItems:'center', gap:10 }}>
              <i className="fa-solid fa-sliders" style={{ color:ACCENT.budget }} />
              Budgets
            </span>
            <i className={`fa-solid fa-chevron-${open.cats?'up':'down'}`} style={{ color:'#475569' }} />
          </div>
          {open.cats && (
            <div style={{ paddingBottom:8 }}>
              {Object.entries(pBudgets).map(([cat, limit]) => {
                const spent = pSpent[cat]||0;
                const pct = limit>0 ? (spent/limit)*100 : 0;
                const velocity = dayPct!==null && limit>0 ? pct/(dayPct||1) : null;
                const hot = velocity!==null && velocity>1.25 && pct<100;
                const color = pct>90?'#f87171':pct>70?'#fbbf24':'#34d399';
                return (
                  <div key={cat} style={{ padding:'12px 16px', borderTop:'1px solid #0f1117' }}>
                    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:8 }}>
                      <span style={{ fontSize:17, fontWeight:700, color:'#e2e8f0' }}>{cat}{hot?' 🔥':''}</span>
                      <span style={{ fontSize:15, color, fontWeight:700 }}>
                        {fmt(spent)}<span style={{ color:'#475569', fontWeight:400, fontSize:13 }}> / {fmt(limit)}</span>
                      </span>
                    </div>
                    <div style={{ position:'relative', height:10, background:'#0f1117', borderRadius:5, overflow:'hidden', marginBottom:6 }}>
                      {dayPct!==null && <div style={{ position:'absolute', left:0, top:0, height:'100%', background:'#334155', borderRadius:5, width:`${Math.min(100,dayPct)}%` }} />}
                      <div style={{ position:'absolute', left:0, top:0, height:'100%', background:color, borderRadius:5, transition:'width 0.4s', width:`${Math.min(100,pct)}%` }} />
                    </div>
                    <div style={{ fontSize:13, color:'#64748b', textAlign:'right' }}>{fmt(Math.max(0,limit-spent))} left</div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* ── Transactions ── */}
      <div style={{ ...SEC, marginBottom:100 }}>
        <div style={HDR} onClick={()=>toggleOpen('txns')}>
          <span style={{ fontSize:17, fontWeight:700, color:'#e2e8f0', display:'flex', alignItems:'center', gap:10 }}>
            <i className="fa-solid fa-list-ul" style={{ color:ACCENT.budget }} />
            Transactions
            <span style={{ fontSize:14, color:'#475569', fontWeight:400 }}>{pTxns.length}</span>
          </span>
          <i className={`fa-solid fa-chevron-${open.txns?'up':'down'}`} style={{ color:'#475569' }} />
        </div>
        {open.txns && (
          <div style={{ paddingBottom:8 }}>
            {pTxns.length===0 && <div style={{ color:'#475569', fontSize:15, padding:'10px 16px' }}>No transactions yet</div>}
            {pTxns.map(t => (
              <div key={t.id} style={{ display:'flex', alignItems:'center', gap:12,
                                       padding:'14px 16px', borderTop:'1px solid #0f1117' }}>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:17, fontWeight:600, color:'#e2e8f0',
                                overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{t.desc}</div>
                  <div style={{ fontSize:13, color:'#64748b', marginTop:3 }}>{t.date} · {t.cat}</div>
                </div>
                <span style={{ fontSize:18, fontWeight:800, flexShrink:0,
                               color:t.amount<0?'#34d399':'#fbbf24' }}>
                  {t.amount<0?'+':''}{fmt(Math.abs(t.amount))}
                </span>
              </div>
            ))}
            {pTxns.length>0 && (
              <div style={{ display:'flex', justifyContent:'space-between', padding:'12px 16px',
                            borderTop:'1px solid #0f1117', fontSize:14, color:'#475569' }}>
                <span>Total</span>
                <span style={{ color:'#fbbf24', fontWeight:700, fontSize:16 }}>
                  {fmtS(pTxns.reduce((s,t)=>s+t.amount,0))}
                </span>
              </div>
            )}
          </div>
        )}
      </div>

      {/* Floating Add button */}
      <button className="pwa-fab" onClick={()=>{ setShowSheet(true); setQerr({}); }}>
        <i className="fa-solid fa-plus" />
      </button>

      {/* Quick-add bottom sheet */}
      {showSheet && (
        <div className="pwa-sheet-bg" onClick={e=>{ if(e.target===e.currentTarget) setShowSheet(false); }}>
          <div className="pwa-sheet">
            <div className="pwa-sheet-handle" />
            <div style={{ fontSize:17, fontWeight:700, color:'#e2e8f0', marginBottom:18 }}>Add Transaction · P{activePeriod+1}</div>
            <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
              <div>
                <label style={S.lbl}>Date</label>
                <input type="date" value={qform.date} onChange={e=>setQform(f=>({...f,date:e.target.value}))}
                  style={{ ...S.input, fontSize:16, padding:'12px 14px' }} />
              </div>
              <div>
                <label style={S.lbl}>Description</label>
                <input type="text" placeholder="Merchant / note" value={qform.desc}
                  onChange={e=>{ setQform(f=>({...f,desc:e.target.value})); setQerr(p=>({...p,desc:null})); }}
                  style={{ ...S.input, fontSize:16, padding:'12px 14px', ...(qerr.desc?{borderColor:'#ef4444'}:{}) }} />
                {qerr.desc && <div className="field-error-msg">{qerr.desc}</div>}
                {/* Suggestions */}
                {qform.desc.trim().length > 0 && (() => {
                  const sugg = suggestions.filter(s=>s.desc.toLowerCase().includes(qform.desc.toLowerCase().trim())).slice(0,4);
                  return sugg.length > 0 ? (
                    <div style={{ display:'flex', gap:6, flexWrap:'wrap', marginTop:8 }}>
                      {sugg.map((s,i)=>(
                        <button key={i} onMouseDown={()=>setQform(f=>({...f,desc:s.desc,cat:catNames.includes(s.cat)?s.cat:f.cat,amount:s.lastAmount?String(s.lastAmount):f.amount}))}
                          style={{ ...S.btn, fontSize:12, padding:'5px 10px', color:'#93c5fd', background:'#1e3a5f' }}>
                          {s.desc}
                        </button>
                      ))}
                    </div>
                  ) : null;
                })()}
              </div>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
                <div>
                  <label style={S.lbl}>Category</label>
                  <select value={qform.cat} onChange={e=>setQform(f=>({...f,cat:e.target.value}))}
                    style={{ ...S.input, fontSize:16, padding:'12px 14px' }}>
                    {catNames.map(c=><option key={c}>{c}</option>)}
                  </select>
                </div>
                <div>
                  <label style={S.lbl}>Amount <span style={{ color:'#334155' }}>(− ok)</span></label>
                  <input type="number" step="0.01" placeholder="0.00" value={qform.amount}
                    onChange={e=>{ setQform(f=>({...f,amount:e.target.value})); setQerr(p=>({...p,amount:null})); }}
                    style={{ ...S.input, fontSize:16, padding:'12px 14px', ...(qerr.amount?{borderColor:'#ef4444'}:{}) }} />
                  {qerr.amount && <div className="field-error-msg">{qerr.amount}</div>}
                </div>
              </div>
              <button onClick={addQuick}
                style={{ ...S.btn, background:'#3b82f6', color:'#fff', fontWeight:700, fontSize:17, padding:'15px', borderRadius:12, width:'100%', marginTop:4 }}>
                Add Transaction
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Month Budget ──────────────────────────────────────────────────────────────
// viewMode: 'split' = side-by-side columns (original)
//           'focus:0', 'focus:1', 'focus:2' = single period, full width
//           'all' = all periods stacked full-width (good for mobile)
function MonthBudget({ mo, updMo, bills, income, ym, toggleBillPaid, periods, effectiveIncomes, numPeriods, funds, setFunds, cats, months }) {
  const isPWA = useIsPWA();
  const [viewMode, setViewMode] = useState(() => {
    try { return localStorage.getItem('bgt_view_mode') || 'split'; } catch { return 'split'; }
  });
  const setView = v => { setViewMode(v); try { localStorage.setItem('bgt_view_mode', v); } catch {} };

  const focusPeriod = viewMode.startsWith('focus:') ? parseInt(viewMode.split(':')[1]) : null;
  // Which period indices to render
  const visiblePeriods = focusPeriod !== null
    ? [Math.min(focusPeriod, numPeriods - 1)]
    : Array.from({ length: numPeriods }, (_, i) => i);

  // Cat/txn tab follows focus period in focus mode; otherwise user-controlled
  const [catPeriodTab, setCatPeriodTab] = useState(0);
  const safeTab = focusPeriod !== null
    ? Math.min(focusPeriod, numPeriods - 1)
    : Math.min(catPeriodTab, numPeriods - 1);
  const [dragBillId, setDragBillId] = useState(null);
  const [dropTarget, setDropTarget] = useState(null);
  const paid    = mo.paid || {};
  const periodBudgets = mo.periodBudgets || makePeriodBudgets(numPeriods);
  const txns    = mo.txns || [];

  // Spend per category per period
  const spentByPeriod = {};
  for (let i=0;i<numPeriods;i++) { spentByPeriod[i]={}; (cats||[]).forEach(c=>{spentByPeriod[i][c.name]=0;}); }
  txns.forEach(t => {
    const pi = t.periodIdx??0;
    if (!spentByPeriod[pi]) spentByPeriod[pi]={};
    spentByPeriod[pi][t.cat]=(spentByPeriod[pi][t.cat]||0)+t.amount;
  });
  const totalSpent = txns.reduce((s,t)=>s+t.amount,0);

  // Per-month estimated bill amount overrides
  const estAmts = mo.estimatedBillAmounts || {};
  const effectiveBillAmt = b => b.type === 'estimated' ? (estAmts[b.id] ?? b.amount) : b.amount;
  const setEstAmt = (billId, v) => updMo(m => ({ ...m, estimatedBillAmounts: { ...(m.estimatedBillAmounts||{}), [billId]: parseFloat(v)||0 } }));

  // Per-month bill period overrides (drag-and-drop)
  const billPeriodOverrides = mo.billPeriodOverrides || {};
  const effectiveBillPeriod = (b) => {
    if (billPeriodOverrides[b.id] !== undefined) return billPeriodOverrides[b.id];
    if (hasPeriods) return billPeriodIdx(b, periods);
    return (b.period||1)-1;
  };
  const setBillOverride = (billId, periodIdx) => updMo(m => ({ ...m, billPeriodOverrides: { ...(m.billPeriodOverrides||{}), [billId]: periodIdx } }));
  const clearBillOverride = (billId) => updMo(m => { const o={...(m.billPeriodOverrides||{})}; delete o[billId]; return {...m, billPeriodOverrides:o}; });

  // Per-period derived values
  // If we have computed periods (anchor set), use billPeriodIdx; otherwise fall back to bill.period-1
  const hasPeriods = periods.length > 0;

  const perPeriod = effectiveIncomes.map((pi, i) => {
    // If per-source amounts exist use their sum, otherwise fall back to stored earned
    const sourceAmts = pi.sources
      ? income.map(s => ({ ...s, periodAmt: pi.sources[s.id] ?? s.amount }))
      : income.map(s => ({ ...s, periodAmt: s.amount }));
    const earned   = sourceAmts.reduce((sum, s) => sum + s.periodAmt, 0);
    const rollover = pi.rollover || 0;
    const tithe    = earned * 0.1;
    const totalInc = earned + rollover;

    const pBills = bills.filter(b => effectiveBillPeriod(b) === i);

    const billsTotal  = pBills.reduce((s,b)=>s+effectiveBillAmt(b),0) + tithe;
    const paidBillAmt = pBills.filter(b=>paid[b.id]).reduce((s,b)=>s+effectiveBillAmt(b),0);
    const txnSpent    = txns.filter(t=>t.periodIdx===i).reduce((s,t)=>s+t.amount,0);

    // Sum deposits made to any sinking fund from this period
    const fundSource = `budget:${ym}:P${i+1}`;
    const fundContrib = (funds||[]).reduce((s,f) =>
      s + (f.txns||[]).filter(t=>t.source===fundSource).reduce((a,t)=>a+t.amount,0), 0);

    const used        = tithe + paidBillAmt + txnSpent + fundContrib;
    const remaining   = totalInc - used;
    const unpaidAmt   = pBills.filter(b=>!paid[b.id]).reduce((s,b)=>s+effectiveBillAmt(b),0);

    // Remaining (unspent) category budget for this period
    const pBudgets = periodBudgets[i] || {};
    const pSpent   = spentByPeriod[i] || {};
    const remainingCatBudget = Object.entries(pBudgets).reduce((s,[cat,limit]) => s + (limit - (pSpent[cat]||0)), 0);

    // Estimated = starting balance minus ALL bills (paid+unpaid), transactions, fund contributions, and unspent category budgets
    const estimated = totalInc - billsTotal - txnSpent - fundContrib - remainingCatBudget;

    return { earned, rollover, tithe, totalInc, pBills, billsTotal, paidBillAmt, txnSpent, fundContrib, used, remaining, unpaidAmt, sourceAmts, remainingCatBudget, estimated };
  });

  const totalInc       = perPeriod.reduce((s,p)=>s+p.totalInc,0);
  const totalBills     = perPeriod.reduce((s,p)=>s+p.billsTotal,0);
  const totalCatBudget = Object.values(periodBudgets).reduce((s,pb)=>s+Object.values(pb).reduce((a,v)=>a+v,0),0);
  const totalFundContrib = perPeriod.reduce((s,p)=>s+p.fundContrib,0);
  const unallocated    = totalInc - totalBills - totalCatBudget - totalFundContrib;

  const setSourceAmt = (i, srcId, v) => updMo(m => {
    const pi = [...(m.periodIncomes||[])];
    const cur = pi[i] || {};
    const sources = { ...(cur.sources||{}), [srcId]: parseFloat(v)||0 };
    const earned = Object.values(sources).reduce((s,x)=>s+x, 0);
    pi[i] = { ...cur, sources, earned };
    return { ...m, periodIncomes: pi };
  });
  const setRollover = (i,v) => updMo(m => { const pi=[...(m.periodIncomes||[])]; pi[i]={...(pi[i]||{}), rollover:parseFloat(v)||0}; return {...m, periodIncomes:pi}; });
  const setPBudget  = (pi,cat,v) => updMo(m=>{ const pb={...(m.periodBudgets||makePeriodBudgets(numPeriods))}; pb[pi]={...(pb[pi]||{}), [cat]:parseFloat(v)||0}; return {...m,periodBudgets:pb}; });
  const removePCat  = (pi,cat) => updMo(m=>{ const pb={...(m.periodBudgets||makePeriodBudgets(numPeriods))}; const p={...(pb[pi]||{})}; delete p[cat]; pb[pi]=p; return {...m,periodBudgets:pb}; });
  const addPCat     = (pi,cat) => updMo(m=>{ const pb={...(m.periodBudgets||makePeriodBudgets(numPeriods))}; pb[pi]={...(pb[pi]||{}), [cat]:0}; return {...m,periodBudgets:pb}; });
  const activeCatTab = periodBudgets[safeTab] || {};
  const catNames = (cats||[]).map(c=>c.name);
  const unusedCats = catNames.filter(c=>!activeCatTab[c]);

  // Grid: focus/all = 1 col full width; split = side-by-side with horizontal scroll
  const gridCols = (viewMode === 'split')
    ? `repeat(${numPeriods}, minmax(300px,1fr))`
    : '1fr';

  // ── PWA: render the simplified swiper instead ──────────────────────────────
  if (isPWA) {
    return (
      <MobilePeriodSwiper
        mo={mo} updMo={updMo} bills={bills} income={income} ym={ym}
        toggleBillPaid={toggleBillPaid} periods={periods}
        effectiveIncomes={effectiveIncomes} numPeriods={numPeriods}
        funds={funds} setFunds={setFunds} cats={cats} months={months}
        perPeriod={perPeriod} paid={paid} periodBudgets={periodBudgets}
        spentByPeriod={spentByPeriod} catNames={catNames}
        effectiveBillAmt={effectiveBillAmt} effectiveBillPeriod={effectiveBillPeriod}
        setBillOverride={setBillOverride} clearBillOverride={clearBillOverride}
        billPeriodOverrides={billPeriodOverrides}
        setSourceAmt={setSourceAmt} setRollover={setRollover}
        setPBudget={setPBudget} hasPeriods={hasPeriods}
      />
    );
  }

  return (
    <div>
      {/* View mode toggle + zero-budget tally */}
      <div style={{ background:'#1e293b', borderRadius:12, padding:'11px 16px', marginBottom:14 }}>
        {/* Toggle bar — horizontally scrollable on mobile */}
        <div style={{ overflowX:'auto', overflowY:'visible', WebkitOverflowScrolling:'touch', scrollbarWidth:'none', marginBottom:10 }}>
          <div style={{ display:'flex', gap:5, alignItems:'center', minWidth:'max-content' }}>
            <span style={{ fontSize:11, color:'#475569', textTransform:'uppercase', letterSpacing:'0.05em', marginRight:2, flexShrink:0 }}>View</span>
            {/* Split */}
            <button onClick={()=>setView('split')}
              style={{ ...S.btn, padding:'5px 11px', fontSize:12, display:'flex', alignItems:'center', gap:5, flexShrink:0,
                background: viewMode==='split' ? '#1d4ed8' : '#0f1117',
                color: viewMode==='split' ? '#93c5fd' : '#64748b',
                border: `1px solid ${viewMode==='split'?'#3b82f6':'#1e293b'}` }}>
              <i className="fa-solid fa-table-columns" style={{ fontSize:11 }} />
              Split
            </button>
            {/* Focus: one button per period */}
            {Array.from({ length: numPeriods }, (_, i) => {
              const active = viewMode === `focus:${i}`;
              const p = periods[i];
              return (
                <button key={i} onClick={()=>setView(`focus:${i}`)}
                  style={{ ...S.btn, padding:'5px 11px', fontSize:12, display:'flex', alignItems:'center', gap:5, flexShrink:0,
                    background: active ? '#1d4ed8' : '#0f1117',
                    color: active ? '#93c5fd' : '#64748b',
                    border: `1px solid ${active?'#3b82f6':'#1e293b'}` }}>
                  <i className="fa-solid fa-expand" style={{ fontSize:10 }} />
                  <span>P{i+1}</span>
                  {p && <span style={{ fontSize:10, color: active?'#60a5fa':'#334155', marginLeft:2 }}>{p.dateLabel}</span>}
                </button>
              );
            })}
            {/* All stacked */}
            <button onClick={()=>setView('all')}
              style={{ ...S.btn, padding:'5px 11px', fontSize:12, display:'flex', alignItems:'center', gap:5, flexShrink:0,
                background: viewMode==='all' ? '#1d4ed8' : '#0f1117',
                color: viewMode==='all' ? '#93c5fd' : '#64748b',
                border: `1px solid ${viewMode==='all'?'#3b82f6':'#1e293b'}` }}>
              <i className="fa-solid fa-list" style={{ fontSize:11 }} />
              All
            </button>
          </div>
        </div>
        {/* Zero-budget tally */}
        <div style={{ display:'flex', gap:8, flexWrap:'wrap', alignItems:'center', paddingTop:8, borderTop:'1px solid #0f1117' }}>
          <span style={{ color:'#34d399', fontWeight:700 }}>{fmt(totalInc)}</span>
          <span style={{ color:'#475569' }}>income</span>
          <span style={{ color:'#475569' }}>−</span>
          <span style={{ color:'#f87171', fontWeight:700 }}>{fmt(totalBills)}</span>
          <span style={{ color:'#475569' }}>bills</span>
          <span style={{ color:'#475569' }}>−</span>
          <span style={{ color:'#fbbf24', fontWeight:700 }}>{fmt(totalCatBudget)}</span>
          <span style={{ color:'#475569' }}>budgeted</span>
          <span style={{ color:'#475569' }}>=</span>
          <span style={{ fontWeight:700, fontSize:16, color:Math.abs(unallocated)<1?'#34d399':unallocated>0?'#fbbf24':'#f87171' }}>{fmtS(unallocated)}</span>
          <span style={{ color:'#475569', fontSize:12 }}>{Math.abs(unallocated)<1?'✓ zero-based':unallocated>0?'unallocated':'over budget'}</span>
          <span style={{ marginLeft:'auto', color:'#475569', fontSize:12 }}>spent: {fmt(totalSpent)}</span>
        </div>
      </div>

      {!hasPeriods && (
        <div style={{ background:'#1c1408', border:'1px solid #78350f', borderRadius:10, padding:'10px 16px', marginBottom:14, fontSize:12, color:'#fbbf24' }}>
          ⚠ No pay schedule set — go to Overview → Pay Schedule and enter an anchor pay date to auto-calculate pay periods for each month (including 3-paycheck months).
        </div>
      )}

      {/* Pay period columns */}
      <div className="period-grid" style={{ display:'grid', gridTemplateColumns:gridCols, gap:14, marginBottom:14, overflowX: viewMode==='split' ? 'auto' : 'visible' }}>
        {visiblePeriods.map(i => {
          const pp = perPeriod[i];
          const p = periods[i];
          const usedPct = pp.totalInc > 0 ? Math.min(100, (pp.used/pp.totalInc)*100) : 0;
          const barColor = pp.remaining >= 0 ? '#3b82f6' : '#f87171';
          const isDrop = dropTarget === i && dragBillId !== null;
          return (
            <div key={i}
              className={focusPeriod !== null ? 'period-focus-card' : ''}
              style={{ ...S.card, outline: isDrop ? '2px dashed #3b82f6' : '2px solid transparent', transition:'outline 0.1s' }}
              onDragOver={e=>{ e.preventDefault(); setDropTarget(i); }}
              onDragLeave={()=>setDropTarget(null)}
              onDrop={e=>{ e.preventDefault(); if(dragBillId) setBillOverride(dragBillId, i); setDragBillId(null); setDropTarget(null); }}
            >
              {/* Header */}
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 }}>
                <h3 style={{ fontSize:13, fontWeight:700, color:'#60a5fa', textTransform:'uppercase', letterSpacing:'0.05em' }}>Period {i+1}</h3>
                <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                  {p && <span style={{ fontSize:11, color:'#475569' }}>{p.dateLabel}</span>}
                  {/* In focus mode: quick-jump arrows to switch focused period */}
                  {focusPeriod !== null && (
                    <div style={{ display:'flex', gap:2 }}>
                      {i > 0 && <button onClick={()=>setView(`focus:${i-1}`)} style={{ ...S.btn, padding:'2px 7px', fontSize:10, color:'#475569' }}><i className="fa-solid fa-chevron-left" /></button>}
                      {i < numPeriods-1 && <button onClick={()=>setView(`focus:${i+1}`)} style={{ ...S.btn, padding:'2px 7px', fontSize:10, color:'#475569' }}><i className="fa-solid fa-chevron-right" /></button>}
                      <button onClick={()=>setView('split')} title="Back to split view" style={{ ...S.btn, padding:'2px 7px', fontSize:10, color:'#475569' }}><i className="fa-solid fa-table-columns" /></button>
                    </div>
                  )}
                </div>
              </div>

              {/* Balance box */}
              <div style={{ background:'#0f1117', borderRadius:8, padding:'10px 12px', marginBottom:12 }}>
                <div className="bal-row" style={{ display:'flex', justifyContent:'space-between', marginBottom:5, fontSize:11, color:'#475569' }}>
                  <span>Starting balance</span>
                  <span style={{ fontWeight:600, color:'#94a3b8' }}>{fmt(pp.totalInc)}</span>
                </div>
                <div className="bal-row" style={{ display:'flex', justifyContent:'space-between', marginBottom:4, fontSize:11, color:'#475569' }}>
                  <span>Tithing</span><span style={{ color:'#fbbf24' }}>−{fmt(pp.tithe)}</span>
                </div>
                <div className="bal-row" style={{ display:'flex', justifyContent:'space-between', marginBottom:4, fontSize:11, color:'#475569' }}>
                  <span>Paid bills</span><span style={{ color:'#f87171' }}>−{fmt(pp.paidBillAmt)}</span>
                </div>
                <div className="bal-row" style={{ display:'flex', justifyContent:'space-between', marginBottom:4, fontSize:11, color:'#475569' }}>
                  <span>Transactions</span><span style={{ color:'#fbbf24' }}>−{fmt(pp.txnSpent)}</span>
                </div>
                {pp.fundContrib > 0 && (
                  <div className="bal-row" style={{ display:'flex', justifyContent:'space-between', marginBottom:4, fontSize:11, color:'#475569' }}>
                    <span>Sinking funds</span><span style={{ color:'#a78bfa' }}>−{fmt(pp.fundContrib)}</span>
                  </div>
                )}
                <ProgressBar pct={usedPct} color={barColor} />
                <div style={{ display:'flex', justifyContent:'space-between', marginTop:6 }}>
                  <span style={{ fontSize:12, fontWeight:600 }}>Remaining</span>
                  <span className="bal-remaining-val" style={{ fontSize:17, fontWeight:700, color:pp.remaining>=0?'#34d399':'#f87171' }}>{fmtS(pp.remaining)}</span>
                </div>
                <div style={{ display:'flex', justifyContent:'space-between', marginTop:4, paddingTop:4, borderTop:'1px solid #1e293b' }}>
                  <span style={{ fontSize:11, color:'#64748b' }}>Estimated<span className="bal-estimate-note" style={{ color:'#334155' }}> (after all bills & budgets)</span></span>
                  <span className="bal-estimated-val" style={{ fontSize:13, fontWeight:600, color:pp.estimated>=0?'#60a5fa':'#f87171' }}>{fmtS(pp.estimated)}</span>
                </div>
                {pp.unpaidAmt > 0 && (
                  <div className="bal-row" style={{ marginTop:5, fontSize:11, color:'#fbbf24' }}>⚠ {fmt(pp.unpaidAmt)} in unpaid bills pending</div>
                )}
              </div>

              {/* Income */}
              <div style={{ marginBottom:12 }}>
                <div className="period-section-lbl" style={{ fontSize:11, color:'#475569', textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:6 }}>Income</div>
                {pp.sourceAmts.map(src => (
                  <div key={src.id} style={{ display:'flex', alignItems:'center', gap:8, marginBottom:5 }}>
                    <span className="inc-src-name" style={{ fontSize:11, color:'#94a3b8', flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{src.name}</span>
                    <input type="number" step="0.01" value={src.periodAmt} onChange={e=>setSourceAmt(i, src.id, e.target.value)}
                      style={{ ...S.input, width:110, textAlign:'right', fontSize:12, padding:'4px 8px' }} />
                  </div>
                ))}
                <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:5 }}>
                  <span style={{ fontSize:11, color:'#94a3b8', flex:1 }}>Rollover</span>
                  <input type="number" step="0.01" value={pp.rollover} onChange={e=>setRollover(i,e.target.value)}
                    style={{ ...S.input, width:110, textAlign:'right', fontSize:12, padding:'4px 8px' }} />
                </div>
                <div style={{ display:'flex', justifyContent:'space-between', fontSize:11, color:'#94a3b8', paddingTop:5, borderTop:'1px solid #0f1117' }}>
                  <span>Tithing (10%)</span>
                  <span style={{ color:'#fbbf24' }}>{fmt(pp.tithe)}</span>
                </div>
              </div>

              {/* Bills */}
              <div>
                <div className="period-section-lbl" style={{ fontSize:11, color:'#475569', textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:5 }}>Bills</div>
                {pp.pBills.length===0 && <div style={{ fontSize:12, color:'#334155', padding:'6px 0' }}>No bills this period</div>}
                {[...pp.pBills].sort((a,b)=>(a.dueDay||0)-(b.dueDay||0)).map(b=>{
                  const isOverridden = billPeriodOverrides[b.id] !== undefined;
                  const isDragging = dragBillId === b.id;
                  return (
                  <div key={b.id} draggable
                    onDragStart={()=>setDragBillId(b.id)}
                    onDragEnd={()=>{ setDragBillId(null); setDropTarget(null); }}
                    className="bill-row"
                    style={{ display:'flex', alignItems:'center', gap:8, padding:'5px 0', borderBottom:'1px solid #0f1117', opacity:isDragging?0.4:1, cursor:'grab' }}>
                    <span style={{ fontSize:13, color:'#334155', flexShrink:0, cursor:'grab' }}>⠿</span>
                    <input type="checkbox" checked={!!paid[b.id]} onChange={()=>toggleBillPaid(b.id)} style={{ cursor:'pointer', width:20, height:20 }} />
                    <span className="bill-row" style={{ flex:1, fontSize:13, color:paid[b.id]?'#475569':'#e2e8f0', textDecoration:paid[b.id]?'line-through':'none', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                      {b.name}{b.dueDay&&<span style={{ color:'#94a3b8', fontSize:11, marginLeft:4 }}>({ordinal(b.dueDay)})</span>}
                      {b.type==='estimated'&&<span className="bill-badge" style={{ fontSize:9, color:'#fb923c', marginLeft:4, background:'#1c1917', padding:'1px 4px', borderRadius:4 }}>est</span>}
                      {isOverridden&&<span className="bill-badge" style={{ fontSize:9, color:'#60a5fa', marginLeft:4, background:'#0f172a', padding:'1px 4px', borderRadius:4 }}>moved</span>}
                    </span>
                    {b.linkedDebtId&&<span style={{ fontSize:10, color:'#a78bfa' }}>⟳</span>}
                    {/* Move-to selector: works via tap on mobile (replaces drag-only UX) */}
                    {numPeriods > 1 && (
                      <select
                        value={effectiveBillPeriod(b)}
                        onChange={e => {
                          const target = +e.target.value;
                          if (target === effectiveBillPeriod(b)) return;
                          setBillOverride(b.id, target);
                        }}
                        title="Move to period"
                        style={{ ...S.input, width:54, fontSize:10, padding:'2px 4px', color:'#475569', background:'#0f1117', flexShrink:0 }}>
                        {Array.from({length:numPeriods},(_,pi)=>(
                          <option key={pi} value={pi}>P{pi+1}</option>
                        ))}
                      </select>
                    )}
                    {isOverridden&&<button onClick={()=>clearBillOverride(b.id)} title="Reset to default period" style={{ ...S.btn, padding:'1px 5px', fontSize:10, color:'#475569', background:'transparent', flexShrink:0 }}>↺</button>}
                    {b.type==='estimated' ? (
                      <input type="number" step="0.01" value={effectiveBillAmt(b)} onChange={e=>setEstAmt(b.id,e.target.value)}
                        style={{ ...S.input, width:80, fontSize:11, padding:'2px 6px', textAlign:'right', color:'#fb923c', border:'1px solid #92400e' }} />
                    ) : (
                      <span style={{ fontSize:12, color:paid[b.id]?'#475569':'#e2e8f0', whiteSpace:'nowrap' }}>{fmt(effectiveBillAmt(b))}</span>
                    )}
                  </div>
                  );
                })}
                <div style={{ display:'flex', justifyContent:'space-between', fontSize:12, marginTop:6, paddingTop:5, borderTop:'1px solid #0f1117' }}>
                  <span style={{ color:'#475569' }}>Bills total</span>
                  <span style={{ color:'#f87171', fontWeight:600 }}>{fmt(pp.billsTotal)}</span>
                </div>
              </div>

              {/* Sinking Fund Contributions */}
              {funds && funds.length > 0 && (
                <SinkingFundContributions
                  funds={funds}
                  setFunds={setFunds}
                  ym={ym}
                  periodIdx={i}
                />
              )}
            </div>
          );
        })}
      </div>

      {/* Category Budgets — per period */}
      <div style={S.card}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
          <SectionHeader icon="fa-sliders" title="Category Budgets" accent={ACCENT.budget} />
          <div style={{ display:'flex', gap:6, alignItems:'center' }}>
            {/* Copy last month button */}
            {(() => {
              const prevYm = adjMonth(ym, -1);
              const prevMo = months[prevYm] ? migrateMonth(months[prevYm]) : null;
              const hasPrev = prevMo && Object.keys(prevMo.periodBudgets||{}).length > 0;
              const isEmpty = Object.values(periodBudgets).every(pb => Object.keys(pb).length === 0);
              if (!hasPrev) return null;
              return (
                <button title={`Copy budgets from ${monthLabel(prevYm)}`}
                  onClick={() => updMo(m => ({ ...m, periodBudgets: JSON.parse(JSON.stringify(prevMo.periodBudgets)) }))}
                  style={{ ...S.btn, fontSize:11, padding:'4px 10px', color:'#60a5fa', background:'#0f172a', border:'1px solid #1e3a5f' }}>
                  <i className="fa-solid fa-copy" style={{ marginRight:4 }} />Copy last month
                </button>
              );
            })()}
            {/* Only show period tabs when not in focus mode (focus mode auto-syncs) */}
            {focusPeriod === null && (
              <div style={{ display:'flex', gap:4 }}>
                {Array.from({length:numPeriods},(_,i)=>(
                  <button key={i} onClick={()=>setCatPeriodTab(i)}
                    style={{ ...S.btn, padding:'4px 12px', fontSize:12,
                      background:safeTab===i?'#3b82f6':'#0f1117',
                      color:safeTab===i?'#fff':'#94a3b8',
                      fontWeight:safeTab===i?600:400 }}>
                    P{i+1}
                  </button>
                ))}
              </div>
            )}
            {focusPeriod !== null && (
              <span style={{ fontSize:11, color:'#60a5fa', padding:'4px 10px', background:'#0f172a', border:'1px solid #1e3a5f', borderRadius:7 }}>
                Period {focusPeriod+1} · {periods[focusPeriod]?.dateLabel||''}
              </span>
            )}
          </div>
        </div>
        {(() => {
          // Velocity: how far through the period are we today?
          const activePeriodInfo = periods[safeTab];
          let dayPct = null;
          if (activePeriodInfo) {
            const todayD = new Date();
            const start  = activePeriodInfo.payDate;
            const end    = new Date(start.getTime() + 13 * 86400000);
            if (todayD >= start && todayD <= end) {
              dayPct = (todayD - start) / (end - start) * 100;
            } else if (todayD > end) {
              dayPct = 100;
            }
          }
          return (
            <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(255px,1fr))', gap:12 }}>
              {Object.entries(activeCatTab).map(([cat,limit])=>{
                const s=(spentByPeriod[safeTab]||{})[cat]||0;
                const pct=limit>0?(s/limit)*100:0;
                // Velocity: flag if spending pace exceeds time elapsed in period
                const velocity = dayPct !== null && limit > 0 ? pct / (dayPct || 1) : null;
                const isRunningHot = velocity !== null && velocity > 1.25 && pct < 100;
                const color = pct > 90 ? '#f87171' : pct > 70 ? '#fbbf24' : '#34d399';
                return (
                  <div key={cat} style={{ background:'#0f1117', borderRadius:8, padding:12, border: isRunningHot ? '1px solid #7c2d12' : '1px solid transparent' }}>
                    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6 }}>
                      <span className="cat-card-name" style={{ fontSize:13, fontWeight:600 }}>{cat}
                        {isRunningHot && <span title={`Spending ${Math.round(velocity*100)}% of pace — ${Math.round(pct)}% spent with ${Math.round(dayPct)}% of period elapsed`} style={{ marginLeft:6, fontSize:10, color:'#fb923c', cursor:'default' }}>🔥</span>}
                      </span>
                      <button onClick={()=>removePCat(safeTab,cat)} title="Remove from this period" style={{ ...S.btn, padding:'4px 7px', color:'#475569', background:'transparent' }}><i className="fa-solid fa-xmark" style={{ fontSize:11 }} /></button>
                    </div>
                    <div style={{ display:'flex', gap:8, alignItems:'center', marginBottom:6 }}>
                      <span style={{ fontSize:11, color:'#475569' }}>Budget:</span>
                      <input type="number" step="50" value={limit} onChange={e=>setPBudget(safeTab,cat,e.target.value)} style={{ ...S.input, width:90, fontSize:12, padding:'4px 8px', textAlign:'right' }} />
                    </div>
                    {/* Dual progress: grey = time elapsed, colored = spend */}
                    <div style={{ position:'relative', height:7, background:'#1e293b', borderRadius:4, overflow:'hidden' }}>
                      {dayPct !== null && <div style={{ position:'absolute', left:0, top:0, width:`${Math.min(100,dayPct)}%`, height:'100%', background:'#334155', borderRadius:4 }} />}
                      <div style={{ position:'absolute', left:0, top:0, width:`${Math.min(100,pct)}%`, height:'100%', background:color, borderRadius:4, transition:'width 0.4s ease' }} />
                    </div>
                    <div className="cat-card-stat" style={{ display:'flex', justifyContent:'space-between', fontSize:11, marginTop:5, color:'#94a3b8' }}>
                      <span>Spent: <span style={{ color }}>{fmt(s)}</span></span>
                      <span>Left: <span style={{ color:limit-s>=0?'#34d399':'#f87171' }}>{fmtS(limit-s)}</span></span>
                    </div>
                    {isRunningHot && <div style={{ fontSize:10, color:'#fb923c', marginTop:4 }}>Pace: {Math.round(pct)}% spent, {Math.round(dayPct)}% of period elapsed</div>}
                  </div>
                );
              })}
            </div>
          );
        })()}
        {unusedCats.length>0 && (
          <div style={{ marginTop:12, display:'flex', gap:6, flexWrap:'wrap' }}>
            <span style={{ fontSize:11, color:'#475569', alignSelf:'center' }}>Add to P{safeTab+1}:</span>
            {unusedCats.map(c=><button key={c} onClick={()=>addPCat(safeTab,c)} style={{ ...S.btn, padding:'4px 10px', fontSize:12, color:'#94a3b8' }}>+ {c}</button>)}
          </div>
        )}
      </div>

      {/* Transactions */}
      <TransactionLog mo={mo} updMo={updMo} periods={periods} numPeriods={numPeriods} cats={cats} months={months} focusPeriod={focusPeriod} />
    </div>
  );
}

function TransactionLog({ mo, updMo, periods, numPeriods, cats, months, focusPeriod }) {
  const n = Math.max(numPeriods, 2);
  const [activePeriodLocal, setActivePeriodLocal] = useState(0);
  // In focus mode the active period is locked to the focused period
  const activePeriod = focusPeriod !== null ? Math.min(focusPeriod, numPeriods-1) : activePeriodLocal;
  const setActivePeriod = focusPeriod !== null ? ()=>{} : setActivePeriodLocal;
  const catNames = (cats||[]).map(c=>c.name);
  const defaultCat = catNames[0] || 'Food';
  const [form, setForm] = useState({ date:today(), desc:'', comment:'', cat:defaultCat, amount:'', recurring:'none' });
  const [formErrors, setFormErrors] = useState({});
  const [editId, setEditId] = useState(null);
  const [editForm, setEditForm] = useState({});
  const [filterText,    setFilterText]    = useState('');
  const [filterCat,     setFilterCat]     = useState('');
  const [filterDateFrom,setFilterDateFrom] = useState('');
  const [filterDateTo,  setFilterDateTo]   = useState('');
  const [showSuggestions, setShowSuggestions] = useState(false);
  const [showImport, setShowImport] = useState(false);
  const [selected, setSelected] = useState(new Set()); // bulk select
  const { ask: confirmBulkDel, Dialog: BulkDelDialog } = useConfirm();
  const txns = mo.txns || [];
  const suggestions = React.useMemo(() => buildSuggestions(months||{}), [months]);

  const filteredSuggestions = form.desc.trim().length > 0
    ? suggestions.filter(s => s.desc.toLowerCase().includes(form.desc.toLowerCase().trim())).slice(0, 6)
    : [];

  const validate = () => {
    const errs = {};
    if (!form.desc.trim()) errs.desc = 'Required';
    if (form.amount === '' || isNaN(parseFloat(form.amount))) errs.amount = 'Enter an amount (can be negative for transfers/refunds)';
    setFormErrors(errs);
    return Object.keys(errs).length === 0;
  };

  const add = () => {
    if (!validate()) return;
    updMo(m=>({...m, txns:[{...form, amount:parseFloat(form.amount), id:uid(), periodIdx:activePeriod, recurring:form.recurring||'none'}, ...(m.txns||[])]}));
    setForm(f=>({...f, desc:'', comment:'', amount:'', recurring:'none'}));
    setFormErrors({});
    setShowSuggestions(false);
  };
  const del = id => updMo(m=>({...m, txns:(m.txns||[]).filter(t=>t.id!==id)}));
  const delBulk = ids => { updMo(m=>({...m, txns:(m.txns||[]).filter(t=>!ids.has(t.id))})); setSelected(new Set()); };
  const startEdit = t => { setEditId(t.id); setEditForm({...t, amount:String(t.amount), periodIdx:String(t.periodIdx??0), comment:t.comment||'', recurring:t.recurring||'none'}); };
  const saveEdit = () => {
    updMo(m=>({...m, txns:(m.txns||[]).map(t=>t.id!==editId?t:{...editForm,amount:parseFloat(editForm.amount)||0,periodIdx:+editForm.periodIdx})}));
    setEditId(null);
  };
  const toggleSelect = id => setSelected(prev => { const s=new Set(prev); s.has(id)?s.delete(id):s.add(id); return s; });
  const selectAllVisible = () => setSelected(new Set(visible.map(t=>t.id)));
  const clearSelect = () => setSelected(new Set());

  const ftxt = filterText.toLowerCase();
  const hasFilter = !!(filterText || filterCat || filterDateFrom || filterDateTo);
  const visible = txns.filter(t => {
    if ((t.periodIdx??0) !== activePeriod) return false;
    if (filterCat && t.cat !== filterCat) return false;
    if (filterDateFrom && t.date < filterDateFrom) return false;
    if (filterDateTo   && t.date > filterDateTo)   return false;
    if (ftxt && !t.desc.toLowerCase().includes(ftxt) && !(t.comment||'').toLowerCase().includes(ftxt)) return false;
    return true;
  });
  const visibleTotal = visible.reduce((s,t)=>s+t.amount,0);
  const periodLabel = i => periods[i] ? `P${i+1} · ${periods[i].dateLabel}` : `Period ${i+1}`;

  const importTxns = (rows) => {
    updMo(m => ({ ...m, txns: [...rows, ...(m.txns||[])] }));
  };

  // Recurring suggestions: find recurring txns from previous months and show un-added ones
  const recurringDue = React.useMemo(() => {
    const seen = new Map();
    Object.entries(months||{}).forEach(([mym, raw]) => {
      if (mym >= (mo._ym||'')) return; // only past months
      try {
        const m2 = migrateMonth(raw);
        (m2.txns||[]).filter(t=>t.recurring && t.recurring!=='none').forEach(t => {
          const k = t.desc.toLowerCase().trim();
          if (!seen.has(k) || mym > seen.get(k).ym) seen.set(k, { ...t, ym:mym });
        });
      } catch {}
    });
    // Filter to ones not yet added this month/period
    const thisMonthDescs = new Set(txns.filter(t=>(t.periodIdx??0)===activePeriod).map(t=>t.desc.toLowerCase().trim()));
    return [...seen.values()].filter(t => !thisMonthDescs.has(t.desc.toLowerCase().trim())).slice(0, 5);
  }, [months, txns, activePeriod]);

  return (
    <div style={S.card}>
      {/* Header with period tabs */}
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10, flexWrap:'wrap', gap:8 }}>
        <SectionHeader icon="fa-list-ul" title="Transactions" accent={ACCENT.budget} />
        <div style={{ display:'flex', gap:6, alignItems:'center', flexWrap:'wrap' }}>
          <button onClick={()=>setShowImport(v=>!v)} style={{ ...S.btn, fontSize:11, padding:'4px 9px', color:'#a78bfa' }}>
            <i className="fa-solid fa-upload" style={{ marginRight:4 }} />Import
          </button>
          {focusPeriod !== null ? (
            <span style={{ fontSize:11, color:'#60a5fa', padding:'4px 10px', background:'#0f172a', border:'1px solid #1e3a5f', borderRadius:7 }}>
              Period {focusPeriod+1} · {periods[focusPeriod]?.dateLabel||''}
            </span>
          ) : (
            <div className="period-tabs" style={{ display:'flex', gap:4 }}>
              {Array.from({length:n},(_,i)=>(
                <button key={i} onClick={()=>{ setActivePeriod(i); setEditId(null); }}
                  style={{ ...S.btn, padding:'4px 10px', fontSize:12, flexShrink:0,
                    background:activePeriod===i?'#3b82f6':'#0f1117',
                    color:activePeriod===i?'#fff':'#94a3b8',
                    fontWeight:activePeriod===i?600:400 }}>
                  P{i+1}<span style={{ fontSize:10, opacity:0.7, marginLeft:4, display:'inline' }} className="tab-label">{periods[i]?periods[i].dateLabel:''}</span>
                </button>
              ))}
            </div>
          )}
        </div>
      </div>

      {BulkDelDialog}
      {/* CSV Import panel */}
      {showImport && <CSVImporter catNames={catNames} activePeriod={activePeriod} onImport={rows=>{ importTxns(rows); setShowImport(false); }} onCancel={()=>setShowImport(false)} />}

      {/* Recurring suggestions banner */}
      {recurringDue.length > 0 && (
        <div style={{ background:'#0c1a2e', border:'1px solid #1e3a5f', borderRadius:8, padding:'8px 12px', marginBottom:10, fontSize:12, color:'#93c5fd' }}>
          <span style={{ fontWeight:600, marginRight:8 }}><i className="fa-solid fa-rotate" style={{ marginRight:5 }} />Recurring due:</span>
          {recurringDue.map(t => (
            <button key={t.id} onMouseDown={()=>{ setForm(f=>({...f,desc:t.desc,cat:catNames.includes(t.cat)?t.cat:f.cat,amount:String(t.amount),recurring:t.recurring||'none'})); }}
              style={{ ...S.btn, fontSize:11, padding:'2px 8px', color:'#93c5fd', background:'#1e3a5f', marginRight:5, marginTop:2 }}>
              {t.desc} · {fmt(t.amount)}
            </button>
          ))}
        </div>
      )}

      {/* Add form */}
      <div className="txn-form-grid" style={{ display:'grid', gridTemplateColumns:'110px 1fr 110px 80px 90px auto', gap:8, marginBottom:6, alignItems:'end' }}>
        <div><label style={S.lbl}>Date</label><input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} style={S.input} /></div>
        <div style={{ position:'relative' }}>
          <label style={S.lbl}>Description</label>
          <input type="text" placeholder="Merchant / note" value={form.desc}
            onChange={e=>{ setForm(f=>({...f,desc:e.target.value})); setShowSuggestions(true); setFormErrors(p=>({...p,desc:null})); }}
            onBlur={()=>setTimeout(()=>setShowSuggestions(false),150)}
            onFocus={()=>setShowSuggestions(true)}
            onKeyDown={e=>{ if(e.key==='Enter') add(); if(e.key==='Escape') setShowSuggestions(false); }}
            style={{ ...S.input, ...(formErrors.desc?{borderColor:'#ef4444'}:{}) }} autoComplete="off" />
          {formErrors.desc && <div className="field-error-msg">{formErrors.desc}</div>}
          {showSuggestions && filteredSuggestions.length > 0 && (
            <div style={{ position:'absolute', top:'100%', left:0, right:0, zIndex:100, background:'#1e293b', border:'1px solid #334155', borderRadius:8, boxShadow:'0 8px 24px rgba(0,0,0,0.4)', marginTop:2 }}>
              {filteredSuggestions.map((s,i) => (
                <div key={i} onMouseDown={()=>{ setForm(f=>({...f,desc:s.desc,cat:catNames.includes(s.cat)?s.cat:f.cat,amount:s.lastAmount?String(s.lastAmount):f.amount})); setShowSuggestions(false); }}
                  style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'8px 12px', cursor:'pointer', borderBottom:'1px solid #0f1117', fontSize:13 }}
                  onMouseEnter={e=>e.currentTarget.style.background='#334155'}
                  onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                  <span>{s.desc}</span>
                  <span style={{ fontSize:11, color:'#60a5fa', marginLeft:8 }}>{s.cat}{s.lastAmount?` · ${fmt(s.lastAmount)}`:''}</span>
                </div>
              ))}
            </div>
          )}
        </div>
        <div>
          <label style={S.lbl}>Category</label>
          <select value={form.cat} onChange={e=>setForm(f=>({...f,cat:e.target.value}))} style={S.input}>
            {catNames.map(c=><option key={c}>{c}</option>)}
          </select>
        </div>
        <div>
          <label style={S.lbl}>Repeat</label>
          <select value={form.recurring} onChange={e=>setForm(f=>({...f,recurring:e.target.value}))} style={S.input}>
            <option value="none">Once</option>
            <option value="monthly">Monthly</option>
            <option value="biweekly">Biweekly</option>
            <option value="weekly">Weekly</option>
          </select>
        </div>
        <div>
          <label style={S.lbl}>Amount <span style={{ color:'#334155', fontWeight:400 }}>(− ok)</span></label>
          <input type="number" step="0.01" placeholder="0.00" value={form.amount}
            onChange={e=>{ setForm(f=>({...f,amount:e.target.value})); setFormErrors(p=>({...p,amount:null})); }}
            onKeyDown={e=>e.key==='Enter'&&add()}
            style={{ ...S.input, color: parseFloat(form.amount) < 0 ? '#34d399' : '#e2e8f0', ...(formErrors.amount?{borderColor:'#ef4444'}:{}) }} />
          {formErrors.amount && <div className="field-error-msg">{formErrors.amount}</div>}
        </div>
        <div className="txn-form-add-btn" style={{ paddingBottom:1 }}><PrimaryBtn onClick={add} style={{ width:'100%' }}>+ Add</PrimaryBtn></div>
      </div>
      <div style={{ marginBottom:10 }}>
        <input type="text" placeholder="Comment (optional)" value={form.comment} onChange={e=>setForm(f=>({...f,comment:e.target.value}))} style={{ ...S.input, fontSize:12 }} />
      </div>

      {/* Filter bar */}
      <div style={{ display:'flex', gap:8, flexWrap:'wrap', marginBottom:6, padding:'10px 12px', background:'#0f1117', borderRadius:8, alignItems:'center' }}>
        <span style={{ fontSize:11, color:'#475569', flexShrink:0 }}>Filter:</span>
        {/* Text search */}
        <input type="text" placeholder="Search description…" value={filterText} onChange={e=>setFilterText(e.target.value)}
          style={{ ...S.input, flex:2, minWidth:130, fontSize:12, padding:'5px 9px' }} />
        {/* Category */}
        <select value={filterCat} onChange={e=>setFilterCat(e.target.value)} style={{ ...S.input, width:120, fontSize:12, padding:'5px 9px' }}>
          <option value="">All categories</option>
          {catNames.map(c=><option key={c}>{c}</option>)}
        </select>
        {/* Date range */}
        <div style={{ display:'flex', alignItems:'center', gap:4 }}>
          <span style={{ fontSize:11, color:'#475569', flexShrink:0 }}>From</span>
          <input type="date" value={filterDateFrom} onChange={e=>setFilterDateFrom(e.target.value)}
            style={{ ...S.input, width:130, fontSize:12, padding:'5px 9px' }} />
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:4 }}>
          <span style={{ fontSize:11, color:'#475569', flexShrink:0 }}>To</span>
          <input type="date" value={filterDateTo} onChange={e=>setFilterDateTo(e.target.value)}
            style={{ ...S.input, width:130, fontSize:12, padding:'5px 9px' }} />
        </div>
        {hasFilter && (
          <button onClick={()=>{ setFilterText(''); setFilterCat(''); setFilterDateFrom(''); setFilterDateTo(''); }}
            style={{ ...S.btn, fontSize:11, color:'#94a3b8', padding:'5px 10px' }}>
            <i className="fa-solid fa-xmark" style={{ marginRight:4 }} />Clear
          </button>
        )}
        <span style={{ fontSize:11, color:'#475569', marginLeft:'auto', flexShrink:0 }}>{visible.length} txn{visible.length!==1?'s':''}</span>
      </div>

      {/* Bulk select toolbar */}
      {visible.length > 0 && (
        <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:8, fontSize:12, color:'#475569' }}>
          <input type="checkbox" checked={selected.size > 0 && selected.size === visible.length}
            onChange={e => e.target.checked ? selectAllVisible() : clearSelect()} style={{ width:14, height:14 }} />
          {selected.size > 0 ? (
            <>
              <span style={{ color:'#e2e8f0' }}>{selected.size} selected</span>
              <button onClick={()=>confirmBulkDel(`Delete ${selected.size} transaction${selected.size>1?'s':''}? This cannot be undone.`, ()=>delBulk(selected))}
                style={{ ...S.btn, padding:'3px 10px', fontSize:11, background:'#450a0a', color:'#f87171' }}>
                <i className="fa-solid fa-trash-can" style={{ marginRight:4 }} />Delete selected
              </button>
              <button onClick={clearSelect} style={{ ...S.btn, padding:'3px 8px', fontSize:11, color:'#94a3b8' }}>Clear</button>
            </>
          ) : <span>Select all</span>}
        </div>
      )}

      {visible.length===0 && <div style={{ color:'#475569', textAlign:'center', padding:'24px 0', fontSize:13 }}><i className="fa-solid fa-receipt" style={{ marginRight:6, opacity:0.4 }} />No transactions for {periodLabel(activePeriod)}</div>}
      {visible.map(t=>{
        if (editId===t.id) return (
          <div key={t.id} style={{ background:'#0f1117', borderRadius:8, padding:'8px', marginBottom:4 }}>
            <div style={{ display:'flex', gap:6, flexWrap:'wrap', marginBottom:6, alignItems:'center' }}>
              <input type="date" value={editForm.date} onChange={e=>setEditForm(f=>({...f,date:e.target.value}))} style={{ ...S.input, width:130, fontSize:12, padding:'4px 8px' }} />
              <input type="text" value={editForm.desc} onChange={e=>setEditForm(f=>({...f,desc:e.target.value}))} style={{ ...S.input, flex:1, minWidth:120, fontSize:12, padding:'4px 8px' }} />
              <select value={editForm.cat} onChange={e=>setEditForm(f=>({...f,cat:e.target.value}))} style={{ ...S.input, width:110, fontSize:12, padding:'4px 8px' }}>
                {catNames.map(c=><option key={c}>{c}</option>)}
              </select>
              <input type="number" step="0.01" value={editForm.amount} onChange={e=>setEditForm(f=>({...f,amount:e.target.value}))} style={{ ...S.input, width:90, fontSize:12, padding:'4px 8px', textAlign:'right' }} />
            </div>
            <div style={{ display:'flex', gap:6, alignItems:'center', flexWrap:'wrap' }}>

// ── CSV Importer ──────────────────────────────────────────────────────────────
function CSVImporter({ catNames, activePeriod, onImport, onCancel }) {
  const [step, setStep] = useState('upload'); // upload | map | preview
  const [headers, setHeaders] = useState([]);
  const [rawRows, setRawRows] = useState([]);
  const [mapping, setMapping] = useState({ date:'-1', desc:'-1', amount:'-1', negate:false });
  const [preview, setPreview] = useState([]);
  const defaultCat = catNames[0] || 'Misc';

  const handleFile = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const rows = parseCSV(ev.target.result);
      if (rows.length < 2) return;
      setHeaders(rows[0]);
      setRawRows(rows.slice(1));
      // Auto-detect common column names
      const h = rows[0].map(s => s.toLowerCase().trim());
      const di = h.findIndex(x => ['date','transaction date','trans date','posted date'].includes(x));
      const dsi = h.findIndex(x => ['description','memo','payee','merchant','name'].includes(x));
      const ai = h.findIndex(x => ['amount','transaction amount','debit','charge'].includes(x));
      setMapping({ date:String(di>=0?di:-1), desc:String(dsi>=0?dsi:-1), amount:String(ai>=0?ai:-1), negate:false });
      setStep('map');
    };
    reader.readAsText(file);
  };

  const buildPreview = () => {
    const di=+mapping.date, dsi=+mapping.desc, ai=+mapping.amount;
    if (di<0||dsi<0||ai<0) return;
    const rows = rawRows.map(r => {
      const rawAmt = parseFloat((r[ai]||'').replace(/[$,]/g,''));
      const amt = mapping.negate ? -rawAmt : rawAmt;
      return { id:uid(), date:r[di]||today(), desc:r[dsi]||'', comment:'', cat:defaultCat, amount:Math.abs(amt), periodIdx:activePeriod, _sign:amt };
    }).filter(r => !isNaN(r.amount) && r.amount > 0);
    setPreview(rows);
    setStep('preview');
  };

  const [catOverrides, setCatOverride] = React.useState({});
  const finalRows = preview.map((r,i) => ({ ...r, cat: catOverrides[i] || r.cat }));

  if (step === 'upload') return (
    <div style={{ background:'#0f1117', borderRadius:10, padding:16, marginBottom:14, border:'1px solid #334155' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
        <span style={{ fontSize:13, fontWeight:600, color:'#a78bfa' }}><i className="fa-solid fa-upload" style={{ marginRight:6 }} />Import from Bank CSV</span>
        <button onClick={onCancel} style={{ ...S.btn, padding:'2px 8px', fontSize:12, color:'#94a3b8' }}>✕</button>
      </div>
      <p style={{ fontSize:12, color:'#475569', marginBottom:10 }}>Download a CSV from your bank and upload it here. Most banks export CSV from the account history page.</p>
      <input type="file" accept=".csv,.txt" onChange={handleFile} style={{ fontSize:12, color:'#e2e8f0' }} />
    </div>
  );

  if (step === 'map') return (
    <div style={{ background:'#0f1117', borderRadius:10, padding:16, marginBottom:14, border:'1px solid #334155' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
        <span style={{ fontSize:13, fontWeight:600, color:'#a78bfa' }}>Map Columns</span>
        <button onClick={onCancel} style={{ ...S.btn, padding:'2px 8px', fontSize:12, color:'#94a3b8' }}>✕</button>
      </div>
      <p style={{ fontSize:12, color:'#475569', marginBottom:10 }}>{rawRows.length} rows detected. Map the CSV columns to transaction fields.</p>
      <div style={{ display:'flex', gap:12, flexWrap:'wrap', marginBottom:12 }}>
        {[['date','Date'],['desc','Description'],['amount','Amount']].map(([key,label]) => (
          <div key={key}>
            <label style={S.lbl}>{label} column</label>
            <select value={mapping[key]} onChange={e=>setMapping(m=>({...m,[key]:e.target.value}))} style={{ ...S.input, width:200 }}>
              <option value="-1">— select —</option>
              {headers.map((h,i) => <option key={i} value={i}>{h || `Column ${i+1}`}</option>)}
            </select>
          </div>
        ))}
        <div style={{ display:'flex', alignItems:'flex-end', gap:6, paddingBottom:2 }}>
          <input type="checkbox" id="negate" checked={mapping.negate} onChange={e=>setMapping(m=>({...m,negate:e.target.checked}))} />
          <label htmlFor="negate" style={{ fontSize:12, color:'#94a3b8', cursor:'pointer' }}>Negate amounts (bank shows negatives as positive)</label>
        </div>
      </div>
      <div style={{ display:'flex', gap:8 }}>
        <PrimaryBtn onClick={buildPreview} style={{ background:'#7c3aed' }}>Preview →</PrimaryBtn>
        <button onClick={onCancel} style={S.btn}>Cancel</button>
      </div>
    </div>
  );

  return (
    <div style={{ background:'#0f1117', borderRadius:10, padding:16, marginBottom:14, border:'1px solid #334155' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
        <span style={{ fontSize:13, fontWeight:600, color:'#a78bfa' }}>Preview — {finalRows.length} transactions</span>
        <button onClick={onCancel} style={{ ...S.btn, padding:'2px 8px', fontSize:12, color:'#94a3b8' }}>✕</button>
      </div>
      <div style={{ maxHeight:280, overflowY:'auto', marginBottom:12 }}>
        <div className="csv-preview-grid" style={{ display:'grid', gridTemplateColumns:'110px 1fr 140px 90px', gap:6, padding:'4px 0', borderBottom:'1px solid #1e293b', marginBottom:4 }}>
          {['Date','Description','Category','Amount'].map(h=><span key={h} style={{ fontSize:10, color:'#334155', textTransform:'uppercase' }}>{h}</span>)}
        </div>
        {finalRows.map((r,i) => (
          <div key={i} className="csv-preview-grid" style={{ display:'grid', gridTemplateColumns:'110px 1fr 140px 90px', gap:6, padding:'5px 0', borderBottom:'1px solid #0f1117', fontSize:12, alignItems:'center' }}>
            <span style={{ color:'#475569' }}>{r.date}</span>
            <span style={{ overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{r.desc}</span>
            <select value={finalRows[i].cat} onChange={e=>setCatOverride(p=>({...p,[i]:e.target.value}))} style={{ ...S.input, fontSize:11, padding:'2px 6px' }}>
              {catNames.map(c=><option key={c}>{c}</option>)}
            </select>
            <span style={{ color:'#fbbf24', fontWeight:600, textAlign:'right' }}>{fmt(r.amount)}</span>
          </div>
        ))}
      </div>
      <div style={{ display:'flex', gap:8 }}>
        <PrimaryBtn onClick={()=>onImport(finalRows)} style={{ background:'#7c3aed' }}><i className="fa-solid fa-check" style={{ marginRight:6 }} />Import {finalRows.length} transactions</PrimaryBtn>
        <button onClick={()=>setStep('map')} style={S.btn}>← Back</button>
        <button onClick={onCancel} style={S.btn}>Cancel</button>
      </div>
    </div>
  );
}
