const db   = firebase.firestore();

function userDoc(_uid) { return db.collection('budgets').doc('shared'); }

// Saves a single field to Firestore (debounced 800ms to batch rapid edits)
const saveTimers = {};
function saveField(uid, field, value) {
  clearTimeout(saveTimers[field]);
  saveTimers[field] = setTimeout(() => {
    userDoc(uid).set({ [field]: JSON.stringify(value) }, { merge: true }).catch(console.error);
  }, 800);
}

// useDB: syncs a value to Firestore under the shared doc.
function useDB(key, init, uid) {
  const [val, setVal] = useState(init);
  const loaded = useRef(false);
  const uidRef = useRef(uid);
  uidRef.current = uid;

  useEffect(() => {
    loaded.current = false;
    if (!uid) return;
    userDoc(uid).get().then(snap => {
      if (snap.exists && snap.data()[key] !== undefined) {
        try { setVal(JSON.parse(snap.data()[key])); } catch {}
      } else {
        // First sign-in: migrate from localStorage
        try {
          const s = localStorage.getItem(key);
          if (s) { const v = JSON.parse(s); setVal(v); userDoc(uid).set({ [key]: JSON.stringify(v) }, { merge: true }); }
        } catch {}
      }
      loaded.current = true;
    }).catch(console.error);
  }, [uid, key]);

  const set = useCallback(updater => {
    setVal(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      if (uidRef.current && loaded.current) saveField(uidRef.current, key, next);
      return next;
    });
  }, [key]);

  return [val, set];
}

// ── Auth state ────────────────────────────────────────────────────────────────
function useAuth() {

  useEffect(() => auth.onAuthStateChanged(u => setUser(u || null)), []);
  return user;

const fmt  = n => '$' + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits:2, maximumFractionDigits:2 });
const fmtS = n => (n < 0 ? '-' : '') + fmt(n);
const uid  = () => Math.random().toString(36).slice(2, 9);
const today = () => new Date().toISOString().slice(0, 10);
function curYM()  { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
function adjMonth(ym, d) { const [y,m] = ym.split('-'); const dt = new Date(+y,+m-1+d); return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`; }
function monthLabel(ym) { const [y,m] = ym.split('-'); return new Date(y,m-1).toLocaleString('default',{month:'long',year:'numeric'}); }
function ordinal(n) { if (!n) return '—'; const s=['th','st','nd','rd']; const v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); }
function freqMonthly(f, amt) { if (f==='biweekly') return amt*26/12; if (f==='weekly') return amt*52/12; return amt; }
function shortDate(d) { return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }

// ── Pay-period calendar math ──────────────────────────────────────────────────
// Returns Date objects for every pay date that falls within the given ym.
function getPayDatesInMonth(anchorDate, ym) {
  if (!anchorDate) return [];
  const anchor = new Date(anchorDate + 'T12:00:00');
  const [y,m] = ym.split('-').map(Number);
  const monthStart = new Date(y, m-1, 1);
  const monthEnd   = new Date(y, m, 0);
  const msDay = 86400000;
  const diffDays = Math.round((monthStart - anchor) / msDay);
  const n0 = Math.floor(diffDays / 14);
  const results = [];
  for (let n = n0 - 1; n <= n0 + 5; n++) {
    const d = new Date(anchor.getTime() + n * 14 * msDay);
    const nd = new Date(d.getFullYear(), d.getMonth(), d.getDate()); // midnight
    if (nd >= monthStart && nd <= monthEnd) results.push(nd);
  }
  return results.sort((a,b) => a-b);
}

// Returns array of period descriptors for a month.
// Each: { index, payDate, startDay, endDay, dateLabel }
function getPayPeriodsForMonth(anchorDate, ym) {
  const payDates = getPayDatesInMonth(anchorDate, ym);
  if (!payDates.length) return [];
  const [y,m] = ym.split('-').map(Number);
  const monthEnd = new Date(y, m, 0);
  return payDates.map((pd, i) => {
    const periodEnd = i < payDates.length - 1
      ? new Date(payDates[i+1].getTime() - 86400000)
      : monthEnd;
    return {
      index: i,
      payDate: pd,
      startDay: pd.getDate(),
      endDay: periodEnd.getDate(),
      dateLabel: `${shortDate(pd)} – ${shortDate(periodEnd)}`,
    };
  });
}

// Which period index (0-based) does a bill's due day fall into?
function billPeriodIdx(bill, periods) {
  if (!bill.dueDay || !periods.length) return 0;
  if (bill.dueDay < periods[0].startDay) return 0; // before first payday → P1
  for (let i = 0; i < periods.length; i++) {
    if (bill.dueDay <= periods[i].endDay) return i;
  }
  return periods.length - 1;
}

function nextDueDate(dueDay) {
  if (!dueDay) return '—';
  const now = new Date(); const d = new Date(now.getFullYear(), now.getMonth(), dueDay);
  if (d < now) d.setMonth(d.getMonth()+1);
  return shortDate(d);
}

// Migrate old income format {p1c1,p1c2,...} → periodIncomes[]
function migrateMonth(mo) {
  let out = mo;
  if (!out.periodIncomes) {
    const inc = out.income || {};
    out = {
      ...out,
      periodIncomes: [
        { earned: (inc.p1c1||0)+(inc.p1c2||0)+(inc.p1c3||0), rollover: inc.p1roll||0 },
        { earned: (inc.p2c1||0)+(inc.p2c2||0), rollover: inc.p2roll||0 },
      ],
    };
  }
  if (!out.periodBudgets) {
    const old = out.budgets || DEF_CATS;
    const n = (out.periodIncomes||[]).length || 2;
    out = { ...out, periodBudgets: Object.fromEntries(Array.from({length:n},(_,i)=>[i,{...old}])) };
  }
  return out;
}

// ── Default data ──────────────────────────────────────────────────────────────
const DEF_PAYSCHEDULE = { anchorDate: '', threePaycheckMonths: [6, 12] };
const DEF_BILLS = [];
const DEF_INCOME_SOURCES = [
  { id:'income1', name:'Income 1', amount:0, frequency:'biweekly' },
];
const DEF_FUNDS = [];
const DEF_DEBTS = [];
const DEF_CATS = { Food:0, Gas:0, Misc:0 };
const ALL_CATS = ['Food','Gas','Misc','Medical','Charity','Amazon','After Care','Debt','Other'];

// Default earned per period = sum of biweekly sources
const DEF_PERIOD_EARNED = DEF_INCOME_SOURCES.filter(s=>s.frequency==='biweekly').reduce((s,i)=>s+i.amount,0);

function makePeriodBudgets(n) {
  return Object.fromEntries(Array.from({length:n}, (_,i) => [i, { ...DEF_CATS }]));
}
function makeMonth(numPeriods) {
  const n = numPeriods || 2;
  return {
    periodIncomes: Array.from({length:n}, () => ({ earned: DEF_PERIOD_EARNED, rollover: 0 })),
    txns: [],
    paid: {},
    periodBudgets: makePeriodBudgets(n),
  };
}

// ── Summary dashboard metric helpers ────────────────────────────────────────────
function computeMonthMetrics(ym, monthsObj, bills) {
  const raw = monthsObj[ym];
  if (!raw) return { totalIncome:0, totalBillsPlanned:0, totalBillsPaid:0, totalCatBudget:0, totalCatSpent:0, totalTithe:0 };
  const mo = migrateMonth(raw);
  const estAmts = mo.estimatedBillAmounts || {};
  const effAmt = b => b.type === 'estimated' ? (estAmts[b.id] ?? b.amount) : b.amount;
  const paid = mo.paid || {};
  let totalIncome = 0, totalTithe = 0;
  (mo.periodIncomes||[]).forEach(pi => { const earned = pi.earned||0; totalIncome += earned + (pi.rollover||0); totalTithe += earned*0.1; });
  const totalBillsPlanned = bills.reduce((s,b)=>s+effAmt(b),0);
  const totalBillsPaid    = bills.filter(b=>paid[b.id]).reduce((s,b)=>s+effAmt(b),0);
  const totalCatBudget    = Object.values(mo.periodBudgets||{}).reduce((s,pb)=>s+Object.values(pb).reduce((a,v)=>a+v,0),0);
  const totalCatSpent     = (mo.txns||[]).reduce((s,t)=>s+t.amount,0);
  return { totalIncome, totalBillsPlanned, totalBillsPaid, totalCatBudget, totalCatSpent, totalTithe };
}

function buildAnnualData(year, monthsObj, bills) {
  const rows = [];
  for (let m=1; m<=12; m++) {
    const ym = `${year}-${String(m).padStart(2,'0')}`;
    const met = computeMonthMetrics(ym, monthsObj, bills);
    const expenseActual  = met.totalBillsPaid   + met.totalCatSpent + met.totalTithe;
    const expensePlanned = met.totalBillsPlanned + met.totalCatBudget + met.totalTithe;
    rows.push({ ym, label: monthLabel(ym).slice(0,3), income: met.totalIncome, expenseActual, expensePlanned });
  }
  return rows;
}

function billsBreakdownForMonth(ym, monthsObj, bills) {
  const raw = monthsObj[ym];
  const mo = raw ? migrateMonth(raw) : { estimatedBillAmounts:{}, paid:{} };
  const estAmts = mo.estimatedBillAmounts || {};
  const paid = mo.paid || {};
  const effAmt = b => b.type === 'estimated' ? (estAmts[b.id] ?? b.amount) : b.amount;
  return bills.map(b => ({ id:b.id, name:b.name, planned:effAmt(b), actual: paid[b.id] ? effAmt(b) : 0, isPaid: !!paid[b.id] }));
}

function categoryTotalsForMonth(ym, monthsObj) {
  const raw = monthsObj[ym];
  const budgetByCat = {}, spentByCat = {};
  ALL_CATS.forEach(c => { budgetByCat[c]=0; spentByCat[c]=0; });
  if (raw) {
    const mo = migrateMonth(raw);
    Object.values(mo.periodBudgets||{}).forEach(pb => { Object.entries(pb).forEach(([c,v]) => { budgetByCat[c]=(budgetByCat[c]||0)+v; }); });
    (mo.txns||[]).forEach(t => { spentByCat[t.cat]=(spentByCat[t.cat]||0)+t.amount; });
  }
  return ALL_CATS.filter(c => budgetByCat[c]>0 || spentByCat[c]>0).map(c => ({ cat:c, budget:budgetByCat[c]||0, spent:spentByCat[c]||0 }));
}

// ── BudgetApp — only mounts when user is confirmed, so hooks are stable ───────
function BudgetApp({ user }) {
  const uid = user.uid;

  const [tab,    setTab]    = useState('overview');
  const [ym,     setYm]     = useDB('bgt_ym',             curYM(),            uid);
  const [months, setMonths] = useDB('bgt_months',         {},                 uid);
  const [bills,  setBills]  = useDB('bgt_bills',          DEF_BILLS,          uid);
  const [income, setIncome] = useDB('bgt_income_sources', DEF_INCOME_SOURCES, uid);
  const [funds,  setFunds]  = useDB('bgt_funds',          DEF_FUNDS,          uid);
  const [debts,  setDebts]  = useDB('bgt_debts',          DEF_DEBTS,          uid);
  const [sched,  setSched]  = useDB('bgt_payschedule',    DEF_PAYSCHEDULE,    uid);

  const periods = getPayPeriodsForMonth(sched.anchorDate, ym);
  const ymMonth = parseInt(ym.split('-')[1], 10);
  const isThreePaycheckMonth = (sched.threePaycheckMonths || [6, 12]).includes(ymMonth);
  const numPeriods = isThreePaycheckMonth ? 3 : 2;

  useEffect(() => {
    if (!months[ym]) setMonths(p => ({ ...p, [ym]: makeMonth(numPeriods) }));
  }, [ym, numPeriods]);

  const rawMo = months[ym] || makeMonth(numPeriods);
  const mo = migrateMonth(rawMo);

  // Always build one entry per numPeriods so toggling 3-paycheck months works regardless of anchor math
  const liveEarnedDefault = income.filter(s=>s.frequency==='biweekly').reduce((s,i)=>s+i.amount, 0);
  const effectiveIncomes = Array.from({ length: numPeriods }, (_, i) =>
    mo.periodIncomes?.[i] || { earned: liveEarnedDefault, rollover: 0 }
  );

  const updMo = useCallback(fn => setMonths(prev => {
    const cur = migrateMonth(prev[ym] || makeMonth(numPeriods));
    return { ...prev, [ym]: fn(cur) };
  }), [ym, setMonths, numPeriods]);

  const toggleBillPaid = useCallback((billId) => {
    const bill = bills.find(b => b.id === billId);
    if (!bill) return;
    updMo(m => {
      const wasPaid = !!(m.paid||{})[billId];
      const nowPaid = !wasPaid;
      const effAmt = bill.type === 'estimated' ? ((m.estimatedBillAmounts||{})[billId] ?? bill.amount) : bill.amount;
      if (bill.linkedDebtId) {
        setDebts(prev => prev.map(d => {
          if (d.id !== bill.linkedDebtId) return d;
          if (nowPaid) return { ...d, balance: Math.max(0, d.balance-effAmt), payments: { ...d.payments, [`${ym}_${billId}`]: { ym, actual:effAmt, source:'bill', billId } } };
          const { [`${ym}_${billId}`]: _, ...rest } = d.payments;
          return { ...d, balance: d.balance+effAmt, payments: rest };
        }));
      }
      return { ...m, paid: { ...(m.paid||{}), [billId]: nowPaid } };
    });
  }, [bills, updMo, setDebts, ym]);

  const TABS = ['overview','month budget','sinking funds','debts','summary'];
  return (
    <div style={{ maxWidth:1020, margin:'0 auto', padding:'16px 14px' }}>
      <header style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:18 }}>
        <h1 style={{ fontSize:20, fontWeight:700, color:'#60a5fa', letterSpacing:-0.5 }}>Budget Tracker</h1>
        {tab==='month budget' && (
          <div style={{ display:'flex', alignItems:'center', gap:8 }}>
            <button onClick={()=>setYm(adjMonth(ym,-1))} style={{ ...S.btn, padding:'5px 11px', fontSize:17 }}>‹</button>
            <span style={{ fontSize:14, fontWeight:600, minWidth:150, textAlign:'center' }}>{monthLabel(ym)}</span>
            <button onClick={()=>setYm(adjMonth(ym,+1))} style={{ ...S.btn, padding:'5px 11px', fontSize:17 }}>›</button>
          </div>
        )}
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          {user.photoURL && <img src={user.photoURL} style={{ width:28, height:28, borderRadius:'50%' }} title={user.displayName||user.email} />}
          <span style={{ fontSize:12, color:'#475569', maxWidth:120, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{user.displayName||user.email}</span>
          <button onClick={signOut} style={{ ...S.btn, fontSize:11, padding:'4px 10px', color:'#94a3b8' }}>Sign out</button>
        </div>
      </header>
      <nav style={{ display:'flex', gap:5, marginBottom:22, flexWrap:'wrap' }}>
        {TABS.map(t => (
          <button key={t} onClick={()=>setTab(t)}
            style={{ ...S.btn, background:tab===t?'#3b82f6':'#1e293b', color:tab===t?'#fff':'#94a3b8',
              fontWeight:tab===t?600:400, textTransform:'capitalize', padding:'8px 15px' }}>
            {t}
          </button>
        ))}
      </nav>
      {tab==='overview'      && <Overview bills={bills} setBills={setBills} income={income} setIncome={setIncome} debts={debts} sched={sched} setSched={setSched} />}
      {tab==='month budget'  && <MonthBudget mo={mo} updMo={updMo} bills={bills} income={income} ym={ym} toggleBillPaid={toggleBillPaid} periods={periods} effectiveIncomes={effectiveIncomes} numPeriods={numPeriods} />}
      {tab==='sinking funds' && <SinkingFunds funds={funds} setFunds={setFunds} />}
      {tab==='debts'         && <Debts debts={debts} setDebts={setDebts} ym={ym} />}
      {tab==='summary'       && <SummaryDashboard months={months} bills={bills} />}
    </div>
  );
}

// ── Overview ──────────────────────────────────────────────────────────────────
function Overview({ bills, setBills, income, setIncome, debts, sched, setSched }) {
  const [showAddBill,   setShowAddBill]   = useState(false);
  const [showAddIncome, setShowAddIncome] = useState(false);
  const [editBillId,    setEditBillId]    = useState(null);
  const [editBill,      setEditBill]      = useState({});
  const [editIncId,     setEditIncId]     = useState(null);
  const [editInc,       setEditInc]       = useState({});
  const [newBill, setNewBill] = useState({ name:'', amount:'', period:'1', dueDay:'', linkedDebtId:'', type:'recurring' });
  const [newInc,  setNewInc]  = useState({ name:'', amount:'', frequency:'biweekly' });

  const totalMonthlyIncome = income.reduce((s,i)=>s+freqMonthly(i.frequency,i.amount),0);
  const totalMonthlyBills  = bills.reduce((s,b)=>s+b.amount,0);

  const addBill = () => {
    if (!newBill.name || !newBill.amount) return;
    setBills(p=>[...p,{id:uid(),name:newBill.name,amount:parseFloat(newBill.amount)||0,period:+newBill.period,dueDay:+newBill.dueDay||null,linkedDebtId:newBill.linkedDebtId||null,type:newBill.type||'recurring'}]);
    setNewBill({name:'',amount:'',period:'1',dueDay:'',linkedDebtId:'',type:'recurring'});
    setShowAddBill(false);
  };
  const addInc = () => {
    if (!newInc.name || !newInc.amount) return;
    setIncome(p=>[...p,{id:uid(),name:newInc.name,amount:parseFloat(newInc.amount)||0,frequency:newInc.frequency}]);
    setNewInc({name:'',amount:'',frequency:'biweekly'});
    setShowAddIncome(false);
  };
  const startEdit = b => { setEditBillId(b.id); setEditBill({...b,dueDay:b.dueDay||'',linkedDebtId:b.linkedDebtId||'',type:b.type||'recurring'}); };
  const saveEdit  = () => {
    setBills(p=>p.map(b=>b.id!==editBillId?b:{...b,name:editBill.name,amount:parseFloat(editBill.amount)||0,period:+editBill.period,dueDay:+editBill.dueDay||null,linkedDebtId:editBill.linkedDebtId||null,type:editBill.type||'recurring'}));
    setEditBillId(null);
  };

  // Preview pay periods for current month when anchor is set
  const previewPeriods = sched.anchorDate ? getPayPeriodsForMonth(sched.anchorDate, curYM()) : [];

  return (
    <div>
      <div style={{ display:'flex', gap:10, flexWrap:'wrap', marginBottom:18 }}>
        <StatCard label="Monthly Income" value={fmt(totalMonthlyIncome)} color="#34d399" sub="est." />
        <StatCard label="Monthly Bills"  value={fmt(totalMonthlyBills)}  color="#f87171" />
        <StatCard label="Net Monthly"    value={fmtS(totalMonthlyIncome-totalMonthlyBills)} color={totalMonthlyIncome>=totalMonthlyBills?'#34d399':'#f87171'} />
      </div>

      {/* Pay Schedule */}
      <div style={S.card}>
        <h3 style={{ fontSize:14, fontWeight:600, color:'#60a5fa', marginBottom:12 }}>Pay Schedule</h3>
        <div style={{ display:'flex', gap:12, flexWrap:'wrap', alignItems:'flex-end' }}>
          <div style={{ flex:1, minWidth:200 }}>
            <label style={S.lbl}>First / anchor pay date (any known pay day)</label>
            <input type="date" value={sched.anchorDate||''} onChange={e=>setSched(s=>({...s,anchorDate:e.target.value}))} style={S.input} />
          </div>
          <div style={{ fontSize:12, color:'#94a3b8', paddingBottom:8 }}>
            Bi-weekly · {sched.anchorDate ? `${previewPeriods.length} period${previewPeriods.length!==1?'s':''} in ${monthLabel(curYM())}` : 'Set a date to auto-calculate pay periods'}
          </div>
        </div>
        {previewPeriods.length > 0 && (
          <div style={{ marginTop:10, display:'flex', gap:8, flexWrap:'wrap' }}>
            {previewPeriods.map(p=>(
              <div key={p.index} style={{ background:'#0f1117', borderRadius:8, padding:'6px 12px', fontSize:12 }}>
                <span style={{ color:'#60a5fa', fontWeight:600 }}>Period {p.index+1}</span>
                <span style={{ color:'#475569', marginLeft:6 }}>{p.dateLabel}</span>
              </div>
            ))}
          </div>
        )}
        <div style={{ marginTop:14 }}>
          <div style={S.lbl}>3-paycheck months (click to toggle)</div>
          <div style={{ display:'flex', gap:6, flexWrap:'wrap', marginTop:6 }}>
            {['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'].map((mn,i)=>{
              const mo3 = sched.threePaycheckMonths || [6,12];
              const num = i+1;
              const active = mo3.includes(num);
              return (
                <button key={num} onClick={()=>setSched(s=>{ const cur=s.threePaycheckMonths||[6,12]; return {...s,threePaycheckMonths:cur.includes(num)?cur.filter(x=>x!==num):[...cur,num].sort((a,b)=>a-b)}; })}
                  style={{ ...S.btn, padding:'4px 10px', fontSize:12, background:active?'#1d4ed8':'#0f1117', color:active?'#93c5fd':'#475569', border:`1px solid ${active?'#3b82f6':'#1e293b'}` }}>
                  {mn}

      {/* Income Sources */}
      <div style={S.card}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>

            <div>

                <option value="monthly">Monthly</option>

        <table style={{ width:'100%', borderCollapse:'collapse' }}>

            {income.map(i=>{

              return (
                <tr key={i.id} style={{ borderBottom:'1px solid #0f1117', background:isEditing?'#0f1117':'transparent' }}>
                  {isEditing ? (
                    <>
                      <td style={S.td}><input style={{ ...S.input, padding:'4px 8px', fontSize:12 }} value={editInc.name} onChange={e=>setEditInc(f=>({...f,name:e.target.value}))} /></td>
                      <td style={S.td}><input type="number" step="0.01" style={{ ...S.input, padding:'4px 8px', fontSize:12 }} value={editInc.amount} onChange={e=>setEditInc(f=>({...f,amount:e.target.value}))} /></td>
                      <td style={S.td}>
                        <select style={{ ...S.input, padding:'4px 8px', fontSize:12 }} value={editInc.frequency} onChange={e=>setEditInc(f=>({...f,frequency:e.target.value}))}>
                          <option value="biweekly">Bi-weekly</option>
                          <option value="monthly">Monthly</option>
                          <option value="weekly">Weekly</option>
                          <option value="other">Other</option>

                      </td>
                      <td style={{ ...S.td, color:'#34d399', fontWeight:600 }}>{fmt(freqMonthly(editInc.frequency, parseFloat(editInc.amount)||0))}</td>
                      <td style={{ ...S.td, whiteSpace:'nowrap' }}>
                        <PrimaryBtn onClick={()=>{ setIncome(p=>p.map(x=>x.id!==editIncId?x:{...x,name:editInc.name,amount:parseFloat(editInc.amount)||0,frequency:editInc.frequency})); setEditIncId(null); }} style={{ padding:'4px 10px', fontSize:12, marginRight:4 }}>Save</PrimaryBtn>
                        <button onClick={()=>setEditIncId(null)} style={{ ...S.btn, padding:'4px 10px', fontSize:12 }}>Cancel</button>
                      </td>
                    </>
                  ) : (
                    <>
                      <td style={S.td}>{i.name}</td>
                      <td style={{ ...S.td, color:'#34d399', fontWeight:600 }}>{fmt(i.amount)}</td>
                      <td style={{ ...S.td, color:'#94a3b8' }}>{i.frequency}</td>
                      <td style={{ ...S.td, color:'#34d399', fontWeight:600 }}>{fmt(freqMonthly(i.frequency,i.amount))}</td>
                      <td style={{ ...S.td, whiteSpace:'nowrap', textAlign:'right' }}>
                        <button onClick={()=>{ setEditIncId(i.id); setEditInc({...i, amount:String(i.amount)}); }} style={{ ...S.btn, padding:'3px 9px', fontSize:12, color:'#60a5fa', marginRight:4 }}>Edit</button>
                        <button onClick={()=>setIncome(p=>p.filter(x=>x.id!==i.id))} style={{ ...S.btn, padding:'3px 9px', fontSize:12, color:'#f87171', background:'transparent' }}>×</button>
                      </td>
                    </>
                  )}
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {/* Bills */}
      <div style={S.card}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
          <h3 style={{ fontSize:14, fontWeight:600, color:'#60a5fa' }}>Recurring Bills</h3>
          <PrimaryBtn onClick={()=>setShowAddBill(v=>!v)}>+ Add</PrimaryBtn>
        </div>
        {showAddBill && (
          <div style={{ display:'flex', gap:10, flexWrap:'wrap', marginBottom:14, padding:12, background:'#0f1117', borderRadius:8 }}>
            <div style={{ flex:2 }}><label style={S.lbl}>Name</label><input style={S.input} value={newBill.name} onChange={e=>setNewBill(f=>({...f,name:e.target.value}))} /></div>
            <div><label style={S.lbl}>Amount</label><input type="number" step="0.01" style={S.input} value={newBill.amount} onChange={e=>setNewBill(f=>({...f,amount:e.target.value}))} /></div>
            <div><label style={S.lbl}>Due Day (1–31)</label><input type="number" min="1" max="31" style={S.input} value={newBill.dueDay} onChange={e=>setNewBill(f=>({...f,dueDay:e.target.value}))} placeholder="e.g. 15" /></div>
            <div>
              <label style={S.lbl}>Type</label>
              <select style={S.input} value={newBill.type} onChange={e=>setNewBill(f=>({...f,type:e.target.value}))}>
                <option value="recurring">Recurring (fixed)</option>
                <option value="estimated">Estimated (variable)</option>
              </select>
            </div>
            <div>
              <label style={S.lbl}>Links to Debt</label>
              <select style={S.input} value={newBill.linkedDebtId} onChange={e=>setNewBill(f=>({...f,linkedDebtId:e.target.value}))}>
                <option value="">None</option>
                {debts.map(d=><option key={d.id} value={d.id}>{d.name}</option>)}
              </select>
            </div>
            <div style={{ display:'flex', alignItems:'flex-end', gap:6 }}>
              <PrimaryBtn onClick={addBill}>Save</PrimaryBtn>
              <button style={S.btn} onClick={()=>setShowAddBill(false)}>Cancel</button>
            </div>
          </div>
        )}
        <table style={{ width:'100%', borderCollapse:'collapse' }}>
          <thead><tr>{['Name','Amount','Type','Due Day','Next Due','Linked Debt','Actions'].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
          <tbody>
            {[...bills].sort((a,b)=>(a.dueDay||99)-(b.dueDay||99)).map(b => {
              const isEditing = editBillId===b.id;
              return (
                <tr key={b.id} style={{ borderBottom:'1px solid #0f1117', background:isEditing?'#0f1117':'transparent' }}>
                  {isEditing ? (
                    <>
                      <td style={S.td}><input style={{ ...S.input, padding:'4px 8px', fontSize:12 }} value={editBill.name} onChange={e=>setEditBill(f=>({...f,name:e.target.value}))} /></td>
                      <td style={S.td}><input type="number" step="0.01" style={{ ...S.input, padding:'4px 8px', fontSize:12 }} value={editBill.amount} onChange={e=>setEditBill(f=>({...f,amount:e.target.value}))} /></td>
                      <td style={S.td}>
                        <select style={{ ...S.input, padding:'4px 8px', fontSize:12 }} value={editBill.type||'recurring'} onChange={e=>setEditBill(f=>({...f,type:e.target.value}))}>
                          <option value="recurring">Recurring</option>
                          <option value="estimated">Estimated</option>
                        </select>
                      </td>
                      <td style={S.td}><input type="number" min="1" max="31" style={{ ...S.input, padding:'4px 8px', fontSize:12, width:70 }} value={editBill.dueDay} onChange={e=>setEditBill(f=>({...f,dueDay:e.target.value}))} placeholder="day" /></td>
                      <td style={{ ...S.td, color:'#60a5fa', fontSize:12 }}>{nextDueDate(editBill.dueDay)}</td>
                      <td style={S.td}>
                        <select style={{ ...S.input, padding:'4px 8px', fontSize:12 }} value={editBill.linkedDebtId||''} onChange={e=>setEditBill(f=>({...f,linkedDebtId:e.target.value}))}>

                        </select>
                      </td>
                      <td style={{ ...S.td, whiteSpace:'nowrap' }}>
                        <PrimaryBtn onClick={saveEdit} style={{ padding:'4px 10px', fontSize:12, marginRight:4 }}>Save</PrimaryBtn>
                        <button onClick={()=>setEditBillId(null)} style={{ ...S.btn, padding:'4px 10px', fontSize:12 }}>Cancel</button>
                      </td>
                    </>
                  ) : (
                    <>
                      <td style={S.td}>{b.name}</td>
                      <td style={{ ...S.td, color:'#fbbf24', fontWeight:600 }}>{fmt(b.amount)}{b.type==='estimated'&&<span style={{ color:'#94a3b8', fontSize:10, marginLeft:3 }}>est.</span>}</td>
                      <td style={S.td}>
                        <span style={{ fontSize:10, padding:'2px 7px', borderRadius:10, background: b.type==='estimated'?'#1c1917':'#0f172a', color:b.type==='estimated'?'#fb923c':'#60a5fa', border:`1px solid ${b.type==='estimated'?'#92400e':'#1e3a5f'}` }}>
                          {b.type==='estimated'?'estimated':'recurring'}
                        </span>
                      </td>
                      <td style={{ ...S.td, color:'#94a3b8' }}>{ordinal(b.dueDay)}</td>
                      <td style={{ ...S.td, color:'#60a5fa' }}>{nextDueDate(b.dueDay)}</td>
                      <td style={{ ...S.td, color:b.linkedDebtId?'#a78bfa':'#475569', fontSize:12 }}>
                        {b.linkedDebtId ? (debts.find(d=>d.id===b.linkedDebtId)?.name||b.linkedDebtId) : '—'}
                      </td>
                      <td style={{ ...S.td, whiteSpace:'nowrap' }}>
                        <button onClick={()=>startEdit(b)} style={{ ...S.btn, padding:'3px 9px', fontSize:12, color:'#60a5fa', marginRight:4 }}>Edit</button>
                        <button onClick={()=>setBills(p=>p.filter(x=>x.id!==b.id))} style={{ ...S.btn, padding:'3px 9px', fontSize:12, color:'#f87171', background:'transparent' }}>×</button>
                      </td>
                    </>
                  )}
                </tr>
              );
            })}
          </tbody>
        </table>
        <div style={{ marginTop:10, fontSize:12, color:'#475569', textAlign:'right' }}>
          Total / month: <span style={{ color:'#f87171', fontWeight:600 }}>{fmt(totalMonthlyBills)}</span>
        </div>
      </div>
    </div>
  );
}

// ── Month Budget ──────────────────────────────────────────────────────────────
function MonthBudget({ mo, updMo, bills, income, ym, toggleBillPaid, periods, effectiveIncomes, numPeriods }) {
  const [catPeriodTab, setCatPeriodTab] = useState(0);
  const safeTab = Math.min(catPeriodTab, numPeriods - 1);
  const [dragBillId, setDragBillId] = useState(null);
  const [dropTarget, setDropTarget] = useState(null);
  const paid    = mo.paid || {};
  const periodBudgets = mo.periodBudgets || makePeriodBudgets(numPeriods);
  const txns    = mo.txns || [];

  // Spend per category per period
  const spentByPeriod = {};
  for (let i=0;i<numPeriods;i++) { spentByPeriod[i]={}; ALL_CATS.forEach(c=>{spentByPeriod[i][c]=0;}); }
  txns.forEach(t => {
    const pi = t.periodIdx??0;
    if (!spentByPeriod[pi]) spentByPeriod[pi]={};
    spentByPeriod[pi][t.cat]=(spentByPeriod[pi][t.cat]||0)+t.amount;
  });
  const totalSpent = txns.reduce((s,t)=>s+t.amount,0);

  // Per-month estimated bill amount overrides
  const estAmts = mo.estimatedBillAmounts || {};
  const effectiveBillAmt = b => b.type === 'estimated' ? (estAmts[b.id] ?? b.amount) : b.amount;
  const setEstAmt = (billId, v) => updMo(m => ({ ...m, estimatedBillAmounts: { ...(m.estimatedBillAmounts||{}), [billId]: parseFloat(v)||0 } }));

  // Per-month bill period overrides (drag-and-drop)
  const billPeriodOverrides = mo.billPeriodOverrides || {};
  const effectiveBillPeriod = (b) => {
    if (billPeriodOverrides[b.id] !== undefined) return billPeriodOverrides[b.id];
    if (hasPeriods) return billPeriodIdx(b, periods);
    return (b.period||1)-1;
  };
  const setBillOverride = (billId, periodIdx) => updMo(m => ({ ...m, billPeriodOverrides: { ...(m.billPeriodOverrides||{}), [billId]: periodIdx } }));
  const clearBillOverride = (billId) => updMo(m => { const o={...(m.billPeriodOverrides||{})}; delete o[billId]; return {...m, billPeriodOverrides:o}; });

  // Per-period derived values
  // If we have computed periods (anchor set), use billPeriodIdx; otherwise fall back to bill.period-1
  const hasPeriods = periods.length > 0;

  const perPeriod = effectiveIncomes.map((pi, i) => {
    // If per-source amounts exist use their sum, otherwise fall back to stored earned
    const sourceAmts = pi.sources
      ? income.map(s => ({ ...s, periodAmt: pi.sources[s.id] ?? s.amount }))
      : income.map(s => ({ ...s, periodAmt: s.amount }));
    const earned   = sourceAmts.reduce((sum, s) => sum + s.periodAmt, 0);
    const rollover = pi.rollover || 0;
    const tithe    = earned * 0.1;
    const totalInc = earned + rollover;

    const pBills = bills.filter(b => effectiveBillPeriod(b) === i);

    const billsTotal  = pBills.reduce((s,b)=>s+effectiveBillAmt(b),0) + tithe;
    const paidBillAmt = pBills.filter(b=>paid[b.id]).reduce((s,b)=>s+effectiveBillAmt(b),0);
    const txnSpent    = txns.filter(t=>t.periodIdx===i).reduce((s,t)=>s+t.amount,0);
    const used        = tithe + paidBillAmt + txnSpent;
    const remaining   = totalInc - used;
    const unpaidAmt   = pBills.filter(b=>!paid[b.id]).reduce((s,b)=>s+effectiveBillAmt(b),0);

    return { earned, rollover, tithe, totalInc, pBills, billsTotal, paidBillAmt, txnSpent, used, remaining, unpaidAmt, sourceAmts };
  });

  const totalInc       = perPeriod.reduce((s,p)=>s+p.totalInc,0);
  const totalBills     = perPeriod.reduce((s,p)=>s+p.billsTotal,0);
  const totalCatBudget = Object.values(periodBudgets).reduce((s,pb)=>s+Object.values(pb).reduce((a,v)=>a+v,0),0);
  const unallocated    = totalInc - totalBills - totalCatBudget;

  const setSourceAmt = (i, srcId, v) => updMo(m => {
    const pi = [...(m.periodIncomes||[])];
    const cur = pi[i] || {};
    const sources = { ...(cur.sources||{}), [srcId]: parseFloat(v)||0 };
    const earned = Object.values(sources).reduce((s,x)=>s+x, 0);
    pi[i] = { ...cur, sources, earned };
    return { ...m, periodIncomes: pi };
  });
  const setRollover = (i,v) => updMo(m => { const pi=[...(m.periodIncomes||[])]; pi[i]={...(pi[i]||{}), rollover:parseFloat(v)||0}; return {...m, periodIncomes:pi}; });
  const setPBudget  = (pi,cat,v) => updMo(m=>{ const pb={...(m.periodBudgets||makePeriodBudgets(numPeriods))}; pb[pi]={...(pb[pi]||{}), [cat]:parseFloat(v)||0}; return {...m,periodBudgets:pb}; });
  const removePCat  = (pi,cat) => updMo(m=>{ const pb={...(m.periodBudgets||makePeriodBudgets(numPeriods))}; const p={...(pb[pi]||{})}; delete p[cat]; pb[pi]=p; return {...m,periodBudgets:pb}; });
  const addPCat     = (pi,cat) => updMo(m=>{ const pb={...(m.periodBudgets||makePeriodBudgets(numPeriods))}; pb[pi]={...(pb[pi]||{}), [cat]:0}; return {...m,periodBudgets:pb}; });
  const activeCatTab = periodBudgets[safeTab] || {};
  const unusedCats   = ALL_CATS.filter(c=>!activeCatTab[c]);

  // Column template: 1 column per period, min 280px each
  const gridCols = `repeat(${perPeriod.length}, minmax(280px,1fr))`;

  return (
    <div>
      {/* Zero-budget tally */}
      <div style={{ background:'#1e293b', borderRadius:12, padding:'13px 18px', marginBottom:14, display:'flex', gap:8, flexWrap:'wrap', alignItems:'center' }}>
        <span style={{ color:'#34d399', fontWeight:700 }}>{fmt(totalInc)}</span>
        <span style={{ color:'#475569' }}>income</span>
        <span style={{ color:'#475569' }}>−</span>
        <span style={{ color:'#f87171', fontWeight:700 }}>{fmt(totalBills)}</span>
        <span style={{ color:'#475569' }}>bills</span>
        <span style={{ color:'#475569' }}>−</span>
        <span style={{ color:'#fbbf24', fontWeight:700 }}>{fmt(totalCatBudget)}</span>
        <span style={{ color:'#475569' }}>budgeted</span>
        <span style={{ color:'#475569' }}>=</span>
        <span style={{ fontWeight:700, fontSize:16, color:Math.abs(unallocated)<1?'#34d399':unallocated>0?'#fbbf24':'#f87171' }}>{fmtS(unallocated)}</span>
        <span style={{ color:'#475569', fontSize:12 }}>{Math.abs(unallocated)<1?'✓ zero-based':unallocated>0?'unallocated':'over budget'}</span>
        <span style={{ marginLeft:'auto', color:'#475569', fontSize:12 }}>spent: {fmt(totalSpent)}</span>
      </div>

      {!hasPeriods && (
        <div style={{ background:'#1c1408', border:'1px solid #78350f', borderRadius:10, padding:'10px 16px', marginBottom:14, fontSize:12, color:'#fbbf24' }}>
          ⚠ No pay schedule set — go to Overview → Pay Schedule and enter an anchor pay date to auto-calculate pay periods for each month (including 3-paycheck months).
        </div>
      )}

      {/* Pay period columns */}
      <div style={{ display:'grid', gridTemplateColumns:gridCols, gap:14, marginBottom:14, overflowX:'auto' }}>
        {perPeriod.map((pp, i) => {
          const p = periods[i];
          const usedPct = pp.totalInc > 0 ? Math.min(100, (pp.used/pp.totalInc)*100) : 0;
          const barColor = pp.remaining >= 0 ? '#3b82f6' : '#f87171';
          const isDrop = dropTarget === i && dragBillId !== null;
          return (
            <div key={i} style={{ ...S.card, outline: isDrop ? '2px dashed #3b82f6' : '2px solid transparent', transition:'outline 0.1s' }}
              onDragOver={e=>{ e.preventDefault(); setDropTarget(i); }}
              onDragLeave={()=>setDropTarget(null)}
              onDrop={e=>{ e.preventDefault(); if(dragBillId) setBillOverride(dragBillId, i); setDragBillId(null); setDropTarget(null); }}
            >
              {/* Header */}
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:10 }}>
                <h3 style={{ fontSize:13, fontWeight:700, color:'#60a5fa', textTransform:'uppercase', letterSpacing:'0.05em' }}>Period {i+1}</h3>
                {p && <span style={{ fontSize:11, color:'#475569' }}>{p.dateLabel}</span>}
              </div>

              {/* Balance box */}
              <div style={{ background:'#0f1117', borderRadius:8, padding:'10px 12px', marginBottom:12 }}>
                <div style={{ display:'flex', justifyContent:'space-between', marginBottom:5 }}>
                  <span style={{ fontSize:11, color:'#475569' }}>Starting balance</span>
                  <span style={{ fontSize:13, fontWeight:600, color:'#94a3b8' }}>{fmt(pp.totalInc)}</span>
                </div>
                <div style={{ display:'flex', justifyContent:'space-between', marginBottom:4, fontSize:11, color:'#475569' }}>
                  <span>Tithing</span><span style={{ color:'#fbbf24' }}>−{fmt(pp.tithe)}</span>
                </div>
                <div style={{ display:'flex', justifyContent:'space-between', marginBottom:4, fontSize:11, color:'#475569' }}>
                  <span>Paid bills</span><span style={{ color:'#f87171' }}>−{fmt(pp.paidBillAmt)}</span>
                </div>
                <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6, fontSize:11, color:'#475569' }}>
                  <span>Transactions</span><span style={{ color:'#fbbf24' }}>−{fmt(pp.txnSpent)}</span>
                </div>
                <ProgressBar pct={usedPct} color={barColor} />
                <div style={{ display:'flex', justifyContent:'space-between', marginTop:6 }}>
                  <span style={{ fontSize:12, fontWeight:600 }}>Remaining</span>
                  <span style={{ fontSize:17, fontWeight:700, color:pp.remaining>=0?'#34d399':'#f87171' }}>{fmtS(pp.remaining)}</span>
                </div>
                {pp.unpaidAmt > 0 && (
                  <div style={{ marginTop:5, fontSize:11, color:'#fbbf24' }}>⚠ {fmt(pp.unpaidAmt)} in unpaid bills pending</div>
                )}
              </div>

              {/* Income */}
              <div style={{ marginBottom:12 }}>
                <div style={{ fontSize:11, color:'#475569', textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:6 }}>Income</div>
                {pp.sourceAmts.map(src => (
                  <div key={src.id} style={{ display:'flex', alignItems:'center', gap:8, marginBottom:5 }}>
                    <span style={{ fontSize:11, color:'#94a3b8', flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{src.name}</span>
                    <input type="number" step="0.01" value={src.periodAmt} onChange={e=>setSourceAmt(i, src.id, e.target.value)}
                      style={{ ...S.input, width:110, textAlign:'right', fontSize:12, padding:'4px 8px' }} />
                  </div>
                ))}
                <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:5 }}>
                  <span style={{ fontSize:11, color:'#94a3b8', flex:1 }}>Rollover</span>
                  <input type="number" step="0.01" value={pp.rollover} onChange={e=>setRollover(i,e.target.value)}
                    style={{ ...S.input, width:110, textAlign:'right', fontSize:12, padding:'4px 8px' }} />
                </div>
                <div style={{ display:'flex', justifyContent:'space-between', fontSize:11, color:'#94a3b8', paddingTop:5, borderTop:'1px solid #0f1117' }}>
                  <span>Tithing (10%)</span>
                  <span style={{ color:'#fbbf24' }}>{fmt(pp.tithe)}</span>
                </div>
              </div>

              {/* Bills */}
              <div>
                <div style={{ fontSize:11, color:'#475569', textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:5 }}>Bills</div>
                {pp.pBills.length===0 && <div style={{ fontSize:12, color:'#334155', padding:'6px 0' }}>No bills this period</div>}
                {[...pp.pBills].sort((a,b)=>(a.dueDay||0)-(b.dueDay||0)).map(b=>{
                  const isOverridden = billPeriodOverrides[b.id] !== undefined;
                  const isDragging = dragBillId === b.id;
                  return (
                  <div key={b.id} draggable
                    onDragStart={()=>setDragBillId(b.id)}
                    onDragEnd={()=>{ setDragBillId(null); setDropTarget(null); }}
                    style={{ display:'flex', alignItems:'center', gap:8, padding:'5px 0', borderBottom:'1px solid #0f1117', opacity:isDragging?0.4:1, cursor:'grab' }}>
                    <span style={{ fontSize:13, color:'#334155', flexShrink:0, cursor:'grab' }}>⠿</span>
                    <input type="checkbox" checked={!!paid[b.id]} onChange={()=>toggleBillPaid(b.id)} style={{ cursor:'pointer' }} />
                    <span style={{ flex:1, fontSize:12, color:paid[b.id]?'#475569':'#e2e8f0', textDecoration:paid[b.id]?'line-through':'none', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                      {b.name}{b.dueDay&&<span style={{ color:'#334155', fontSize:10, marginLeft:4 }}>({ordinal(b.dueDay)})</span>}
                      {b.type==='estimated'&&<span style={{ fontSize:9, color:'#fb923c', marginLeft:4, background:'#1c1917', padding:'1px 4px', borderRadius:4 }}>est</span>}
                      {isOverridden&&<span style={{ fontSize:9, color:'#60a5fa', marginLeft:4, background:'#0f172a', padding:'1px 4px', borderRadius:4 }}>moved</span>}
                    </span>
                    {b.linkedDebtId&&<span style={{ fontSize:10, color:'#a78bfa' }}>⟳</span>}
                    {isOverridden&&<button onClick={()=>clearBillOverride(b.id)} title="Reset to default period" style={{ ...S.btn, padding:'1px 5px', fontSize:10, color:'#475569', background:'transparent', flexShrink:0 }}>↺</button>}
                    {b.type==='estimated' ? (
                      <input type="number" step="0.01" value={effectiveBillAmt(b)} onChange={e=>setEstAmt(b.id,e.target.value)}
                        style={{ ...S.input, width:80, fontSize:11, padding:'2px 6px', textAlign:'right', color:'#fb923c', border:'1px solid #92400e' }} />
                    ) : (
                      <span style={{ fontSize:12, color:paid[b.id]?'#475569':'#e2e8f0', whiteSpace:'nowrap' }}>{fmt(effectiveBillAmt(b))}</span>
                    )}
                  </div>
                  );
                })}
                <div style={{ display:'flex', justifyContent:'space-between', fontSize:12, marginTop:6, paddingTop:5, borderTop:'1px solid #0f1117' }}>
                  <span style={{ color:'#475569' }}>Bills total</span>
                  <span style={{ color:'#f87171', fontWeight:600 }}>{fmt(pp.billsTotal)}</span>
                </div>
              </div>
            </div>
          );
        })}
      </div>

      {/* Category Budgets — per period */}
      <div style={S.card}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
          <h3 style={{ fontSize:14, fontWeight:600, color:'#60a5fa' }}>Category Budgets</h3>
          <div style={{ display:'flex', gap:4 }}>
            {Array.from({length:numPeriods},(_,i)=>(
              <button key={i} onClick={()=>setCatPeriodTab(i)}
                style={{ ...S.btn, padding:'4px 12px', fontSize:12,
                  background:safeTab===i?'#3b82f6':'#0f1117',
                  color:safeTab===i?'#fff':'#94a3b8',
                  fontWeight:safeTab===i?600:400 }}>
                P{i+1}
              </button>
            ))}
          </div>
        </div>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(255px,1fr))', gap:12 }}>
          {Object.entries(activeCatTab).map(([cat,limit])=>{
            const s=(spentByPeriod[safeTab]||{})[cat]||0;
            const pct=limit>0?(s/limit)*100:0;
            const color=pct>90?'#f87171':pct>70?'#fbbf24':'#34d399';
            return (
              <div key={cat} style={{ background:'#0f1117', borderRadius:8, padding:12 }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6 }}>
                  <span style={{ fontSize:13, fontWeight:600 }}>{cat}</span>
                  <button onClick={()=>removePCat(safeTab,cat)} style={{ ...S.btn, padding:'1px 6px', color:'#475569', background:'transparent', fontSize:14 }}>×</button>
                </div>
                <div style={{ display:'flex', gap:8, alignItems:'center', marginBottom:6 }}>
                  <span style={{ fontSize:11, color:'#475569' }}>Budget:</span>
                  <input type="number" step="50" value={limit} onChange={e=>setPBudget(safeTab,cat,e.target.value)} style={{ ...S.input, width:90, fontSize:12, padding:'4px 8px', textAlign:'right' }} />
                </div>
                <ProgressBar pct={pct} color={color} />
                <div style={{ display:'flex', justifyContent:'space-between', fontSize:11, marginTop:5, color:'#94a3b8' }}>
                  <span>Spent: <span style={{ color }}>{fmt(s)}</span></span>
                  <span>Left: <span style={{ color:limit-s>=0?'#34d399':'#f87171' }}>{fmtS(limit-s)}</span></span>
                </div>
              </div>
            );
          })}
        </div>
        {unusedCats.length>0 && (
          <div style={{ marginTop:12, display:'flex', gap:6, flexWrap:'wrap' }}>
            <span style={{ fontSize:11, color:'#475569', alignSelf:'center' }}>Add to P{safeTab+1}:</span>
            {unusedCats.map(c=><button key={c} onClick={()=>addPCat(safeTab,c)} style={{ ...S.btn, padding:'4px 10px', fontSize:12, color:'#94a3b8' }}>+ {c}</button>)}
          </div>
        )}
      </div>

      {/* Transactions */}
      <TransactionLog mo={mo} updMo={updMo} periods={periods} numPeriods={numPeriods} />
    </div>
  );
}

function TransactionLog({ mo, updMo, periods, numPeriods }) {
  const [form, setForm] = useState({ date:today(), desc:'', comment:'', cat:'Food', amount:'', periodIdx:'0' });
  const [editId, setEditId] = useState(null);
  const [editForm, setEditForm] = useState({});
  const [filterText, setFilterText] = useState('');
  const [filterCat,  setFilterCat]  = useState('');
  const [filterP,    setFilterP]    = useState('');
  const txns = mo.txns || [];
  const n = Math.max(numPeriods, 2);

  const add = () => {
    if (!form.amount || !form.desc) return;
    updMo(m=>({...m, txns:[{...form, amount:parseFloat(form.amount), id:uid(), periodIdx:+form.periodIdx}, ...(m.txns||[])]}));
    setForm(f=>({...f, desc:'', comment:'', amount:''}));
  };
  const del = id => updMo(m=>({...m, txns:(m.txns||[]).filter(t=>t.id!==id)}));
  const startEdit = t => { setEditId(t.id); setEditForm({...t, amount:String(t.amount), periodIdx:String(t.periodIdx??0), comment:t.comment||''}); };
  const saveEdit = () => {
    updMo(m=>({...m, txns:(m.txns||[]).map(t=>t.id!==editId?t:{...editForm,amount:parseFloat(editForm.amount)||0,periodIdx:+editForm.periodIdx})}));
    setEditId(null);
  };

  const ftxt = filterText.toLowerCase();
  const visible = txns.filter(t => {
    if (filterCat && t.cat !== filterCat) return false;
    if (filterP !== '' && String(t.periodIdx??0) !== filterP) return false;
    if (ftxt && !t.desc.toLowerCase().includes(ftxt) && !(t.comment||'').toLowerCase().includes(ftxt)) return false;
    return true;
  });
  const visibleTotal = visible.reduce((s,t)=>s+t.amount,0);

  return (
    <div style={S.card}>
      <h3 style={{ fontSize:14, fontWeight:600, color:'#60a5fa', marginBottom:14 }}>Transactions</h3>

      {/* Add form */}
      <div style={{ display:'grid', gridTemplateColumns:'120px 1fr 120px 90px 110px auto', gap:8, marginBottom:6, alignItems:'end' }}>
        <div><label style={S.lbl}>Date</label><input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} style={S.input} /></div>
        <div><label style={S.lbl}>Description</label><input type="text" placeholder="Merchant / note" value={form.desc} onChange={e=>setForm(f=>({...f,desc:e.target.value}))} onKeyDown={e=>e.key==='Enter'&&add()} style={S.input} /></div>
        <div>
          <label style={S.lbl}>Category</label>
          <select value={form.cat} onChange={e=>setForm(f=>({...f,cat:e.target.value}))} style={S.input}>
            {ALL_CATS.map(c=><option key={c}>{c}</option>)}
          </select>
        </div>
        <div><label style={S.lbl}>Amount</label><input type="number" step="0.01" placeholder="0.00" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} onKeyDown={e=>e.key==='Enter'&&add()} style={S.input} /></div>
        <div>
          <label style={S.lbl}>Period</label>
          <select value={form.periodIdx} onChange={e=>setForm(f=>({...f,periodIdx:e.target.value}))} style={S.input}>
            {Array.from({length:n},(_,i)=>(
              <option key={i} value={i}>{periods[i]?`P${i+1} (${periods[i].dateLabel})`:`Period ${i+1}`}</option>
            ))}
          </select>
        </div>
        <div style={{ paddingBottom:1 }}><PrimaryBtn onClick={add}>+ Add</PrimaryBtn></div>
      </div>
      <div style={{ marginBottom:14 }}>
        <input type="text" placeholder="Comment (optional)" value={form.comment} onChange={e=>setForm(f=>({...f,comment:e.target.value}))} style={{ ...S.input, fontSize:12 }} />
      </div>

      {/* Filter bar */}
      <div style={{ display:'flex', gap:8, flexWrap:'wrap', marginBottom:12, padding:'10px 12px', background:'#0f1117', borderRadius:8, alignItems:'center' }}>
        <span style={{ fontSize:11, color:'#475569', flexShrink:0 }}>Filter:</span>
        <input type="text" placeholder="Search desc / comment…" value={filterText} onChange={e=>setFilterText(e.target.value)}
          style={{ ...S.input, flex:2, minWidth:140, fontSize:12, padding:'5px 9px' }} />
        <select value={filterCat} onChange={e=>setFilterCat(e.target.value)} style={{ ...S.input, width:120, fontSize:12, padding:'5px 9px' }}>
          <option value="">All categories</option>
          {ALL_CATS.map(c=><option key={c}>{c}</option>)}
        </select>
        <select value={filterP} onChange={e=>setFilterP(e.target.value)} style={{ ...S.input, width:120, fontSize:12, padding:'5px 9px' }}>
          <option value="">All periods</option>
          {Array.from({length:n},(_,i)=><option key={i} value={String(i)}>{periods[i]?`P${i+1} (${periods[i].dateLabel})`:`Period ${i+1}`}</option>)}
        </select>
        {(filterText||filterCat||filterP) && (
          <button onClick={()=>{setFilterText('');setFilterCat('');setFilterP('');}} style={{ ...S.btn, fontSize:11, color:'#94a3b8', padding:'5px 10px' }}>Clear</button>
        )}
        <span style={{ fontSize:11, color:'#475569', marginLeft:'auto' }}>{visible.length} of {txns.length}</span>
      </div>

      {visible.length===0 && <div style={{ color:'#334155', textAlign:'center', padding:'20px 0' }}>{txns.length===0?'No transactions yet':'No transactions match the filter'}</div>}
      {visible.map(t=>{
        if (editId===t.id) return (
          <div key={t.id} style={{ background:'#0f1117', borderRadius:8, padding:'8px', marginBottom:4 }}>
            <div style={{ display:'flex', gap:6, flexWrap:'wrap', marginBottom:6, alignItems:'center' }}>
              <input type="date" value={editForm.date} onChange={e=>setEditForm(f=>({...f,date:e.target.value}))} style={{ ...S.input, width:130, fontSize:12, padding:'4px 8px' }} />
              <input type="text" value={editForm.desc} onChange={e=>setEditForm(f=>({...f,desc:e.target.value}))} style={{ ...S.input, flex:1, minWidth:120, fontSize:12, padding:'4px 8px' }} />
              <select value={editForm.cat} onChange={e=>setEditForm(f=>({...f,cat:e.target.value}))} style={{ ...S.input, width:110, fontSize:12, padding:'4px 8px' }}>
                {ALL_CATS.map(c=><option key={c}>{c}</option>)}
              </select>
              <input type="number" step="0.01" value={editForm.amount} onChange={e=>setEditForm(f=>({...f,amount:e.target.value}))} style={{ ...S.input, width:90, fontSize:12, padding:'4px 8px', textAlign:'right' }} />
              <select value={editForm.periodIdx} onChange={e=>setEditForm(f=>({...f,periodIdx:e.target.value}))} style={{ ...S.input, width:110, fontSize:12, padding:'4px 8px' }}>
                {Array.from({length:n},(_,i)=><option key={i} value={i}>{periods[i]?`P${i+1} (${periods[i].dateLabel})`:`Period ${i+1}`}</option>)}
              </select>
            </div>
            <div style={{ display:'flex', gap:6, alignItems:'center' }}>
              <input type="text" placeholder="Comment" value={editForm.comment} onChange={e=>setEditForm(f=>({...f,comment:e.target.value}))} style={{ ...S.input, flex:1, fontSize:12, padding:'4px 8px' }} />
              <PrimaryBtn onClick={saveEdit} style={{ padding:'4px 10px', fontSize:12 }}>Save</PrimaryBtn>
              <button onClick={()=>setEditId(null)} style={{ ...S.btn, padding:'4px 10px', fontSize:12 }}>Cancel</button>
            </div>
          </div>
        );
        return (
          <div key={t.id} style={{ ...S.row, flexDirection:'column', alignItems:'stretch', gap:0 }}>
            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              <span style={{ color:'#475569', fontSize:11, minWidth:82 }}>{t.date}</span>
              <span style={{ flex:1, fontSize:13 }}>{t.desc}</span>
              <span style={{ fontSize:10, padding:'2px 7px', borderRadius:10, background:'#0f1117', color:'#94a3b8', whiteSpace:'nowrap' }}>{t.cat}</span>
              <span style={{ fontSize:10, color:'#334155', minWidth:24 }}>P{(t.periodIdx??0)+1}</span>
              <span style={{ fontWeight:600, color:'#fbbf24', minWidth:72, textAlign:'right' }}>{fmt(t.amount)}</span>
              <button onClick={()=>startEdit(t)} style={{ ...S.btn, padding:'2px 7px', color:'#60a5fa', background:'transparent', fontSize:12 }}>Edit</button>
              <button onClick={()=>del(t.id)} style={{ ...S.btn, padding:'2px 7px', color:'#f87171', background:'transparent', fontSize:16, lineHeight:1 }}>×</button>
            </div>
            {t.comment && <div style={{ fontSize:11, color:'#64748b', paddingLeft:82, paddingBottom:2 }}>↳ {t.comment}</div>}
          </div>
        );
      })}
      {txns.length>0 && (
        <div style={{ marginTop:8, textAlign:'right', fontSize:12, color:'#475569' }}>
          {(filterText||filterCat||filterP) && <span style={{ marginRight:8 }}>Filtered: <span style={{ color:'#fbbf24', fontWeight:600 }}>{fmt(visibleTotal)}</span> · </span>}
          Total: <span style={{ color:'#fbbf24', fontWeight:600 }}>{fmt(txns.reduce((s,t)=>s+t.amount,0))}</span>
        </div>
      )}
    </div>
  );
}

// ── Sinking Funds ─────────────────────────────────────────────────────────────
function SinkingFunds({ funds, setFunds }) {
  const [nf, setNf] = useState({ name:'', goal:'', monthlyContribution:'' });
  const adjust = (id,amt,dir) => { if (!amt) return; setFunds(prev=>prev.map(f=>f.id!==id?f:{...f,balance:Math.max(0,f.balance+dir*amt),txns:[...(f.txns||[]),{id:uid(),date:today(),amount:dir*amt,source:'manual'}]})); };
  const setContrib = (id,v) => setFunds(prev=>prev.map(f=>f.id!==id?f:{...f,monthlyContribution:parseFloat(v)||0}));
  const add = () => {
    if (!nf.name) return;
    setFunds(prev=>[...prev,{id:uid(),name:nf.name,goal:parseFloat(nf.goal)||0,balance:0,monthlyContribution:parseFloat(nf.monthlyContribution)||0,txns:[]}]);
    setNf({name:'',goal:'',monthlyContribution:''});
  };
  const totalSaved = funds.reduce((s,f)=>s+f.balance,0);
  const totalGoal  = funds.reduce((s,f)=>s+f.goal,0);
  return (
    <div>
      <div style={{ display:'flex', gap:10, flexWrap:'wrap', marginBottom:16 }}>
        <StatCard label="Total Saved"      value={fmt(totalSaved)}  color="#34d399" />
        <StatCard label="Total Goals"      value={fmt(totalGoal)}   color="#60a5fa" />
        <StatCard label="Still Needed"     value={fmt(Math.max(0,totalGoal-totalSaved))} color="#fbbf24" />
        <StatCard label="Monthly Contrib." value={fmt(funds.reduce((s,f)=>s+(f.monthlyContribution||0),0))} color="#a78bfa" />
      </div>
      <div style={S.card}>
        <h3 style={{ fontSize:14, fontWeight:600, color:'#60a5fa', marginBottom:12 }}>Add Fund</h3>
        <div style={{ display:'flex', gap:10, flexWrap:'wrap' }}>
          <div style={{ flex:2 }}><label style={S.lbl}>Name</label><input style={S.input} value={nf.name} onChange={e=>setNf(f=>({...f,name:e.target.value}))} /></div>
          <div><label style={S.lbl}>Goal</label><input type="number" step="100" style={S.input} value={nf.goal} onChange={e=>setNf(f=>({...f,goal:e.target.value}))} placeholder="0" /></div>
          <div><label style={S.lbl}>Monthly Contrib.</label><input type="number" step="50" style={S.input} value={nf.monthlyContribution} onChange={e=>setNf(f=>({...f,monthlyContribution:e.target.value}))} placeholder="0" /></div>
          <div style={{ display:'flex', alignItems:'flex-end' }}><PrimaryBtn onClick={add}>+ Add</PrimaryBtn></div>
        </div>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(270px,1fr))', gap:14 }}>
        {funds.map(f=><FundCard key={f.id} fund={f} onAdjust={(a,d)=>adjust(f.id,a,d)} onSetContrib={v=>setContrib(f.id,v)} onUpdate={v=>setFunds(p=>p.map(x=>x.id!==f.id?x:{...x,...v}))} onRemove={()=>setFunds(p=>p.filter(x=>x.id!==f.id))} />)}
      </div>
    </div>
  );
}
function FundCard({ fund, onAdjust, onSetContrib, onUpdate, onRemove }) {
  const [amt, setAmt] = useState('');
  const [showTxns, setShowTxns] = useState(false);
  const [editing, setEditing] = useState(false);
  const [ef, setEf] = useState({});
  const pct=fund.goal>0?Math.min(100,(fund.balance/fund.goal)*100):100;
  const color=pct>=100?'#34d399':pct>50?'#60a5fa':'#fbbf24';

  const startEdit = () => { setEf({ name:fund.name, goal:String(fund.goal||''), balance:String(fund.balance||''), monthlyContribution:String(fund.monthlyContribution||'') }); setEditing(true); };
  const saveEdit  = () => { onUpdate({ name:ef.name, goal:parseFloat(ef.goal)||0, balance:parseFloat(ef.balance)||0, monthlyContribution:parseFloat(ef.monthlyContribution)||0 }); setEditing(false); };

  if (editing) return (
    <div style={S.card}>
      <div style={{ fontSize:13, fontWeight:600, color:'#60a5fa', marginBottom:12 }}>Edit Fund</div>
      <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
        <div><label style={S.lbl}>Name</label><input style={S.input} value={ef.name} onChange={e=>setEf(f=>({...f,name:e.target.value}))} /></div>
        <div><label style={S.lbl}>Current Balance</label><input type="number" step="0.01" style={S.input} value={ef.balance} onChange={e=>setEf(f=>({...f,balance:e.target.value}))} /></div>
        <div><label style={S.lbl}>Goal</label><input type="number" step="100" style={S.input} value={ef.goal} onChange={e=>setEf(f=>({...f,goal:e.target.value}))} /></div>
        <div><label style={S.lbl}>Monthly Contribution</label><input type="number" step="50" style={S.input} value={ef.monthlyContribution} onChange={e=>setEf(f=>({...f,monthlyContribution:e.target.value}))} /></div>
        <div style={{ display:'flex', gap:8, marginTop:4 }}>
          <PrimaryBtn onClick={saveEdit}>Save</PrimaryBtn>
          <button onClick={()=>setEditing(false)} style={S.btn}>Cancel</button>
        </div>
      </div>
    </div>
  );

  return (
    <div style={S.card}>
      <div style={{ display:'flex', justifyContent:'space-between', marginBottom:10 }}>
        <span style={{ fontWeight:600 }}>{fund.name}</span>
        <div style={{ display:'flex', gap:4 }}>
          <button onClick={startEdit} style={{ ...S.btn, padding:'2px 8px', color:'#60a5fa', background:'transparent', fontSize:12 }}>Edit</button>
          <button onClick={onRemove} style={{ ...S.btn, padding:'2px 7px', color:'#f87171', background:'transparent', fontSize:15 }}>×</button>
        </div>
      </div>
      <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6 }}>
        <span style={{ fontWeight:700, fontSize:18, color }}>{fmt(fund.balance)}</span>
        {fund.goal>0&&<span style={{ color:'#475569', fontSize:12 }}>{pct.toFixed(0)}% of {fmt(fund.goal)}</span>}

        <button onClick={()=>{onAdjust(parseFloat(amt)||0,-1);setAmt('');}} style={{ ...S.btn, background:'#450a0a', color:'#f87171', padding:'7px 11px', fontSize:12, whiteSpace:'nowrap' }}>− With</button>
      </div>
      {(fund.txns||[]).length>0&&<button onClick={()=>setShowTxns(v=>!v)} style={{ ...S.btn, fontSize:11, color:'#475569', marginTop:10, width:'100%', textAlign:'center' }}>{showTxns?'▴ Hide':'▾ Show'} history ({fund.txns.length})</button>}

// ── Debts ─────────────────────────────────────────────────────────────────────
function Debts({ debts, setDebts, ym }) {
  const [nd, setNd] = useState({ name:'', balance:'', monthlyPmt:'' });
  const totalDebt = debts.reduce((s,d)=>s+d.balance,0);
  const totalPmt  = debts.reduce((s,d)=>s+d.monthlyPmt,0);

  const recordManual = (id,amt) => setDebts(prev=>prev.map(d=>d.id!==id?d:{
    ...d, balance:Math.max(0,d.balance-amt),
    payments:{...d.payments,[ym]:{planned:d.monthlyPmt,actual:amt,source:'manual'}}
  }));
  const undo = id => setDebts(prev=>prev.map(d=>{
    if(d.id!==id) return d;
    const k=Object.keys(d.payments).find(k=>k.startsWith(ym));
    if(!k) return d;
    const p=d.payments[k]; const r={...d.payments}; delete r[k];
    return {...d, balance:d.balance+p.actual, payments:r};
  }));
  const update = (id,fields) => setDebts(prev=>prev.map(d=>d.id!==id?d:{...d,...fields}));
  const add = () => {
    if(!nd.name||!nd.balance) return;
    setDebts(prev=>[...prev,{id:uid(),name:nd.name,balance:parseFloat(nd.balance),monthlyPmt:parseFloat(nd.monthlyPmt)||0,startBalance:parseFloat(nd.balance),payments:{}}]);
    setNd({name:'',balance:'',monthlyPmt:''});
  };

  return (
    <div>
      <div style={{ display:'flex', gap:10, flexWrap:'wrap', marginBottom:16 }}>
        <StatCard label="Total Debt"       value={fmt(totalDebt)}      color="#f87171" />
        <StatCard label="Monthly Payments" value={fmt(totalPmt)+'/mo'} color="#fbbf24" />
        <StatCard label="Est. Payoff"      value={totalPmt>0?Math.ceil(totalDebt/totalPmt)+' mo':'—'} color="#94a3b8" />
      </div>
      <div style={S.card}>
        <h3 style={{ fontSize:14, fontWeight:600, color:'#60a5fa', marginBottom:12 }}>Add Debt</h3>
        <div style={{ display:'flex', gap:10, flexWrap:'wrap' }}>
          <div style={{ flex:2 }}><label style={S.lbl}>Name</label><input style={S.input} value={nd.name} onChange={e=>setNd(f=>({...f,name:e.target.value}))} /></div>
          <div><label style={S.lbl}>Balance</label><input type="number" step="0.01" style={S.input} value={nd.balance} onChange={e=>setNd(f=>({...f,balance:e.target.value}))} /></div>
          <div><label style={S.lbl}>Monthly Pmt</label><input type="number" step="0.01" style={S.input} value={nd.monthlyPmt} onChange={e=>setNd(f=>({...f,monthlyPmt:e.target.value}))} /></div>
          <div style={{ display:'flex', alignItems:'flex-end' }}><PrimaryBtn onClick={add}>+ Add</PrimaryBtn></div>
        </div>
      </div>
      {debts.map(d=><DebtCard key={d.id} debt={d} ym={ym}
        onRecord={amt=>recordManual(d.id,amt)}
        onUndo={()=>undo(d.id)}
        onUpdate={fields=>update(d.id,fields)}
        onRemove={()=>setDebts(p=>p.filter(x=>x.id!==d.id))} />)}
    </div>
  );
}

function DebtCard({ debt, ym, onRecord, onUndo, onUpdate, onRemove }) {
  const [payAmt,   setPayAmt]   = useState('');
  const [editing,  setEditing]  = useState(false);
  const [ef,       setEf]       = useState({});
  const [showHist, setShowHist] = useState(false);
  const [showPlan, setShowPlan] = useState(false);

  const pmtKey  = Object.keys(debt.payments||{}).find(k=>k.startsWith(ym));
  const payment = pmtKey ? debt.payments[pmtKey] : null;
  const monthsLeft  = debt.monthlyPmt>0 ? Math.ceil(debt.balance/debt.monthlyPmt) : null;
  const payoffDate  = monthsLeft ? (()=>{ const d=new Date(); d.setMonth(d.getMonth()+monthsLeft); return d.toLocaleDateString('en-US',{month:'short',year:'numeric'}); })() : null;

  // Payment history sorted newest first
  const history = Object.entries(debt.payments||{}).sort((a,b)=>b[0].localeCompare(a[0]));

  // Planned vs actual timeline: build from startBalance forward
  const startBal = debt.startBalance || debt.balance;
  const timeline = (() => {
    const rows = [];
    let planned = startBal;
    let actual  = startBal;
    const sorted = Object.entries(debt.payments||{}).sort((a,b)=>a[0].localeCompare(b[0]));
    const pmtMap = Object.fromEntries(sorted);
    const firstYm = sorted.length ? sorted[0][0].slice(0,7) : ym;
    let cur = firstYm;
    for (let i=0; i<Math.min(36, Math.ceil(startBal/(debt.monthlyPmt||1))+2); i++) {
      const pmt = pmtMap[cur];
      const plannedPmt = debt.monthlyPmt;
      const actualPmt  = pmt ? pmt.actual : null;
      planned = Math.max(0, planned - plannedPmt);
      actual  = actualPmt !== null ? Math.max(0, actual - actualPmt) : null;
      rows.push({ ym:cur, planned, actual, actualPmt, plannedPmt });
      if (planned <= 0) break;
      cur = adjMonth(cur, 1);
    }
    return rows;
  })();

  const startEdit = () => { setEf({ name:debt.name, balance:String(debt.balance), monthlyPmt:String(debt.monthlyPmt) }); setEditing(true); };
  const saveEdit  = () => { onUpdate({ name:ef.name, balance:parseFloat(ef.balance)||0, monthlyPmt:parseFloat(ef.monthlyPmt)||0, startBalance:debt.startBalance||debt.balance }); setEditing(false); };

  if (editing) return (
    <div style={S.card}>
      <div style={{ fontSize:13, fontWeight:600, color:'#60a5fa', marginBottom:12 }}>Edit Debt</div>
      <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
        <div><label style={S.lbl}>Name</label><input style={S.input} value={ef.name} onChange={e=>setEf(f=>({...f,name:e.target.value}))} /></div>
        <div><label style={S.lbl}>Current Balance</label><input type="number" step="0.01" style={S.input} value={ef.balance} onChange={e=>setEf(f=>({...f,balance:e.target.value}))} /></div>
        <div><label style={S.lbl}>Monthly Payment</label><input type="number" step="0.01" style={S.input} value={ef.monthlyPmt} onChange={e=>setEf(f=>({...f,monthlyPmt:e.target.value}))} /></div>
        <div style={{ display:'flex', gap:8, marginTop:4 }}>
          <PrimaryBtn onClick={saveEdit}>Save</PrimaryBtn>
          <button onClick={()=>setEditing(false)} style={S.btn}>Cancel</button>
        </div>
      </div>
    </div>
  );

  return (
    <div style={S.card}>
      {/* Header */}
      <div style={{ display:'flex', justifyContent:'space-between', marginBottom:14 }}>
        <span style={{ fontWeight:600, fontSize:15 }}>{debt.name}</span>
        <div style={{ display:'flex', gap:4 }}>
          <button onClick={startEdit} style={{ ...S.btn, padding:'3px 9px', fontSize:12, color:'#60a5fa' }}>Edit</button>
          <button onClick={onRemove} style={{ ...S.btn, padding:'2px 7px', color:'#f87171', background:'transparent', fontSize:15 }}>×</button>
        </div>
      </div>

      {/* Stats */}
      <div style={{ display:'flex', gap:20, flexWrap:'wrap', marginBottom:14 }}>
        <div><div style={S.lbl}>Balance</div><div style={{ fontWeight:700, color:'#f87171', fontSize:20 }}>{fmt(debt.balance)}</div></div>
        <div><div style={S.lbl}>Monthly Pmt</div><div style={{ fontWeight:600, color:'#fbbf24', fontSize:15 }}>{fmt(debt.monthlyPmt)}</div></div>
        {monthsLeft&&<div><div style={S.lbl}>Est. Payoff</div><div style={{ fontWeight:600, fontSize:13 }}>{monthsLeft} mo · {payoffDate}</div></div>}
        {payment&&<div><div style={S.lbl}>This Month</div><div style={{ color:'#34d399', fontWeight:600, fontSize:13 }}>{fmt(payment.actual)} {payment.source==='bill'?<span style={{ color:'#a78bfa', fontSize:11 }}>via bill</span>:<span style={{ color:'#94a3b8', fontSize:11 }}>manual</span>}</div></div>}
      </div>

      {/* Progress bar */}
      {debt.startBalance>0 && <><ProgressBar pct={Math.max(0,100-((debt.balance/debt.startBalance)*100))} color="#34d399" /><div style={{ fontSize:11, color:'#475569', marginTop:4, marginBottom:10 }}>{((1-(debt.balance/debt.startBalance))*100).toFixed(0)}% paid off</div></>}

      {/* Record payment */}
      {!payment ? (
        <div style={{ display:'flex', gap:8, marginBottom:10 }}>
          <input type="number" step="0.01" placeholder={`${debt.monthlyPmt} (planned)`} value={payAmt} onChange={e=>setPayAmt(e.target.value)} style={{ ...S.input, maxWidth:200 }} />
          <PrimaryBtn onClick={()=>{onRecord(parseFloat(payAmt)||debt.monthlyPmt);setPayAmt('');}}>Record Payment</PrimaryBtn>
        </div>
      ) : (
        <button onClick={onUndo} style={{ ...S.btn, color:'#64748b', fontSize:12, marginBottom:10 }}>↩ Undo payment</button>
      )}

      {/* Payment history */}
      {history.length>0 && <>
        <button onClick={()=>setShowHist(v=>!v)} style={{ ...S.btn, fontSize:11, color:'#475569', width:'100%', textAlign:'center', marginBottom:4 }}>
          {showHist?'▴ Hide':'▾ Show'} payment history ({history.length})
        </button>
        {showHist && <div style={{ marginBottom:8 }}>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:4, padding:'6px 0', borderBottom:'1px solid #0f1117' }}>
            {['Month','Planned','Actual'].map(h=><span key={h} style={{ ...S.lbl, marginBottom:0 }}>{h}</span>)}
          </div>
          {history.map(([k,p])=>(
            <div key={k} style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:4, padding:'5px 0', borderBottom:'1px solid #0f1117', fontSize:12 }}>
              <span style={{ color:'#94a3b8' }}>{monthLabel(k.slice(0,7))}</span>
              <span style={{ color:'#fbbf24' }}>{fmt(p.planned)}</span>
              <span style={{ color: p.actual>=p.planned?'#34d399':'#f87171', fontWeight:600 }}>{fmt(p.actual)} {p.source==='bill'&&<span style={{ color:'#a78bfa', fontSize:10 }}>bill</span>}</span>
            </div>
          ))}
        </div>}
      </>}

      {/* Planned vs actual timeline */}
      {timeline.length>0 && <>
        <button onClick={()=>setShowPlan(v=>!v)} style={{ ...S.btn, fontSize:11, color:'#475569', width:'100%', textAlign:'center', marginBottom:4 }}>
          {showPlan?'▴ Hide':'▾ Show'} payoff timeline
        </button>
        {showPlan && <div style={{ maxHeight:220, overflowY:'auto' }}>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:4, padding:'6px 0', borderBottom:'1px solid #0f1117' }}>
            {['Month','Planned Bal','Actual Bal'].map(h=><span key={h} style={{ ...S.lbl, marginBottom:0 }}>{h}</span>)}
          </div>
          {timeline.map(row=>(
            <div key={row.ym} style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:4, padding:'5px 0', borderBottom:'1px solid #0f1117', fontSize:12 }}>
              <span style={{ color:'#94a3b8' }}>{monthLabel(row.ym)}</span>
              <span style={{ color:'#60a5fa' }}>{fmt(row.planned)}</span>
              <span style={{ color: row.actual===null?'#334155':row.actual<=row.planned?'#34d399':'#f87171', fontWeight: row.actual!==null?600:400 }}>
                {row.actual!==null ? fmt(row.actual) : '—'}
              </span>
            </div>
          ))}
        </div>}
      </>}
    </div>
  );
}

// ── Chart primitives ─────────────────────────────────────────────────────────
function topRoundedRectPath(x, y, w, h, r) {
  if (h <= 0 || w <= 0) return '';
  r = Math.min(r, w/2, h);
  return `M${x},${y+h} L${x},${y+r} Q${x},${y} ${x+r},${y} L${x+w-r},${y} Q${x+w},${y} ${x+w},${y+r} L${x+w},${y+h} Z`;
}
function truncateLabel(s, n=10) { return s.length>n ? s.slice(0,n-1)+'…' : s; }

function ChartLegend({ series }) {
  return (
    <div style={{ display:'flex', gap:14, flexWrap:'wrap', marginTop:10, justifyContent:'center' }}>
      {series.map(s=>(
        <div key={s.key} style={{ display:'flex', alignItems:'center', gap:6 }}>
          <span style={{ width:12, height:12, borderRadius:3, background:s.color, display:'inline-block', flexShrink:0 }} />
          <span style={{ fontSize:11, color:'#94a3b8' }}>{s.label}</span>
        </div>
      ))}
    </div>
  );
}

function ChartTooltip({ title, series, values, valuePrefix }) {
  return (
    <div style={{ marginTop:8, background:'#0f1117', border:'1px solid #334155', borderRadius:8, padding:'8px 12px', fontSize:12, display:'inline-block' }}>
      <div style={{ color:'#94a3b8', marginBottom:4, fontWeight:600 }}>{title}</div>
      {series.map(s=>(
        <div key={s.key} style={{ display:'flex', justifyContent:'space-between', gap:14 }}>
          <span style={{ color:'#64748b', display:'flex', alignItems:'center' }}>
            <span style={{ display:'inline-block', width:12, height:2, background:s.color, marginRight:6 }} />
            {s.label}
          </span>
          <span style={{ fontWeight:600 }}>{valuePrefix}{Math.round(values[s.key]||0).toLocaleString('en-US')}</span>
        </div>
      ))}
    </div>
  );
}

function BarChart({ categories, series, data, height=200, valuePrefix='$' }) {
  const [hoverIdx, setHoverIdx] = useState(null);
  const n = categories.length;
  if (n === 0) return null;
  const slotW = 64, barGap = 2, leftPad = 46, rightPad = 14, topPad = 10, botPad = 26;
  const barW = Math.min(22, (slotW - 16 - barGap*(series.length-1)) / series.length);
  const W = leftPad + rightPad + n*slotW;
  const H = height;
  const plotH = H - topPad - botPad;
  const maxVal = Math.max(1, ...data.flatMap(d => series.map(s => d[s.key]||0))) * 1.15;
  const yTicks = 4;
  const yScale = v => topPad + plotH - (v/maxVal)*plotH;

  return (
    <div>
      <div style={{ overflowX:'auto' }}>
        <svg width={W} height={H} style={{ display:'block' }}>
          {Array.from({length:yTicks+1}, (_,i) => {
            const v = (maxVal/yTicks)*i; const y = yScale(v);
            return (
              <g key={i}>
                <line x1={leftPad} x2={W-rightPad} y1={y} y2={y} stroke="#334155" strokeWidth={1} />
                <text x={leftPad-8} y={y+3} textAnchor="end" fontSize={10} fill="#475569">{v>=1000?(v/1000).toFixed(1)+'k':Math.round(v)}</text>
              </g>
            );
          })}
          {data.map((d,i) => {
            const groupW = barW*series.length + barGap*(series.length-1);
            const groupX = leftPad + i*slotW + (slotW-groupW)/2;
            return (
              <g key={i} onMouseEnter={()=>setHoverIdx(i)} onMouseLeave={()=>setHoverIdx(null)}>
                <rect x={leftPad+i*slotW} y={topPad} width={slotW} height={plotH} fill={hoverIdx===i?'#ffffff0a':'transparent'} />
                {series.map((s,si) => {
                  const val = d[s.key]||0;
                  const y = yScale(val);
                  const bh = topPad+plotH-y;
                  const bx = groupX + si*(barW+barGap);
                  return <path key={s.key} d={topRoundedRectPath(bx,y,barW,bh,4)} fill={s.color} />;
                })}
                <text x={leftPad+i*slotW+slotW/2} y={H-8} textAnchor="middle" fontSize={10} fill="#64748b">{truncateLabel(categories[i])}</text>
              </g>
            );
          })}
        </svg>
      </div>
      {hoverIdx!==null && <ChartTooltip title={categories[hoverIdx]} series={series} values={data[hoverIdx]} valuePrefix={valuePrefix} />}
      <ChartLegend series={series} />
    </div>
  );
}

function LineChart({ categories, series, data, height=200, valuePrefix='$' }) {
  const [hoverIdx, setHoverIdx] = useState(null);
  const n = categories.length;
  if (n === 0) return null;
  const leftPad=46, rightPad=56, topPad=14, botPad=26;
  const plotW = Math.max(300, n*50);
  const W = leftPad+rightPad+plotW;
  const H = height;
  const plotH = H-topPad-botPad;
  const maxVal = Math.max(1, ...data.flatMap(d => series.map(s => d[s.key]||0))) * 1.15;
  const xStep = n>1 ? plotW/(n-1) : plotW;
  const xScale = i => leftPad + i*xStep;
  const yScale = v => topPad + plotH - (v/maxVal)*plotH;
  const yTicks = 4;
  const labelEvery = Math.max(1, Math.ceil(n/12));

  const handleMove = (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const scaleFactor = rect.width / W;
    const localX = (e.clientX - rect.left) / scaleFactor;
    let idx = Math.round((localX-leftPad)/xStep);
    setHoverIdx(Math.max(0, Math.min(n-1, idx)));
  };

  return (
    <div>
      <div style={{ overflowX:'auto' }}>
        <svg width={W} height={H} style={{ display:'block' }} onMouseMove={handleMove} onMouseLeave={()=>setHoverIdx(null)}>
          {Array.from({length:yTicks+1}, (_,i) => {
            const v=(maxVal/yTicks)*i; const y=yScale(v);
            return (
              <g key={i}>
                <line x1={leftPad} x2={W-rightPad} y1={y} y2={y} stroke="#334155" strokeWidth={1} />
                <text x={leftPad-8} y={y+3} textAnchor="end" fontSize={10} fill="#475569">{v>=1000?(v/1000).toFixed(1)+'k':Math.round(v)}</text>
              </g>
            );
          })}
          {series.map(s => {
            const pts = data.map((d,i)=>`${xScale(i)},${yScale(d[s.key]||0)}`).join(' ');
            return <polyline key={s.key} points={pts} fill="none" stroke={s.color} strokeWidth={2} strokeLinejoin="round" strokeLinecap="round" />;
          })}
          {series.map(s => {
            const val = data[n-1]?.[s.key]||0;
            const x = xScale(n-1), y = yScale(val);
            return (
              <g key={s.key}>
                <circle cx={x} cy={y} r={4} fill={s.color} stroke="#1e293b" strokeWidth={2} />
                <text x={x+8} y={y+3} fontSize={10} fill={s.color}>{valuePrefix}{Math.round(val).toLocaleString('en-US')}</text>
              </g>
            );
          })}
          {hoverIdx!==null && <line x1={xScale(hoverIdx)} x2={xScale(hoverIdx)} y1={topPad} y2={topPad+plotH} stroke="#475569" strokeWidth={1} strokeDasharray="3,3" />}
          {hoverIdx!==null && series.map(s => (
            <circle key={s.key} cx={xScale(hoverIdx)} cy={yScale(data[hoverIdx][s.key]||0)} r={4} fill={s.color} stroke="#1e293b" strokeWidth={2} />
          ))}
          {categories.map((c,i) => (i%labelEvery===0) && (
            <text key={i} x={xScale(i)} y={H-8} textAnchor="middle" fontSize={10} fill="#64748b">{c}</text>
          ))}
        </svg>
      </div>
      {hoverIdx!==null && <ChartTooltip title={categories[hoverIdx]} series={series} values={data[hoverIdx]} valuePrefix={valuePrefix} />}
      <ChartLegend series={series} />
    </div>
  );
}
