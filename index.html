      </div>
      <div style={{ display:'flex', gap:10, flexWrap:'wrap', marginBottom:16 }}>
        <StatCard label="Total Income"  value={fmt(totalIncome)}  color="#34d399" />
        <StatCard label="Total Expense" value={fmt(totalExpense)} color="#f87171" />
        <StatCard label="Net"           value={fmtS(net)}         color={net>=0?'#34d399':'#f87171'} />
        <StatCard label="Savings Rate"  value={savingsRate.toFixed(1)+'%'} color={savingsRate>=0?'#60a5fa':'#f87171'} />
      </div>
      <div style={{ marginBottom:22 }}>
        <div style={{ fontSize:12, color:'#94a3b8', marginBottom:8, fontWeight:600 }}>Income vs Expense by Month</div>
        <BarChart categories={labels} series={incomeExpenseSeries} data={rows} />
      </div>
      <div>
        <div style={{ fontSize:12, color:'#94a3b8', marginBottom:8, fontWeight:600 }}>Budgeted vs Actual Trend</div>
        <LineChart categories={labels} series={budgetActualSeries} data={rows} />
      </div>
    </div>
  );
}

function BillsSummary({ ym, setYm, months, bills }) {
  const rows = billsBreakdownForMonth(ym, months, bills);
  const totalPlanned = rows.reduce((s,r)=>s+r.planned,0);
  const totalPaid    = rows.reduce((s,r)=>s+r.actual,0);
  const unpaidCount  = rows.filter(r=>!r.isPaid).length;
  const series = [
    { key:'planned', label:'Planned', color:'#60a5fa' },
    { key:'actual',  label:'Paid',    color:'#fbbf24' },
  ];
  const labels = rows.map(r=>r.name);

  return (
    <div style={S.card}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
        <h3 style={{ fontSize:14, fontWeight:600, color:'#60a5fa' }}>Bills Summary</h3>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          <button onClick={()=>setYm(adjMonth(ym,-1))} style={{ ...S.btn, padding:'5px 11px', fontSize:15 }}>‹</button>
          <span style={{ fontSize:14, fontWeight:600, minWidth:140, textAlign:'center' }}>{monthLabel(ym)}</span>
          <button onClick={()=>setYm(adjMonth(ym,+1))} style={{ ...S.btn, padding:'5px 11px', fontSize:15 }}>›</button>
        </div>
      </div>
      <div style={{ display:'flex', gap:10, flexWrap:'wrap', marginBottom:16 }}>
        <StatCard label="Total Planned" value={fmt(totalPlanned)} color="#60a5fa" />
        <StatCard label="Total Paid"    value={fmt(totalPaid)}    color="#fbbf24" />
        <StatCard label="Unpaid Bills"  value={String(unpaidCount)} color={unpaidCount>0?'#f87171':'#34d399'} />
      </div>
      {rows.length===0
        ? <div style={{ color:'#334155', textAlign:'center', padding:'20px 0' }}>No bills configured</div>
        : <BarChart categories={labels} series={series} data={rows} />}
    </div>
  );
}

function ExpenseSummary({ ym, setYm, months }) {
  const rows = categoryTotalsForMonth(ym, months);
  const totalBudget = rows.reduce((s,r)=>s+r.budget,0);
  const totalSpent  = rows.reduce((s,r)=>s+r.spent,0);
  const variance    = totalBudget-totalSpent;
  const series = [
    { key:'budget', label:'Budgeted', color:'#60a5fa' },
    { key:'spent',  label:'Spent',    color:'#fbbf24' },
  ];
  const labels = rows.map(r=>r.cat);

  const trendRows = [];
  let cursor = ym;
  const window = [];
  for (let i=0;i<6;i++) { window.unshift(cursor); cursor = adjMonth(cursor,-1); }
  window.forEach(m => {
    const catRows = categoryTotalsForMonth(m, months);
    trendRows.push({ ym:m, label: monthLabel(m).slice(0,3), budget: catRows.reduce((s,r)=>s+r.budget,0), spent: catRows.reduce((s,r)=>s+r.spent,0) });
  });

  return (
    <div style={S.card}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
        <h3 style={{ fontSize:14, fontWeight:600, color:'#60a5fa' }}>Expense Summary</h3>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          <button onClick={()=>setYm(adjMonth(ym,-1))} style={{ ...S.btn, padding:'5px 11px', fontSize:15 }}>‹</button>
          <span style={{ fontSize:14, fontWeight:600, minWidth:140, textAlign:'center' }}>{monthLabel(ym)}</span>
          <button onClick={()=>setYm(adjMonth(ym,+1))} style={{ ...S.btn, padding:'5px 11px', fontSize:15 }}>›</button>
        </div>
      </div>
      <div style={{ display:'flex', gap:10, flexWrap:'wrap', marginBottom:16 }}>
        <StatCard label="Total Budgeted" value={fmt(totalBudget)} color="#60a5fa" />
        <StatCard label="Total Spent"    value={fmt(totalSpent)}  color="#fbbf24" />
        <StatCard label="Variance"       value={fmtS(variance)}   color={variance>=0?'#34d399':'#f87171'} />
      </div>
      {rows.length===0
        ? <div style={{ color:'#334155', textAlign:'center', padding:'20px 0', marginBottom:16 }}>No category budgets or spend this month</div>
        : (
          <div style={{ marginBottom:22 }}>
            <div style={{ fontSize:12, color:'#94a3b8', marginBottom:8, fontWeight:600 }}>Budget vs Actual by Category</div>
            <BarChart categories={labels} series={series} data={rows} />
          </div>
        )}
      <div>
        <div style={{ fontSize:12, color:'#94a3b8', marginBottom:8, fontWeight:600 }}>Spend Trend (last 6 months)</div>
        <LineChart categories={trendRows.map(r=>r.label)} series={series} data={trendRows} />
      </div>
    </div>
  );
}

function SummaryDashboard({ months, bills }) {
  const [year, setYear] = useState(new Date().getFullYear());
  const [billsYm, setBillsYm] = useState(curYM());
  const [expYm,   setExpYm]   = useState(curYM());
  return (
    <div>
      <AnnualSummary year={year} setYear={setYear} months={months} bills={bills} />
      <BillsSummary ym={billsYm} setYm={setBillsYm} months={months} bills={bills} />
      <ExpenseSummary ym={expYm} setYm={setExpYm} months={months} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
