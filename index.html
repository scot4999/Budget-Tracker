<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

function useIsMobile() {
  const [mobile, setMobile] = useState(() => window.innerWidth <= 640);
  useEffect(() => {
    const fn = () => setMobile(window.innerWidth <= 640);
    window.addEventListener('resize', fn);
    return () => window.removeEventListener('resize', fn);
  }, []);
  return mobile;
}

function useIsPWA() {
  const [pwa, setPwa] = useState(() =>
    window.matchMedia('(display-mode: standalone)').matches ||
    window.navigator.standalone === true
  );
  useEffect(() => {
    const mq = window.matchMedia('(display-mode: standalone)');
    const fn = e => setPwa(e.matches);
    mq.addEventListener ? mq.addEventListener('change', fn) : mq.addListener(fn);
    return () => mq.removeEventListener ? mq.removeEventListener('change', fn) : mq.removeListener(fn);
  }, []);
  return pwa;
}

// ── Firebase helpers ──────────────────────────────────────────────────────────
const auth = firebase.auth();
const db   = firebase.firestore();

function userDoc(_uid) { return db.collection('budgets').doc('shared'); }

// Saves a single field to Firestore (debounced 800ms to batch rapid edits)
const saveTimers = {};
// _currentUser is set by BudgetApp on mount so saveField can stamp who edited
let _currentUser = null;
function saveField(uid, field, value) {
  fireSaveEvent && fireSaveEvent('saving');
  clearTimeout(saveTimers[field]);
  saveTimers[field] = setTimeout(() => {
    const meta = _currentUser ? { _lastEditedBy: _currentUser.displayName||_currentUser.email, _lastEditedAt: new Date().toISOString(), _lastEditedField: field } : {};
    userDoc(uid).set({ [field]: JSON.stringify(value), ...Object.fromEntries(Object.entries(meta).map(([k,v])=>[k,v])) }, { merge: true })
      .then(() => fireSaveEvent && fireSaveEvent('saved'))
      .catch(console.error);
  }, 800);
}

// Poll for remote edits by other users (every 20s while app is open)
function useRemoteEditWatch(uid, currentUserEmail, onRemoteEdit) {
  const lastSeenRef = useRef(null);
  useEffect(() => {
    if (!uid) return;
    const check = () => {
      userDoc(uid).get().then(snap => {
        if (!snap.exists) return;
        const d = snap.data();
        const by = d._lastEditedBy, at = d._lastEditedAt, field = d._lastEditedField;
        if (!at || !by) return;
        // Only fire if: someone else made the edit, and we haven't seen this timestamp
        if (by !== (currentUserEmail) && at !== lastSeenRef.current) {
          lastSeenRef.current = at;
          onRemoteEdit({ by, at, field });
        }
      }).catch(()=>{});
    };
    const id = setInterval(check, 20000);
    return () => clearInterval(id);
  }, [uid, currentUserEmail]);
}

// useDB: syncs a value to Firestore under the shared doc.
function useDB(key, init, uid) {
  const [val, setVal] = useState(init);
  const loaded = useRef(false);
  const uidRef = useRef(uid);
  uidRef.current = uid;

  useEffect(() => {
    loaded.current = false;
    if (!uid) return;
    userDoc(uid).get().then(snap => {
      if (snap.exists && snap.data()[key] !== undefined) {
        try { setVal(JSON.parse(snap.data()[key])); } catch {}
      } else {
        // First sign-in: migrate from localStorage
        try {
          const s = localStorage.getItem(key);
          if (s) { const v = JSON.parse(s); setVal(v); userDoc(uid).set({ [key]: JSON.stringify(v) }, { merge: true }); }
        } catch {}
      }
      loaded.current = true;
    }).catch(console.error);
  }, [uid, key]);

  const set = useCallback(updater => {
    setVal(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      if (uidRef.current && loaded.current) saveField(uidRef.current, key, next);
      return next;
    });
  }, [key]);

  return [val, set];
}

// ── Save indicator ────────────────────────────────────────────────────────────
// Global event bus: any saveField call fires 'saving', Firestore callback fires 'saved'
const saveListeners = new Set();
function fireSaveEvent(e) { saveListeners.forEach(fn => fn(e)); }
const _origSaveField = saveField;
// Patch saveField to emit events (called after definition, see below)

function useSaveStatus() {
  const [status, setStatus] = useState(null); // null | 'saving' | 'saved'
  useEffect(() => {
    const handle = e => {
      setStatus(e);
      if (e === 'saved') setTimeout(() => setStatus(null), 1800);
    };
    saveListeners.add(handle);
    return () => saveListeners.delete(handle);
  }, []);
  return status;
}

// ── Confirm-delete helper ─────────────────────────────────────────────────────
function useConfirm() {
  const [state, setState] = useState(null); // { message, onConfirm }
  const ask = (message, onConfirm) => setState({ message, onConfirm });
  const confirm = () => { state?.onConfirm(); setState(null); }
  const cancel  = () => setState(null);
  const Dialog  = state ? (
    <div style={{ position:'fixed', inset:0, zIndex:999, display:'flex', alignItems:'center', justifyContent:'center', background:'rgba(0,0,0,0.6)' }}
      onClick={cancel}>
      <div onClick={e=>e.stopPropagation()} style={{ background:'#1e293b', borderRadius:14, padding:'24px 28px', maxWidth:360, width:'90%', boxShadow:'0 20px 60px rgba(0,0,0,0.5)' }}>
        <div style={{ marginBottom:18, fontSize:15, color:'#e2e8f0', lineHeight:1.6 }}>{state.message}</div>
        <div style={{ display:'flex', gap:10, justifyContent:'flex-end' }}>
          <button onClick={cancel} className="confirm-btn" style={{ padding:'7px 16px', borderRadius:8, border:'none', background:'#334155', color:'#94a3b8', cursor:'pointer', fontSize:13 }}>Cancel</button>
          <button onClick={confirm} className="confirm-btn" style={{ padding:'7px 16px', borderRadius:8, border:'none', background:'#dc2626', color:'#fff', cursor:'pointer', fontWeight:600, fontSize:13 }}>Delete</button>
        </div>
      </div>
    </div>
  ) : null;
  return { ask, Dialog };
}

// ── Auth state ────────────────────────────────────────────────────────────────
function useAuth() {
  const [user, setUser] = useState(undefined); // undefined = loading
  useEffect(() => auth.onAuthStateChanged(u => setUser(u || null)), []);
  return user;
}
function signIn()  { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
function signOut() { auth.signOut(); }
const fmt  = n => '$' + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits:2, maximumFractionDigits:2 });
const fmtS = n => (n < 0 ? '-' : '') + fmt(n);
const uid  = () => Math.random().toString(36).slice(2, 9);
const today = () => new Date().toISOString().slice(0, 10);
function curYM()  { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
function adjMonth(ym, d) { const [y,m] = ym.split('-'); const dt = new Date(+y,+m-1+d); return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`; }
function monthLabel(ym) { const [y,m] = ym.split('-'); return new Date(y,m-1).toLocaleString('default',{month:'long',year:'numeric'}); }
function ordinal(n) { if (!n) return '—'; const s=['th','st','nd','rd']; const v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); }
function freqMonthly(f, amt) { if (f==='biweekly') return amt*26/12; if (f==='weekly') return amt*52/12; if (f==='bimonthly') return amt*2; return amt; }
function shortDate(d) { return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }

// ── CSV helpers ───────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.split(/\r?\n/);
  return lines.filter(l => l.trim()).map(line => {
    const fields = []; let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
      else if (line[i] === ',' && !inQ) { fields.push(cur); cur = ''; }
      else cur += line[i];
    }
    fields.push(cur);
    return fields;
  });
}
function buildSuggestions(months) {
  const seen = new Map();
  // Process months in chronological order so lastAmount reflects the most recent entry
  Object.entries(months).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([, raw]) => {
    try {
      const mo = migrateMonth(raw);
      (mo.txns||[]).forEach(t => {
        if (!t.desc) return;
        const k = t.desc.toLowerCase().trim();
        if (!seen.has(k)) seen.set(k, { desc:t.desc, cat:t.cat, count:0, lastAmount:null });
        const e = seen.get(k);
        e.count++;
        e.lastAmount = t.amount; // always overwrite — last month chronologically wins
        if (t.cat) e.cat = t.cat;
      });
    } catch {}
  });
  return [...seen.values()].sort((a,b) => b.count - a.count);
}
function exportAllCSV(months) {
  const rows = [['Date','Description','Comment','Category','Amount','Period','Month']];
  Object.entries(months).sort().forEach(([ym, raw]) => {
    try { const mo = migrateMonth(raw); (mo.txns||[]).forEach(t => { rows.push([t.date, t.desc, t.comment||'', t.cat, t.amount.toFixed(2), `P${(t.periodIdx??0)+1}`, ym]); }); } catch {}
  });
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'budget-transactions.csv'; a.click();
  URL.revokeObjectURL(url);
}

// ── Pay-period calendar math ──────────────────────────────────────────────────
// Returns Date objects for every pay date that falls within the given ym.
function getPayDatesInMonth(anchorDate, ym) {
  if (!anchorDate) return [];
  const anchor = new Date(anchorDate + 'T12:00:00');
  const [y,m] = ym.split('-').map(Number);
  const monthStart = new Date(y, m-1, 1);
  const monthEnd   = new Date(y, m, 0);
  const msDay = 86400000;
  const diffDays = Math.round((monthStart - anchor) / msDay);
  const n0 = Math.floor(diffDays / 14);
  const results = [];
  for (let n = n0 - 1; n <= n0 + 5; n++) {
    const d = new Date(anchor.getTime() + n * 14 * msDay);
    const nd = new Date(d.getFullYear(), d.getMonth(), d.getDate()); // midnight
    if (nd >= monthStart && nd <= monthEnd) results.push(nd);
  }
  return results.sort((a,b) => a-b);
}

// Returns array of period descriptors for a month.
// Each: { index, payDate, startDay, endDay, dateLabel }
// Chains continuously from the anchor month so each month picks up exactly where
// the previous left off — periods may start in the prior calendar month.
function getPayPeriodsForMonth(anchorDate, ym, numPeriods, threePaycheckMonths) {
  if (!anchorDate) return [];
  const anchor = new Date(anchorDate + 'T12:00:00');
  const anchorNorm = new Date(anchor.getFullYear(), anchor.getMonth(), anchor.getDate());
  const [ty, tm] = ym.split('-').map(Number);
  const ay = anchor.getFullYear();
  const am = anchor.getMonth() + 1;
  const threeMonths = threePaycheckMonths || [];
  const msDay = 86400000;

  // Count how many biweekly periods to skip from anchor month to reach ym
  let periodOffset = 0;
  if (ty > ay || (ty === ay && tm > am)) {
    let cy = ay, cm = am;
    while (cy < ty || (cy === ty && cm < tm)) {
      periodOffset += threeMonths.includes(cm) ? 3 : 2;
      cm++; if (cm > 12) { cm = 1; cy++; }
    }
  } else if (ty < ay || (ty === ay && tm < am)) {
    let cy = ay, cm = am;
    do {
      cm--; if (cm < 1) { cm = 12; cy--; }
      periodOffset -= threeMonths.includes(cm) ? 3 : 2;
    } while (cy > ty || (cy === ty && cm > tm));
  }

  const n = numPeriods || 2;
  return Array.from({ length: n }, (_, i) => {
    const pd = new Date(anchorNorm.getTime() + (periodOffset + i) * 14 * msDay);
    const payDate = new Date(pd.getFullYear(), pd.getMonth(), pd.getDate());
    const periodEnd = new Date(payDate.getTime() + 13 * msDay);
    return {
      index: i,
      payDate,
      startDay: payDate.getDate(),
      endDay: periodEnd.getDate(),
      dateLabel: `${shortDate(payDate)} – ${shortDate(periodEnd)}`,
    };
  });
}

// Which period index (0-based) does a bill's due day fall into?
function billPeriodIdx(bill, periods) {
  if (!bill.dueDay || !periods.length) return 0;
  if (bill.dueDay < periods[0].startDay) return 0; // before first payday → P1
  for (let i = 0; i < periods.length; i++) {
    if (bill.dueDay <= periods[i].endDay) return i;
  }
  return periods.length - 1;
}

function nextDueDate(dueDay) {
  if (!dueDay) return '—';
  const now = new Date(); const d = new Date(now.getFullYear(), now.getMonth(), dueDay);
  if (d < now) d.setMonth(d.getMonth()+1);
  return shortDate(d);
}

// Migrate old income format {p1c1,p1c2,...} → periodIncomes[]
function migrateMonth(mo) {
  let out = mo;
  if (!out.periodIncomes) {
    const inc = out.income || {};
    out = {
      ...out,
      periodIncomes: [
        { earned: (inc.p1c1||0)+(inc.p1c2||0)+(inc.p1c3||0), rollover: inc.p1roll||0 },
        { earned: (inc.p2c1||0)+(inc.p2c2||0), rollover: inc.p2roll||0 },
      ],
    };
  }
  if (!out.periodBudgets) {
    const old = out.budgets || DEF_CATS;
    const n = (out.periodIncomes||[]).length || 2;
    out = { ...out, periodBudgets: Object.fromEntries(Array.from({length:n},(_,i)=>[i,{...old}])) };
  }
  return out;
}

// Default earned per period = sum of biweekly sources
const DEF_PERIOD_EARNED = DEF_INCOME_SOURCES.filter(s=>s.frequency==='biweekly').reduce((s,i)=>s+i.amount,0);

function makePeriodBudgets(n) {
  return Object.fromEntries(Array.from({length:n}, (_,i) => [i, { ...DEF_CATS }]));
}
function makeMonth(numPeriods) {
  const n = numPeriods || 2;
  return {
    periodIncomes: Array.from({length:n}, () => ({ earned: DEF_PERIOD_EARNED, rollover: 0 })),
    txns: [],
    paid: {},
    periodBudgets: makePeriodBudgets(n),
  };
}

// ── Summary dashboard metric helpers ────────────────────────────────────────────
function computeMonthMetrics(ym, monthsObj, bills) {
  const raw = monthsObj[ym];
  if (!raw) return { totalIncome:0, totalBillsPlanned:0, totalBillsPaid:0, totalCatBudget:0, totalCatSpent:0, totalTithe:0 };
  const mo = migrateMonth(raw);
  const estAmts = mo.estimatedBillAmounts || {};
  const effAmt = b => b.type === 'estimated' ? (estAmts[b.id] ?? b.amount) : b.amount;
  const paid = mo.paid || {};
  let totalIncome = 0, totalTithe = 0;
  (mo.periodIncomes||[]).forEach(pi => { const earned = pi.earned||0; totalIncome += earned + (pi.rollover||0); totalTithe += earned*0.1; });
  const totalBillsPlanned = bills.reduce((s,b)=>s+effAmt(b),0);
  const totalBillsPaid    = bills.filter(b=>paid[b.id]).reduce((s,b)=>s+effAmt(b),0);
  const totalCatBudget    = Object.values(mo.periodBudgets||{}).reduce((s,pb)=>s+Object.values(pb).reduce((a,v)=>a+v,0),0);
  const totalCatSpent     = (mo.txns||[]).reduce((s,t)=>s+t.amount,0);
  return { totalIncome, totalBillsPlanned, totalBillsPaid, totalCatBudget, totalCatSpent, totalTithe };
}

function buildAnnualData(year, monthsObj, bills) {
  const rows = [];
  for (let m=1; m<=12; m++) {
    const ym = `${year}-${String(m).padStart(2,'0')}`;
    const met = computeMonthMetrics(ym, monthsObj, bills);
    const expenseActual  = met.totalBillsPaid   + met.totalCatSpent + met.totalTithe;
    const expensePlanned = met.totalBillsPlanned + met.totalCatBudget + met.totalTithe;
    rows.push({ ym, label: monthLabel(ym).slice(0,3), income: met.totalIncome, expenseActual, expensePlanned });
  }
  return rows;
}

function billsBreakdownForMonth(ym, monthsObj, bills) {
  const raw = monthsObj[ym];
  const mo = raw ? migrateMonth(raw) : { estimatedBillAmounts:{}, paid:{} };
  const estAmts = mo.estimatedBillAmounts || {};
  const paid = mo.paid || {};
  const effAmt = b => b.type === 'estimated' ? (estAmts[b.id] ?? b.amount) : b.amount;
  return bills.map(b => ({ id:b.id, name:b.name, planned:effAmt(b), actual: paid[b.id] ? effAmt(b) : 0, isPaid: !!paid[b.id] }));
}

function categoryTotalsForMonth(ym, monthsObj) {
  const raw = monthsObj[ym];
  const budgetByCat = {}, spentByCat = {};
  if (raw) {
    const mo = migrateMonth(raw);
    Object.values(mo.periodBudgets||{}).forEach(pb => { Object.entries(pb).forEach(([c,v]) => { budgetByCat[c]=(budgetByCat[c]||0)+v; }); });
    (mo.txns||[]).forEach(t => { spentByCat[t.cat]=(spentByCat[t.cat]||0)+t.amount; });
  }
  const allCats = new Set([...Object.keys(budgetByCat), ...Object.keys(spentByCat)]);
  return [...allCats].filter(c => (budgetByCat[c]||0)>0 || (spentByCat[c]||0)>0).map(c => ({ cat:c, budget:budgetByCat[c]||0, spent:spentByCat[c]||0 }));
}

                {gi > 0 && <div style={{ width:1, height:22, background:'#1e293b', margin:'0 2px', flexShrink:0 }} />}
                {group.map(t => (
                  <button key={t} onClick={()=>setTab(t)}
                    style={{ ...S.btn, background:'transparent', color:tab===t?'#fff':'#64748b',
                      fontWeight:tab===t?600:400, textTransform:'capitalize',
                      padding: isMobile ? '7px 9px' : '8px 13px',
                      display:'flex', alignItems:'center', gap:5, borderRadius:'8px 8px 0 0',
                      borderBottom: tab===t ? '2px solid #3b82f6' : '2px solid transparent',
                      flexShrink:0,
                      transition:'color 0.15s, border-color 0.15s' }}>
                    <i className={`fa-solid ${TAB_ICONS[t]}`} style={{ fontSize:12, color:tab===t?'#60a5fa':'#475569' }} />
                    <span className="tab-label">{t}</span>
                  </button>
                ))}
              </React.Fragment>
            ))}
          </nav>
        </div>
      </div>

      <div className="mob-content" style={{ padding:'20px 16px' }}>
        {tab==='overview'      && <Overview bills={bills} setBills={setBills} income={income} setIncome={setIncome} debts={debts} sched={sched} setSched={setSched} funds={funds} months={months} cats={cats} setCats={setCats} overviewLayout={overviewLayout} setOverviewLayout={setOverviewLayout} />}
        {tab==='month budget'  && <MonthBudget mo={mo} updMo={updMo} bills={bills} income={income} ym={ym} toggleBillPaid={toggleBillPaid} periods={periods} effectiveIncomes={effectiveIncomes} numPeriods={numPeriods} funds={funds} setFunds={setFunds} cats={cats} months={months} />}
        {tab==='sinking funds' && <SinkingFunds funds={funds} setFunds={setFunds} />}
        {tab==='debts'         && <Debts debts={debts} setDebts={setDebts} ym={ym} />}
        {tab==='accounts'      && <Accounts accounts={accounts} setAccounts={setAccounts} debts={debts} />}
        {tab==='summary'       && <SummaryDashboard months={months} bills={bills} />}
        {tab==='calendar'      && <CalendarTab income={income} bills={bills} sched={sched} />}
      </div>
    </div>
  );
}

// ── CollapsibleCard ───────────────────────────────────────────────────────────
// A card with a collapse toggle and a drag handle for reordering.
// dragId / onDragStart / onDragOver / onDrop handle section reordering.
function CollapsibleCard({ id, icon, title, accent, collapsed, onToggle, onDragStart, onDragOver, onDrop, onDragEnd, isDragOver, headerRight, children }) {
  return (
    <div
      draggable
      onDragStart={e => { e.dataTransfer.effectAllowed = 'move'; onDragStart(id); }}
      onDragOver={e => { e.preventDefault(); onDragOver(id); }}
      onDrop={e => { e.preventDefault(); onDrop(id); }}
      onDragEnd={onDragEnd}
      style={{ ...S.card, outline: isDragOver ? '2px dashed #3b82f6' : '2px solid transparent', transition:'outline 0.1s, opacity 0.15s', cursor:'default', marginBottom:10 }}
    >
      {/* Header row — drag handle + collapse toggle + section header + right controls */}
      <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom: collapsed ? 0 : 14 }}>
        {/* Drag handle */}
        <span title="Drag to reorder" style={{ color:'#334155', cursor:'grab', fontSize:15, flexShrink:0, padding:'2px 4px', marginRight:2, lineHeight:1 }}>⠿</span>
        {/* Collapse toggle */}
        <button onClick={onToggle} style={{ ...S.btn, background:'transparent', padding:'2px 6px', color:'#475569', flexShrink:0 }}>
          <i className={`fa-solid fa-chevron-${collapsed ? 'right' : 'down'}`} style={{ fontSize:10 }} />
        </button>
        {/* Title — clicking also toggles */}
        <h3 onClick={onToggle} style={{ fontSize:14, fontWeight:700, color:accent||ACCENT.general, display:'flex', alignItems:'center', gap:7, flex:1, cursor:'pointer', userSelect:'none' }}>
          <span style={{ width:3, height:16, background:accent||ACCENT.general, borderRadius:2, display:'inline-block', flexShrink:0 }} />
          <i className={`fa-solid ${icon}`} style={{ fontSize:13 }} />
          {title}
        </h3>
        {/* Right controls (Add button, etc.) — only shown when expanded */}
        {!collapsed && headerRight}
      </div>
      {/* Body */}
      {!collapsed && children}
    </div>
  );
}

// ── Overview ──────────────────────────────────────────────────────────────────
function Overview({ bills, setBills, income, setIncome, debts, sched, setSched, funds, months, cats, setCats, overviewLayout, setOverviewLayout }) {
  const [showAddBill,   setShowAddBill]   = useState(false);
  const [showAddIncome, setShowAddIncome] = useState(false);
  const [editBillId,    setEditBillId]    = useState(null);
  const [editBill,      setEditBill]      = useState({});
  const [editIncId,     setEditIncId]     = useState(null);
  const [editInc,       setEditInc]       = useState({});
  const [newBill, setNewBill] = useState({ name:'', amount:'', period:'1', dueDay:'', linkedDebtId:'', type:'recurring' });
  const [newInc,  setNewInc]  = useState({ name:'', amount:'', frequency:'biweekly', day1:1, day2:15 });
  const [showAddCat, setShowAddCat] = useState(false);
  const [newCat,     setNewCat]     = useState({ name:'', amount:'' });
  const [editCatId,  setEditCatId]  = useState(null);
  const [editCat,    setEditCat]    = useState({});
  const { ask: confirmDelete, Dialog: ConfirmDialog } = useConfirm();
  const [billErrors, setBillErrors]   = useState({});
  const [incErrors,  setIncErrors]    = useState({});
  const [catErrors,  setCatErrors]    = useState({});

  // Section order + collapse state (persisted)
  const SECTION_IDS = ['payschedule','income','bills','categories'];
  const sectionOrder = (overviewLayout?.order || SECTION_IDS).filter(id => SECTION_IDS.includes(id));
  const collapsed    = overviewLayout?.collapsed || {};
  const toggleCollapse = id => setOverviewLayout(l => ({ ...l, collapsed: { ...(l.collapsed||{}), [id]: !(l.collapsed||{})[id] } }));

  // Drag-to-reorder state (local only — no need to persist the in-flight drag)
  const [dragSrc,  setDragSrc]  = useState(null);
  const [dragOver, setDragOver] = useState(null);
  const handleDragStart = id => setDragSrc(id);
  const handleDragOver  = id => { if (id !== dragSrc) setDragOver(id); };
  const handleDrop      = id => {
    if (!dragSrc || id === dragSrc) return;
    setOverviewLayout(l => {
      const order = [...(l.order || SECTION_IDS)];
      const from = order.indexOf(dragSrc);
      const to   = order.indexOf(id);
      if (from === -1 || to === -1) return l;
      order.splice(from, 1);
      order.splice(to, 0, dragSrc);
      return { ...l, order };
    });
    setDragSrc(null); setDragOver(null);
  };
  const handleDragEnd = () => { setDragSrc(null); setDragOver(null); };

  const addCat = () => {
    if (!newCat.name) return;
    setCats(p=>[...p,{id:uid(),name:newCat.name,amount:parseFloat(newCat.amount)||0}]);
    setNewCat({name:'',amount:''});
    setShowAddCat(false);
  };
  const saveCat = () => {
    setCats(p=>p.map(c=>c.id!==editCatId?c:{...c,name:editCat.name,amount:parseFloat(editCat.amount)||0}));
    setEditCatId(null);
  };

  const totalMonthlyIncome = income.reduce((s,i)=>s+freqMonthly(i.frequency,i.amount),0);
  const totalMonthlyBills  = bills.reduce((s,b)=>s+b.amount,0);
  const totalMonthlyTithe  = totalMonthlyIncome * 0.1;
  const totalMonthlyCatBudget = (cats||[]).reduce((s,c)=>s+c.amount,0);
  const totalMonthlyFundContrib = (funds||[]).reduce((s,f)=>s+(f.monthlyContribution||0),0);
  const totalMonthlyExpenses = totalMonthlyBills + totalMonthlyTithe + totalMonthlyCatBudget + totalMonthlyFundContrib;
  const netMonthly = totalMonthlyIncome - totalMonthlyExpenses;

  const addBill = () => {
    const errs = {};
    if (!newBill.name.trim()) errs.name = 'Required';
    if (!newBill.amount || isNaN(parseFloat(newBill.amount))) errs.amount = 'Required';
    if (Object.keys(errs).length) { setBillErrors(errs); return; }
    setBillErrors({});
    setBills(p=>[...p,{id:uid(),name:newBill.name,amount:parseFloat(newBill.amount)||0,period:+newBill.period,dueDay:+newBill.dueDay||null,linkedDebtId:newBill.linkedDebtId||null,type:newBill.type||'recurring'}]);
    setNewBill({name:'',amount:'',period:'1',dueDay:'',linkedDebtId:'',type:'recurring'});
    setShowAddBill(false);
  };
  const addInc = () => {
    const errs = {};
    if (!newInc.name.trim()) errs.name = 'Required';
    if (!newInc.amount || isNaN(parseFloat(newInc.amount))) errs.amount = 'Required';
    if (Object.keys(errs).length) { setIncErrors(errs); return; }
    setIncErrors({});
    const src = {id:uid(),name:newInc.name,amount:parseFloat(newInc.amount)||0,frequency:newInc.frequency};
    if (newInc.frequency==='bimonthly') { src.day1=+newInc.day1||1; src.day2=+newInc.day2||15; }
    setIncome(p=>[...p,src]);

  const saveEdit  = () => {

                      <td style={{ ...S.td, color:'#fbbf24', fontWeight:600 }}>{fmt(b.amount)}{b.type==='estimated'&&<span style={{ color:'#94a3b8', fontSize:10, marginLeft:3 }}>est.</span>}</td>
