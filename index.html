function SinkingFundContributions({ funds, setFunds, ym, periodIdx }) {
  const [amounts, setAmounts] = useState({});
  const source = `budget:${ym}:P${periodIdx + 1}`;

  const deposit = (fundId) => {
    const amt = parseFloat(amounts[fundId]) || 0;
    if (!amt) return;
    setFunds(prev => prev.map(f => f.id !== fundId ? f : {
      ...f,
      balance: f.balance + amt,
      txns: [...(f.txns || []), { id: uid(), date: today(), amount: amt, source }],
    }));
    setAmounts(a => ({ ...a, [fundId]: '' }));
  };

  const periodTxnTotal = (fund) =>
    (fund.txns || []).filter(t => t.source === source).reduce((s, t) => s + t.amount, 0);

  return (
    <div style={{ marginTop: 14, borderTop: '1px solid #0f1117', paddingTop: 12 }}>
      <div style={{ fontSize: 11, color: '#475569', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 8 }}>Sinking Funds</div>
      {funds.map(f => {
        const contributed = periodTxnTotal(f);
        return (
          <div key={f.id} style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 7 }}>
            <span style={{ flex: 1, fontSize: 12, color: '#94a3b8', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{f.name}</span>
            {contributed > 0 && <span style={{ fontSize: 11, color: '#34d399', whiteSpace: 'nowrap' }}>+{fmt(contributed)}</span>}
            <input type="number" step="0.01" placeholder="0.00" value={amounts[f.id] || ''}
              onChange={e => setAmounts(a => ({ ...a, [f.id]: e.target.value }))}
              style={{ ...S.input, width: 90, fontSize: 11, padding: '3px 7px', textAlign: 'right' }} />
            <button onClick={() => deposit(f.id)}
              style={{ ...S.btn, background: '#064e3b', color: '#34d399', padding: '4px 9px', fontSize: 11, whiteSpace: 'nowrap' }}>+ Add</button>
          </div>
        );
      })}
    </div>
  );
}

    </div>
  );

            ))}

        );
      })()}
    </div>
  );

// Amortization helper: given balance, monthly rate, and payment, return months to payoff
function amortizeMonths(balance, monthlyRate, payment) {
  if (payment <= 0) return null;
  if (monthlyRate <= 0) return Math.ceil(balance / payment);
  const interest = balance * monthlyRate;
  if (payment <= interest) return null; // payment doesn't cover interest
  return Math.ceil(-Math.log(1 - (balance * monthlyRate) / payment) / Math.log(1 + monthlyRate));
}
function amortizeTimeline(startBal, monthlyRate, payment, pmtMap, firstYm, maxRows) {
  const rows = [];
  let planned = startBal;
  let actual  = startBal;
  let cur = firstYm;
  for (let i = 0; i < maxRows; i++) {
    const pmt = pmtMap[cur];
    const plannedInterest = planned * monthlyRate;
    const plannedPrincipal = Math.min(planned, Math.max(0, payment - plannedInterest));
    planned = Math.max(0, planned - plannedPrincipal);
    const actualPmt = pmt ? pmt.actual : null;
    if (actualPmt !== null) {
      const actualInterest = actual * monthlyRate;
      const actualPrincipal = Math.min(actual, Math.max(0, actualPmt - actualInterest));
      actual = Math.max(0, actual - actualPrincipal);
    } else {
      actual = null;
    }
    rows.push({ ym:cur, planned, actual, plannedInterest, actualPmt });
    if (planned <= 0) break;
    cur = adjMonth(cur, 1);
  }
  return rows;
}

function Debts({ debts, setDebts, ym }) {
  const [nd, setNd] = useState({ name:'', balance:'', monthlyPmt:'', apr:'' });
  const [errors, setErrors] = useState({});
  const totalDebt = debts.reduce((s,d)=>s+d.balance,0);
  const totalPmt  = debts.reduce((s,d)=>s+d.monthlyPmt,0);

  const recordManual = (id,amt) => setDebts(prev=>prev.map(d=>d.id!==id?d:{
    ...d, balance:Math.max(0,d.balance-amt),
    payments:{...d.payments,[ym]:{planned:d.monthlyPmt,actual:amt,source:'manual'}}
  }));
  const undo = id => setDebts(prev=>prev.map(d=>{
    if(d.id!==id) return d;
    const k=Object.keys(d.payments).find(k=>k.startsWith(ym));
    if(!k) return d;
    const p=d.payments[k]; const r={...d.payments}; delete r[k];
    return {...d, balance:d.balance+p.actual, payments:r};
  }));
  const update = (id,fields) => setDebts(prev=>prev.map(d=>d.id!==id?d:{...d,...fields}));
  const add = () => {
    const errs = {};
    if (!nd.name.trim()) errs.name = 'Required';
    if (!nd.balance || isNaN(parseFloat(nd.balance))) errs.balance = 'Required';
    if (Object.keys(errs).length) { setErrors(errs); return; }
    setErrors({});
    setDebts(prev=>[...prev,{id:uid(),name:nd.name,balance:parseFloat(nd.balance),monthlyPmt:parseFloat(nd.monthlyPmt)||0,apr:parseFloat(nd.apr)||0,startBalance:parseFloat(nd.balance),payments:{}}]);
    setNd({name:'',balance:'',monthlyPmt:'',apr:''});
  };

  // Est payoff using first debt's APR for the summary stat — weighted avg would be better but overkill
  const avgMonthlyRate = debts.length ? debts.reduce((s,d)=>s+((d.apr||0)/100/12),0)/debts.length : 0;
  const estMonths = totalPmt > 0 ? amortizeMonths(totalDebt, avgMonthlyRate, totalPmt) : null;

  return (
    <div>
      <div className="stat-row" style={{ display:'flex', gap:10, flexWrap:'wrap', marginBottom:16 }}>
        <StatCard label="Total Debt"       value={fmt(totalDebt)}      color={ACCENT.bills}  icon="fa-credit-card" />
        <StatCard label="Monthly Payments" value={fmt(totalPmt)+'/mo'} color={ACCENT.debts}  icon="fa-money-bill-transfer" />
        <StatCard label="Est. Payoff"      value={estMonths ? estMonths+' mo' : '—'} color="#94a3b8" icon="fa-flag-checkered" />
      </div>
      <div style={S.card}>
        <SectionHeader icon="fa-circle-plus" title="Add Debt" accent={ACCENT.debts} />
        <div style={{ display:'flex', gap:10, flexWrap:'wrap' }}>
          <div style={{ flex:2 }}>
            <label style={S.lbl}>Name</label>
            <input style={{ ...S.input, ...(errors.name?{borderColor:'#ef4444'}:{}) }} value={nd.name} onChange={e=>{ setNd(f=>({...f,name:e.target.value})); setErrors(p=>({...p,name:null})); }} />
            {errors.name && <div className="field-error-msg">{errors.name}</div>}
          </div>
          <div>
            <label style={S.lbl}>Balance</label>
            <input type="number" step="0.01" style={{ ...S.input, ...(errors.balance?{borderColor:'#ef4444'}:{}) }} value={nd.balance} onChange={e=>{ setNd(f=>({...f,balance:e.target.value})); setErrors(p=>({...p,balance:null})); }} />
            {errors.balance && <div className="field-error-msg">{errors.balance}</div>}
          </div>
          <div><label style={S.lbl}>Monthly Pmt</label><input type="number" step="0.01" style={S.input} value={nd.monthlyPmt} onChange={e=>setNd(f=>({...f,monthlyPmt:e.target.value}))} /></div>
          <div style={{ minWidth:80 }}><label style={S.lbl}>APR %</label><input type="number" step="0.1" min="0" max="100" placeholder="0" style={S.input} value={nd.apr} onChange={e=>setNd(f=>({...f,apr:e.target.value}))} /></div>
          <div style={{ display:'flex', alignItems:'flex-end' }}><PrimaryBtn onClick={add}>+ Add</PrimaryBtn></div>
        </div>
      </div>
      {debts.length === 0 && <EmptyState icon="fa-credit-card" message="No debts tracked yet. Add one above." />}
      {debts.map(d=><DebtCard key={d.id} debt={d} ym={ym}
        onRecord={amt=>recordManual(d.id,amt)}
        onUndo={()=>undo(d.id)}
        onUpdate={fields=>update(d.id,fields)}
        onRemove={()=>setDebts(p=>p.filter(x=>x.id!==d.id))} />)}
    </div>
  );
}

function DebtCard({ debt, ym, onRecord, onUndo, onUpdate, onRemove }) {
  const [payAmt,   setPayAmt]   = useState('');
  const [editing,  setEditing]  = useState(false);
  const [ef,       setEf]       = useState({});
  const [showHist, setShowHist] = useState(false);
  const [showPlan, setShowPlan] = useState(false);

  const pmtKey  = Object.keys(debt.payments||{}).find(k=>k.startsWith(ym));
  const payment = pmtKey ? debt.payments[pmtKey] : null;
  const monthlyRate = (debt.apr||0) / 100 / 12;
  const monthsLeft  = debt.monthlyPmt > 0 ? amortizeMonths(debt.balance, monthlyRate, debt.monthlyPmt) : null;
  const payoffDate  = monthsLeft ? (()=>{ const d=new Date(); d.setMonth(d.getMonth()+monthsLeft); return d.toLocaleDateString('en-US',{month:'short',year:'numeric'}); })() : null;
  const monthlyInterest = debt.balance * monthlyRate;
  const totalInterest = (() => {
    if (!monthsLeft || monthlyRate === 0) return 0;
    const timeline = amortizeTimeline(debt.balance, monthlyRate, debt.monthlyPmt, {}, ym, monthsLeft+2);
    return timeline.reduce((s,r)=>s+(r.plannedInterest||0), 0);
  })();

  // Payment history sorted newest first
  const history = Object.entries(debt.payments||{}).sort((a,b)=>b[0].localeCompare(a[0]));

  // Planned vs actual timeline with interest
  const startBal = debt.startBalance || debt.balance;
  const sorted = Object.entries(debt.payments||{}).sort((a,b)=>a[0].localeCompare(b[0]));
  const pmtMap = Object.fromEntries(sorted);
  const firstYm = sorted.length ? sorted[0][0].slice(0,7) : ym;
  const timeline = amortizeTimeline(startBal, monthlyRate, debt.monthlyPmt, pmtMap, firstYm, Math.min(36, (monthsLeft||36)+2));

  const startEdit = () => { setEf({ name:debt.name, balance:String(debt.balance), monthlyPmt:String(debt.monthlyPmt), apr:String(debt.apr||0) }); setEditing(true); };
  const saveEdit  = () => { onUpdate({ name:ef.name, balance:parseFloat(ef.balance)||0, monthlyPmt:parseFloat(ef.monthlyPmt)||0, apr:parseFloat(ef.apr)||0, startBalance:debt.startBalance||debt.balance }); setEditing(false); };

  if (editing) return (
    <div style={S.card}>
      <div style={{ fontSize:13, fontWeight:600, color:'#60a5fa', marginBottom:12 }}>Edit Debt</div>
      <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
        <div><label style={S.lbl}>Name</label><input style={S.input} value={ef.name} onChange={e=>setEf(f=>({...f,name:e.target.value}))} /></div>
        <div><label style={S.lbl}>Current Balance</label><input type="number" step="0.01" style={S.input} value={ef.balance} onChange={e=>setEf(f=>({...f,balance:e.target.value}))} /></div>
        <div><label style={S.lbl}>Monthly Payment</label><input type="number" step="0.01" style={S.input} value={ef.monthlyPmt} onChange={e=>setEf(f=>({...f,monthlyPmt:e.target.value}))} /></div>
        <div><label style={S.lbl}>APR %</label><input type="number" step="0.1" min="0" max="100" style={S.input} value={ef.apr} onChange={e=>setEf(f=>({...f,apr:e.target.value}))} /></div>
        <div style={{ display:'flex', gap:8, marginTop:4 }}>
          <PrimaryBtn onClick={saveEdit}>Save</PrimaryBtn>
          <button onClick={()=>setEditing(false)} style={S.btn}>Cancel</button>
        </div>
      </div>
    </div>
  );

  return (
    <div style={S.card}>
      {/* Header */}
      <div style={{ display:'flex', justifyContent:'space-between', marginBottom:14 }}>
        <div>
          <span style={{ fontWeight:600, fontSize:15 }}>{debt.name}</span>
          {(debt.apr||0) > 0 && <span style={{ marginLeft:8, fontSize:11, color:'#fb923c', background:'#1c0a00', border:'1px solid #7c2d12', padding:'1px 6px', borderRadius:8 }}>{debt.apr}% APR</span>}
        </div>
        <div style={{ display:'flex', gap:4 }}>
          <button onClick={startEdit} style={{ ...S.btn, padding:'5px 9px', fontSize:12, color:'#60a5fa' }}>Edit</button>
          <DelBtn onDelete={onRemove} title="Delete debt" />
        </div>
      </div>

      {/* Stats */}
      <div className="stat-row" style={{ display:'flex', gap:12, flexWrap:'wrap', marginBottom:14 }}>
        <div style={{ flex:'1 1 100px' }}><div style={S.lbl}>Balance</div><div className="debt-balance" style={{ fontWeight:700, color:'#f87171', fontSize:20 }}>{fmt(debt.balance)}</div></div>
        <div style={{ flex:'1 1 90px' }}><div style={S.lbl}>Monthly Pmt</div><div style={{ fontWeight:600, color:'#fbbf24', fontSize:15 }}>{fmt(debt.monthlyPmt)}</div></div>
        {monthlyRate > 0 && <div style={{ flex:'1 1 80px' }}><div style={S.lbl}>Interest/mo</div><div style={{ fontWeight:600, color:'#fb923c', fontSize:13 }}>{fmt(monthlyInterest)}</div></div>}
        {monthsLeft&&<div style={{ flex:'1 1 90px' }}><div style={S.lbl}>Est. Payoff</div><div style={{ fontWeight:600, fontSize:13 }}>{monthsLeft} mo · {payoffDate}</div></div>}
        {monthlyRate > 0 && totalInterest > 0 && <div style={{ flex:'1 1 90px' }}><div style={S.lbl}>Total Interest</div><div style={{ fontWeight:600, color:'#fb923c', fontSize:13 }}>{fmt(totalInterest)}</div></div>}
        {payment&&<div style={{ flex:'1 1 90px' }}><div style={S.lbl}>This Month</div><div style={{ color:'#34d399', fontWeight:600, fontSize:13 }}>{fmt(payment.actual)} {payment.source==='bill'?<span style={{ color:'#a78bfa', fontSize:11 }}>via bill</span>:<span style={{ color:'#94a3b8', fontSize:11 }}>manual</span>}</div></div>}
      </div>

      {/* Progress bar */}
      {debt.startBalance>0 && <><ProgressBar pct={Math.max(0,100-((debt.balance/debt.startBalance)*100))} color="#34d399" /><div style={{ fontSize:11, color:'#475569', marginTop:4, marginBottom:10 }}>{((1-(debt.balance/debt.startBalance))*100).toFixed(0)}% paid off</div></>}

      {/* Record payment */}
      {!payment ? (
        <div style={{ display:'flex', gap:8, marginBottom:10 }}>
          <input type="number" step="0.01" placeholder={`${debt.monthlyPmt} (planned)`} value={payAmt} onChange={e=>setPayAmt(e.target.value)} style={{ ...S.input, maxWidth:200 }} />
          <PrimaryBtn onClick={()=>{onRecord(parseFloat(payAmt)||debt.monthlyPmt);setPayAmt('');}}>Record Payment</PrimaryBtn>
        </div>
      ) : (
        <button onClick={onUndo} style={{ ...S.btn, color:'#64748b', fontSize:12, marginBottom:10 }}>↩ Undo payment</button>
      )}

      {/* Payment history */}
      {history.length>0 && <>
        <button onClick={()=>setShowHist(v=>!v)} style={{ ...S.btn, fontSize:11, color:'#475569', width:'100%', textAlign:'center', marginBottom:4 }}>
          {showHist?'▴ Hide':'▾ Show'} payment history ({history.length})
        </button>
        {showHist && <div style={{ marginBottom:8 }}>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:4, padding:'6px 0', borderBottom:'1px solid #0f1117' }}>
            {['Month','Planned','Actual'].map(h=><span key={h} style={{ ...S.lbl, marginBottom:0 }}>{h}</span>)}
          </div>
          {history.map(([k,p])=>(
            <div key={k} style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:4, padding:'5px 0', borderBottom:'1px solid #0f1117', fontSize:12 }}>
              <span style={{ color:'#94a3b8' }}>{monthLabel(k.slice(0,7))}</span>
              <span style={{ color:'#fbbf24' }}>{fmt(p.planned)}</span>
              <span style={{ color: p.actual>=p.planned?'#34d399':'#f87171', fontWeight:600 }}>{fmt(p.actual)} {p.source==='bill'&&<span style={{ color:'#a78bfa', fontSize:10 }}>bill</span>}</span>
            </div>
          ))}
        </div>}
      </>}

      {/* Planned vs actual timeline */}
      {timeline.length>0 && <>
        <button onClick={()=>setShowPlan(v=>!v)} style={{ ...S.btn, fontSize:11, color:'#475569', width:'100%', textAlign:'center', marginBottom:4 }}>
          {showPlan?'▴ Hide':'▾ Show'} payoff timeline
        </button>
        {showPlan && <div style={{ maxHeight:220, overflowY:'auto' }}>
          <div style={{ display:'grid', gridTemplateColumns: monthlyRate>0 ? '1fr 1fr 1fr 70px' : '1fr 1fr 1fr', gap:4, padding:'6px 0', borderBottom:'1px solid #0f1117' }}>
            {['Month','Planned Bal','Actual Bal', ...(monthlyRate>0?['Interest']:[])]
              .map(h=><span key={h} style={{ ...S.lbl, marginBottom:0 }}>{h}</span>)}
          </div>
          {timeline.map(row=>(
            <div key={row.ym} style={{ display:'grid', gridTemplateColumns: monthlyRate>0 ? '1fr 1fr 1fr 70px' : '1fr 1fr 1fr', gap:4, padding:'5px 0', borderBottom:'1px solid #0f1117', fontSize:12 }}>
              <span style={{ color:'#94a3b8' }}>{monthLabel(row.ym)}</span>
              <span style={{ color:'#60a5fa' }}>{fmt(row.planned)}</span>
              <span style={{ color: row.actual===null?'#334155':row.actual<=row.planned?'#34d399':'#f87171', fontWeight: row.actual!==null?600:400 }}>
                {row.actual!==null ? fmt(row.actual) : '—'}
              </span>
              {monthlyRate>0 && <span style={{ color:'#fb923c', fontSize:11 }}>{fmt(row.plannedInterest||0)}</span>}
            </div>
          ))}
        </div>}
      </>}
    </div>
  );
}

// ── Chart primitives ─────────────────────────────────────────────────────────
function topRoundedRectPath(x, y, w, h, r) {
  if (h <= 0 || w <= 0) return '';
  r = Math.min(r, w/2, h);
  return `M${x},${y+h} L${x},${y+r} Q${x},${y} ${x+r},${y} L${x+w-r},${y} Q${x+w},${y} ${x+w},${y+r} L${x+w},${y+h} Z`;
}
function truncateLabel(s, n=10) { return s.length>n ? s.slice(0,n-1)+'…' : s; }

function ChartLegend({ series }) {
  return (
    <div style={{ display:'flex', gap:14, flexWrap:'wrap', marginTop:10, justifyContent:'center' }}>
      {series.map(s=>(
        <div key={s.key} style={{ display:'flex', alignItems:'center', gap:6 }}>
          <span style={{ width:12, height:12, borderRadius:3, background:s.color, display:'inline-block', flexShrink:0 }} />
          <span style={{ fontSize:11, color:'#94a3b8' }}>{s.label}</span>
        </div>
      ))}
    </div>
  );
}

function ChartTooltip({ title, series, values, valuePrefix, x, y }) {
  return (
    <div style={{ position:'absolute', left:x, top:y, transform:'translate(-50%, -110%)', pointerEvents:'none',
      background:'#0c1525', border:'1px solid #334155', borderRadius:10, padding:'9px 14px', fontSize:12,
      boxShadow:'0 8px 24px rgba(0,0,0,0.5)', zIndex:20, minWidth:140, whiteSpace:'nowrap' }}>
      <div style={{ color:'#94a3b8', marginBottom:5, fontWeight:600, fontSize:11 }}>{title}</div>
      {series.map(s=>(
        <div key={s.key} style={{ display:'flex', justifyContent:'space-between', gap:16, marginBottom:2 }}>
          <span style={{ color:'#64748b', display:'flex', alignItems:'center' }}>
            <span style={{ display:'inline-block', width:10, height:10, borderRadius:3, background:s.color, marginRight:6 }} />
            {s.label}
          </span>
          <span style={{ fontWeight:700, color:'#e2e8f0' }}>{valuePrefix}{Math.round(values[s.key]||0).toLocaleString('en-US')}</span>
        </div>
      ))}
    </div>
  );
}

function BarChart({ categories, series, data, height=200, valuePrefix='$' }) {
  const [hoverIdx, setHoverIdx] = useState(null);
  const n = categories.length;
  if (n === 0) return null;
  const slotW = 64, barGap = 2, leftPad = 46, rightPad = 14, topPad = 10, botPad = 26;
  const barW = Math.min(22, (slotW - 16 - barGap*(series.length-1)) / series.length);
  const W = leftPad + rightPad + n*slotW;
  const H = height;
  const plotH = H - topPad - botPad;
  const maxVal = Math.max(1, ...data.flatMap(d => series.map(s => d[s.key]||0))) * 1.15;
  const yTicks = 4;
  const yScale = v => topPad + plotH - (v/maxVal)*plotH;
  const tooltipX = hoverIdx !== null ? leftPad + hoverIdx*slotW + slotW/2 : 0;
  const tooltipY = topPad;

  return (
    <div style={{ position:'relative' }}>
      <div style={{ overflowX:'auto' }}>
        <svg width={W} height={H} style={{ display:'block' }}>
          {Array.from({length:yTicks+1}, (_,i) => {
            const v = (maxVal/yTicks)*i; const y = yScale(v);
            return (
              <g key={i}>
                <line x1={leftPad} x2={W-rightPad} y1={y} y2={y} stroke="#1e293b" strokeWidth={1} />
                <text x={leftPad-8} y={y+3} textAnchor="end" fontSize={10} fill="#475569">{v>=1000?(v/1000).toFixed(1)+'k':Math.round(v)}</text>
              </g>
            );
          })}
          {data.map((d,i) => {
            const groupW = barW*series.length + barGap*(series.length-1);
            const groupX = leftPad + i*slotW + (slotW-groupW)/2;
            return (
              <g key={i} onMouseEnter={()=>setHoverIdx(i)} onMouseLeave={()=>setHoverIdx(null)}>
                <rect x={leftPad+i*slotW} y={topPad} width={slotW} height={plotH} fill={hoverIdx===i?'#ffffff08':'transparent'} rx={4} />
                {series.map((s,si) => {
                  const val = d[s.key]||0;
                  const y = yScale(val);
                  const bh = topPad+plotH-y;
                  const bx = groupX + si*(barW+barGap);
                  return <path key={s.key} d={topRoundedRectPath(bx,y,barW,bh,4)} fill={hoverIdx===i ? s.color : s.color+'cc'} style={{ transition:'fill 0.1s' }} />;
                })}
                <text x={leftPad+i*slotW+slotW/2} y={H-8} textAnchor="middle" fontSize={10} fill={hoverIdx===i?'#94a3b8':'#475569'}>{truncateLabel(categories[i])}</text>
              </g>
            );
          })}
        </svg>
      </div>
      {hoverIdx!==null && <ChartTooltip title={categories[hoverIdx]} series={series} values={data[hoverIdx]} valuePrefix={valuePrefix} x={tooltipX} y={tooltipY} />}
      <ChartLegend series={series} />
    </div>
  );
}

function LineChart({ categories, series, data, height=200, valuePrefix='$' }) {
  const [hoverIdx, setHoverIdx] = useState(null);
  const n = categories.length;
  if (n === 0) return null;
  const leftPad=46, rightPad=56, topPad=14, botPad=26;
  const plotW = Math.max(300, n*50);
  const W = leftPad+rightPad+plotW;
  const H = height;
  const plotH = H-topPad-botPad;
  const maxVal = Math.max(1, ...data.flatMap(d => series.map(s => d[s.key]||0))) * 1.15;
  const xStep = n>1 ? plotW/(n-1) : plotW;
  const xScale = i => leftPad + i*xStep;
  const yScale = v => topPad + plotH - (v/maxVal)*plotH;
  const yTicks = 4;
  const labelEvery = Math.max(1, Math.ceil(n/12));
  const tooltipX = hoverIdx !== null ? xScale(hoverIdx) : 0;
  const tooltipY = hoverIdx !== null ? Math.min(...series.map(s => yScale(data[hoverIdx][s.key]||0))) : 0;

  const handleMove = (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const scaleFactor = rect.width / W;
    const localX = (e.clientX - rect.left) / scaleFactor;
    let idx = Math.round((localX-leftPad)/xStep);
    setHoverIdx(Math.max(0, Math.min(n-1, idx)));
  };

  return (
    <div style={{ position:'relative' }}>
      <div style={{ overflowX:'auto' }}>
        <svg width={W} height={H} style={{ display:'block' }} onMouseMove={handleMove} onMouseLeave={()=>setHoverIdx(null)}>
          {Array.from({length:yTicks+1}, (_,i) => {
            const v=(maxVal/yTicks)*i; const y=yScale(v);
            return (
              <g key={i}>
                <line x1={leftPad} x2={W-rightPad} y1={y} y2={y} stroke="#1e293b" strokeWidth={1} />
                <text x={leftPad-8} y={y+3} textAnchor="end" fontSize={10} fill="#475569">{v>=1000?(v/1000).toFixed(1)+'k':Math.round(v)}</text>
              </g>
            );
          })}
          {series.map(s => {
            const pts = data.map((d,i)=>`${xScale(i)},${yScale(d[s.key]||0)}`).join(' ');
            return <polyline key={s.key} points={pts} fill="none" stroke={s.color} strokeWidth={2.5} strokeLinejoin="round" strokeLinecap="round" />;
          })}
          {series.map(s => {
            const val = data[n-1]?.[s.key]||0;
            const x = xScale(n-1), y = yScale(val);
            return (
              <g key={s.key}>
                <circle cx={x} cy={y} r={5} fill={s.color} stroke="#0f1117" strokeWidth={2} />
                <text x={x+10} y={y+4} fontSize={10} fill={s.color} fontWeight="600">{valuePrefix}{Math.round(val).toLocaleString('en-US')}</text>
              </g>
            );
          })}
          {hoverIdx!==null && <line x1={xScale(hoverIdx)} x2={xScale(hoverIdx)} y1={topPad} y2={topPad+plotH} stroke="#334155" strokeWidth={1} strokeDasharray="4,3" />}
          {hoverIdx!==null && series.map(s => (
            <circle key={s.key} cx={xScale(hoverIdx)} cy={yScale(data[hoverIdx][s.key]||0)} r={5} fill={s.color} stroke="#0f1117" strokeWidth={2} />
          ))}
          {categories.map((c,i) => (i%labelEvery===0) && (
            <text key={i} x={xScale(i)} y={H-8} textAnchor="middle" fontSize={10} fill="#475569">{c}</text>
          ))}
        </svg>
      </div>
      {hoverIdx!==null && <ChartTooltip title={categories[hoverIdx]} series={series} values={data[hoverIdx]} valuePrefix={valuePrefix} x={tooltipX} y={tooltipY} />}
      <ChartLegend series={series} />
    </div>
  );
}

// ── Summary Dashboard ─────────────────────────────────────────────────────────
function AnnualSummary({ year, setYear, months, bills }) {
  const rows = buildAnnualData(year, months, bills);
  const totalIncome   = rows.reduce((s,r)=>s+r.income,0);
  const totalExpense  = rows.reduce((s,r)=>s+r.expenseActual,0);
  const net           = totalIncome-totalExpense;
  const savingsRate   = totalIncome>0 ? (net/totalIncome*100) : 0;
  const incomeExpenseSeries = [
    { key:'income',        label:'Income',  color:'#34d399' },
    { key:'expenseActual', label:'Expense', color:'#f87171' },
  ];
  const budgetActualSeries = [
    { key:'expensePlanned', label:'Budgeted', color:'#60a5fa' },
    { key:'expenseActual',  label:'Actual',   color:'#fbbf24' },
  ];
  const labels = rows.map(r=>r.label);

  return (
    <div style={S.card}>

function ExpenseSummary({ ym, setYm, months }) {
  const rows     = categoryTotalsForMonth(ym, months);
  const prevRows = categoryTotalsForMonth(adjMonth(ym,-1), months);
  const prevSpentByCat = Object.fromEntries(prevRows.map(r=>[r.cat, r.spent]));

  const totalBudget = rows.reduce((s,r)=>s+r.budget,0);
  const totalSpent  = rows.reduce((s,r)=>s+r.spent,0);
  const variance    = totalBudget-totalSpent;
  const series = [
    { key:'budget', label:'Budgeted', color:'#60a5fa' },
    { key:'spent',  label:'Spent',    color:'#fbbf24' },
  ];
  const labels = rows.map(r=>r.cat);

  const trendRows = [];
  let cursor = ym;
  const window = [];
  for (let i=0;i<6;i++) { window.unshift(cursor); cursor = adjMonth(cursor,-1); }
  window.forEach(m => {
    const catRows = categoryTotalsForMonth(m, months);
    trendRows.push({ ym:m, label: monthLabel(m).slice(0,3), budget: catRows.reduce((s,r)=>s+r.budget,0), spent: catRows.reduce((s,r)=>s+r.spent,0) });
  });

  // MoM delta helpers
  const momDelta = (cat, spent) => {
    const prev = prevSpentByCat[cat];
    if (!prev || prev === 0) return null;
    return ((spent - prev) / prev) * 100;
  };

  return (
    <div style={S.card}>
      <SectionHeader icon="fa-bag-shopping" title="Expense Summary" accent={ACCENT.tithe}>
        <div style={{ display:'flex', alignItems:'center', gap:6 }}>
          <button onClick={()=>setYm(adjMonth(ym,-1))} style={{ ...S.btn, padding:'5px 10px' }}><i className="fa-solid fa-chevron-left" style={{ fontSize:11 }} /></button>
          <span className="section-nav-label" style={{ fontSize:13, fontWeight:600, minWidth:130, textAlign:'center' }}>{monthLabel(ym)}</span>
          <button onClick={()=>setYm(adjMonth(ym,+1))} style={{ ...S.btn, padding:'5px 10px' }}><i className="fa-solid fa-chevron-right" style={{ fontSize:11 }} /></button>
        </div>
      </SectionHeader>
      <div className="stat-row" style={{ display:'flex', gap:10, flexWrap:'wrap', marginBottom:16 }}>
        <StatCard label="Total Budgeted" value={fmt(totalBudget)} color="#60a5fa" icon="fa-sliders" />
        <StatCard label="Total Spent"    value={fmt(totalSpent)}  color="#fbbf24" icon="fa-bag-shopping" />
        <StatCard label="Variance"       value={fmtS(variance)}   color={variance>=0?'#34d399':'#f87171'} icon="fa-chart-simple" />
      </div>
      {rows.length===0
        ? <EmptyState icon="fa-sliders" message="No category budgets or spend this month." />
        : (
          <div style={{ marginBottom:22 }}>
            <div style={{ fontSize:12, color:'#94a3b8', marginBottom:8, fontWeight:600 }}>Budget vs Actual by Category</div>
            <BarChart categories={labels} series={series} data={rows} />
            {/* MoM delta table */}
            <div style={{ marginTop:14, display:'flex', flexWrap:'wrap', gap:6 }}>
              {rows.map(r => {
                const delta = momDelta(r.cat, r.spent);
                if (delta === null) return null;
                const up = delta > 0;
                const badge = Math.abs(delta) < 1 ? null : (
                  <span style={{ fontSize:11, color: up ? '#f87171' : '#34d399', background: up ? '#1c0a0a' : '#052e16', border:`1px solid ${up?'#7f1d1d':'#14532d'}`, borderRadius:6, padding:'1px 6px', whiteSpace:'nowrap' }}>
                    <i className={`fa-solid fa-arrow-${up?'up':'down'}`} style={{ fontSize:9, marginRight:3 }} />
                    {Math.abs(Math.round(delta))}% vs last mo
                  </span>
                );
                if (!badge) return null;
                return <div key={r.cat} style={{ display:'flex', alignItems:'center', gap:5 }}><span style={{ fontSize:12, color:'#94a3b8' }}>{r.cat}</span>{badge}</div>;
              })}
            </div>
          </div>
        )}
      <div>
        <div style={{ fontSize:12, color:'#94a3b8', marginBottom:8, fontWeight:600 }}>Spend Trend (last 6 months)</div>
        <LineChart categories={trendRows.map(r=>r.label)} series={series} data={trendRows} />
      </div>
    </div>
  );
}

// ── Accounts / Net Worth ─────────────────────────────────────────────────────
const ACCOUNT_TYPES = ['Checking','Savings','Investment','Cash','Other'];

function Accounts({ accounts, setAccounts, debts }) {
  const [showAdd, setShowAdd] = useState(false);
  const [newAcc, setNewAcc] = useState({ name:'', type:'Checking', balance:'' });
  const [editId, setEditId] = useState(null);
  const [editAcc, setEditAcc] = useState({});
  const [snapshotYm, setSnapshotYm] = useState(curYM());

  const addAccount = () => {
    if (!newAcc.name) return;
    setAccounts(p=>[...p,{ id:uid(), name:newAcc.name, type:newAcc.type, balance:parseFloat(newAcc.balance)||0, snapshots:{} }]);
    setNewAcc({ name:'', type:'Checking', balance:'' });
    setShowAdd(false);
  };
  const saveEdit = () => {
    setAccounts(p=>p.map(a=>a.id!==editId?a:{ ...a, name:editAcc.name, type:editAcc.type, balance:parseFloat(editAcc.balance)||0 }));
    setEditId(null);
  };
  const recordSnapshot = (id, ym, val) => {
    setAccounts(p=>p.map(a=>a.id!==id?a:{ ...a, snapshots:{ ...(a.snapshots||{}), [ym]: parseFloat(val)||0 } }));
  };
  const deleteAccount = id => setAccounts(p=>p.filter(a=>a.id!==id));

  const totalAssets = accounts.reduce((s,a)=>s+a.balance, 0);
  const totalDebt   = debts.reduce((s,d)=>s+d.balance, 0);
  const netWorth    = totalAssets - totalDebt;

  // Build net worth trend from snapshots (last 12 months)
  const trendMonths = [];
  let cur = snapshotYm;
  for (let i=0;i<12;i++) { trendMonths.unshift(cur); cur = adjMonth(cur,-1); }

  const trendData = trendMonths.map(m => {
    const assets = accounts.reduce((s,a) => s + ((a.snapshots||{})[m] ?? (m===snapshotYm ? a.balance : null)), 0);
    return { label: monthLabel(m).slice(0,3), assets: assets || 0 };
  });

  const trendSeries = [{ key:'assets', label:'Total Assets', color:'#34d399' }];

  return (
    <div>
      {/* Summary */}
      <div className="stat-row" style={{ display:'flex', gap:10, flexWrap:'wrap', marginBottom:18 }}>
        <StatCard label="Total Assets"  value={fmt(totalAssets)}       color="#34d399" icon="fa-building-columns" />
        <StatCard label="Total Debt"    value={fmt(totalDebt)}         color="#f87171" icon="fa-credit-card" />
        <StatCard label="Net Worth"     value={fmtS(netWorth)}         color={netWorth>=0?'#60a5fa':'#f87171'} icon="fa-scale-balanced" />
      </div>

      {/* Account list */}
      <div style={S.card}>
        <SectionHeader icon="fa-building-columns" title="Accounts" accent={ACCENT.accounts}>
          <PrimaryBtn onClick={()=>setShowAdd(v=>!v)}>+ Add</PrimaryBtn>
        </SectionHeader>
        {showAdd && (
          <div style={{ display:'flex', gap:10, flexWrap:'wrap', marginBottom:14, padding:12, background:'#0f1117', borderRadius:8, alignItems:'flex-end' }}>
            <div style={{ flex:2 }}><label style={S.lbl}>Account Name</label><input style={S.input} value={newAcc.name} onChange={e=>setNewAcc(f=>({...f,name:e.target.value}))} placeholder="e.g. Chase Checking" /></div>
            <div>
              <label style={S.lbl}>Type</label>
              <select style={S.input} value={newAcc.type} onChange={e=>setNewAcc(f=>({...f,type:e.target.value}))}>
                {ACCOUNT_TYPES.map(t=><option key={t}>{t}</option>)}
              </select>
            </div>
            <div><label style={S.lbl}>Current Balance</label><input type="number" step="0.01" style={S.input} value={newAcc.balance} onChange={e=>setNewAcc(f=>({...f,balance:e.target.value}))} placeholder="0.00" /></div>
            <div style={{ display:'flex', gap:6 }}>
              <PrimaryBtn onClick={addAccount}>Save</PrimaryBtn>
              <button style={S.btn} onClick={()=>setShowAdd(false)}>Cancel</button>
            </div>
          </div>
        )}
        <table className="acct-table" style={{ width:'100%', borderCollapse:'collapse' }}>
          <thead><tr>{['Account','Type','Balance','Actions'].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
          <tbody>
            {accounts.map(a => {
              const isEditing = editId===a.id;
              return (
                <tr key={a.id} style={{ borderBottom:'1px solid #0f1117', background:isEditing?'#0f1117':'transparent' }}>
                  {isEditing ? (
                    <>
                      <td style={S.td}><input style={{ ...S.input, fontSize:12, padding:'4px 8px' }} value={editAcc.name} onChange={e=>setEditAcc(f=>({...f,name:e.target.value}))} /></td>
                      <td style={S.td}>
                        <select style={{ ...S.input, fontSize:12, padding:'4px 8px' }} value={editAcc.type} onChange={e=>setEditAcc(f=>({...f,type:e.target.value}))}>
                          {ACCOUNT_TYPES.map(t=><option key={t}>{t}</option>)}
                        </select>
                      </td>
                      <td style={S.td}><input type="number" step="0.01" style={{ ...S.input, fontSize:12, padding:'4px 8px', width:130 }} value={editAcc.balance} onChange={e=>setEditAcc(f=>({...f,balance:e.target.value}))} /></td>
                      <td style={{ ...S.td, whiteSpace:'nowrap' }}>
                        <PrimaryBtn onClick={saveEdit} style={{ padding:'4px 10px', fontSize:12, marginRight:4 }}>Save</PrimaryBtn>
                        <button onClick={()=>setEditId(null)} style={{ ...S.btn, padding:'4px 10px', fontSize:12 }}>Cancel</button>
                      </td>
                    </>
                  ) : (
                    <>
                      <td style={{ ...S.td, fontWeight:600 }}>{a.name}</td>
                      <td style={{ ...S.td, color:'#94a3b8', fontSize:12 }}>
                        <span style={{ padding:'2px 8px', borderRadius:10, background:'#0f1117', border:'1px solid #1e293b' }}>{a.type}</span>
                      </td>
                      <td style={{ ...S.td, color:'#34d399', fontWeight:700, fontSize:15 }}>{fmt(a.balance)}</td>
                      <td style={{ ...S.td, whiteSpace:'nowrap' }}>
                        <button onClick={()=>{ setEditId(a.id); setEditAcc({ name:a.name, type:a.type, balance:String(a.balance) }); }} style={{ ...S.btn, padding:'3px 9px', fontSize:12, color:'#60a5fa', marginRight:4 }}>Edit</button>
                        <DelBtn onDelete={()=>deleteAccount(a.id)} title="Delete account" />
                      </td>
                    </>
                  )}

              );
            })}
          </tbody>
        </table>
        {accounts.length === 0 && <EmptyState icon="fa-building-columns" message="No accounts added yet." action={<PrimaryBtn onClick={()=>setShowAdd(true)}>+ Add Account</PrimaryBtn>} />}
      </div>

      {/* Monthly snapshot recorder */}
      {accounts.length > 0 && (
        <div style={S.card}>
          <SectionHeader icon="fa-camera" title="Monthly Snapshots" accent={ACCENT.accounts}>
            <div style={{ display:'flex', alignItems:'center', gap:6 }}>
              <button onClick={()=>setSnapshotYm(adjMonth(snapshotYm,-1))} style={{ ...S.btn, padding:'5px 10px' }}><i className="fa-solid fa-chevron-left" style={{ fontSize:11 }} /></button>
              <span className="section-nav-label" style={{ fontSize:13, fontWeight:600, minWidth:130, textAlign:'center' }}>{monthLabel(snapshotYm)}</span>
              <button onClick={()=>setSnapshotYm(adjMonth(snapshotYm,+1))} style={{ ...S.btn, padding:'5px 10px' }}><i className="fa-solid fa-chevron-right" style={{ fontSize:11 }} /></button>
            </div>
          </SectionHeader>
          <p style={{ fontSize:12, color:'#475569', marginBottom:12 }}>Record end-of-month balances to build a net worth trend over time.</p>
          {accounts.map(a => {
            const snap = (a.snapshots||{})[snapshotYm];
            return (
              <div key={a.id} style={{ display:'flex', alignItems:'center', gap:10, marginBottom:8 }}>
                <span style={{ flex:1, fontSize:13 }}>{a.name}</span>
                <span style={{ fontSize:11, color:'#475569', minWidth:70 }}>{a.type}</span>
                <input type="number" step="0.01" placeholder={fmt(a.balance)}
                  value={snap !== undefined ? snap : ''}
                  onChange={e=>recordSnapshot(a.id, snapshotYm, e.target.value)}
                  style={{ ...S.input, width:140, textAlign:'right', fontSize:13 }} />
              </div>
            );
          })}
          <div style={{ marginTop:10, textAlign:'right', fontSize:12, color:'#475569' }}>
            Snapshot total: <span style={{ color:'#34d399', fontWeight:600 }}>{fmt(accounts.reduce((s,a)=>s+((a.snapshots||{})[snapshotYm]??0),0))}</span>
          </div>
        </div>
      )}

      {/* Net worth trend chart */}
      {accounts.length > 0 && (
        <div style={S.card}>
          <SectionHeader icon="fa-chart-line" title="Asset Trend (12 months)" accent={ACCENT.accounts} />
          <LineChart categories={trendData.map(r=>r.label)} series={trendSeries} data={trendData} />
        </div>
      )}
    </div>
  );
}

// ── Calendar Tab ──────────────────────────────────────────────────────────────
function CalendarTab({ income, bills, sched }) {
  const [ym, setYm] = useState(curYM());
  const [y, m] = ym.split('-').map(Number);
  const todayStr = today();

  // Build a map: day -> array of events { label, color, type }
  const events = {};
  const addEvent = (day, ev) => {
    if (day < 1 || day > 31) return;
    if (!events[day]) events[day] = [];
    events[day].push(ev);
  };

  // Biweekly paydays from anchor
  if (sched.anchorDate) {
    const payDates = getPayDatesInMonth(sched.anchorDate, ym);
    payDates.forEach(d => {
      addEvent(d.getDate(), { label: 'Payday', color: '#34d399', type: 'income' });
    });
  }

  // Income sources
  income.forEach(src => {
    if (src.frequency === 'bimonthly') {
      const daysInMonth = new Date(y, m, 0).getDate();
      const d1 = Math.min(src.day1 || 1, daysInMonth);
      const d2 = Math.min(src.day2 || 15, daysInMonth);
      addEvent(d1, { label: src.name, color: '#34d399', type: 'income' });
      addEvent(d2, { label: src.name, color: '#34d399', type: 'income' });
    } else if (src.frequency === 'monthly') {
      // monthly income on the 1st by default (or if they have a dueDay-equivalent, use it)
      addEvent(1, { label: src.name, color: '#34d399', type: 'income' });
    }
  });

  // Bills by due day
  bills.forEach(b => {
    if (b.dueDay) {
      const daysInMonth = new Date(y, m, 0).getDate();
      if (b.dueDay <= daysInMonth) {
        addEvent(b.dueDay, { label: b.name, color: '#f87171', type: 'bill', amount: b.amount });
      }
    }
  });

  // Build calendar grid
  const firstDow = new Date(y, m - 1, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(y, m, 0).getDate();
  const cells = [];
  for (let i = 0; i < firstDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  return (
    <div>
      {/* Month nav */}
      <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:18 }}>
        <button onClick={()=>setYm(adjMonth(ym,-1))} style={{ ...S.btn, padding:'5px 10px' }}><i className="fa-solid fa-chevron-left" style={{ fontSize:11 }} /></button>
        <span style={{ fontSize:16, fontWeight:700, minWidth:180, textAlign:'center' }}>{monthLabel(ym)}</span>
        <button onClick={()=>setYm(adjMonth(ym,+1))} style={{ ...S.btn, padding:'5px 10px' }}><i className="fa-solid fa-chevron-right" style={{ fontSize:11 }} /></button>
        <button onClick={()=>setYm(curYM())} style={{ ...S.btn, fontSize:12, color:'#60a5fa', padding:'5px 11px' }}>Today</button>
      </div>

      {/* Legend */}
      <div style={{ display:'flex', gap:16, marginBottom:14, flexWrap:'wrap' }}>
        <div style={{ display:'flex', alignItems:'center', gap:5 }}><i className="fa-solid fa-hand-holding-dollar" style={{ fontSize:12, color:'#34d399' }} /><span style={{ fontSize:12, color:'#94a3b8' }}>Income</span></div>
        <div style={{ display:'flex', alignItems:'center', gap:5 }}><i className="fa-solid fa-file-invoice-dollar" style={{ fontSize:12, color:'#f87171' }} /><span style={{ fontSize:12, color:'#94a3b8' }}>Bill due</span></div>
      </div>

      {/* Grid */}
      <div style={{ background:'#1e293b', borderRadius:12, overflow:'hidden' }}>
        {/* Day-of-week headers */}
        <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', borderBottom:'1px solid #0f1117' }}>
          {DOW.map(d=>(
            <div key={d} style={{ padding:'8px 0', textAlign:'center', fontSize:11, color:'#475569', textTransform:'uppercase', letterSpacing:'0.05em' }}>{d}</div>
          ))}
        </div>
        {/* Weeks */}
        {Array.from({length: cells.length/7}, (_,wi) => (
          <div key={wi} style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', borderBottom: wi < cells.length/7-1 ? '1px solid #0f1117' : 'none' }}>
            {cells.slice(wi*7, wi*7+7).map((day, di) => {
              const dateStr = day ? `${ym}-${String(day).padStart(2,'0')}` : null;
              const isToday = dateStr === todayStr;
              const dayEvents = day ? (events[day] || []) : [];
              return (
                <div key={di} className="cal-day-cell" style={{
                  minHeight: 90,
                  padding: '6px 7px',
                  background: isToday ? '#1d4ed820' : 'transparent',
                  borderLeft: di > 0 ? '1px solid #0f1117' : 'none',
                  verticalAlign: 'top',
                }}>
                  {day && (
                    <>
                      <div style={{
                        width: 24, height: 24, borderRadius: '50%',
                        background: isToday ? '#3b82f6' : 'transparent',
                        color: isToday ? '#fff' : '#94a3b8',
                        fontSize: 12, fontWeight: isToday ? 700 : 400,
                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                        marginBottom: 4,
                      }}>{day}</div>
                      <div style={{ display:'flex', flexDirection:'column', gap:2 }}>
                        {dayEvents.map((ev, ei) => (
                          <div key={ei} style={{
                            background: ev.color + '22',
                            border: `1px solid ${ev.color}44`,
                            borderRadius: 4,
                            padding: '1px 5px',
                            fontSize: 10,
                            color: ev.color,
                            overflow: 'hidden',
                            textOverflow: 'ellipsis',
                            whiteSpace: 'nowrap',
                            display: 'flex',
                            alignItems: 'center',
                            gap: 3,
                          }} title={ev.amount ? `${ev.label} — ${fmt(ev.amount)}` : ev.label}>
                            <i className={`fa-solid ${ev.type==='income' ? 'fa-hand-holding-dollar' : 'fa-file-invoice-dollar'}`} style={{ fontSize:8, flexShrink:0 }} />
                            {ev.label}{ev.amount ? ` ${fmt(ev.amount)}` : ''}
                          </div>
                        ))}
                      </div>
                    </>
                  )}
                </div>
              );
            })}
          </div>
        ))}
      </div>

      {/* Upcoming list view */}
      <div style={{ ...S.card, marginTop:18 }}>
        <SectionHeader icon="fa-list-check" title="This Month at a Glance" accent={ACCENT.budget} />
        {(() => {
          const allEvents = [];
          for (const [dayStr, evs] of Object.entries(events)) {
            evs.forEach(ev => allEvents.push({ day: +dayStr, ...ev }));
          }
          allEvents.sort((a,b) => a.day - b.day);
          if (!allEvents.length) return <div style={{ color:'#334155', fontSize:13 }}>No income or bills configured.</div>;
          return allEvents.map((ev, i) => (
            <div key={i} style={{ ...S.row }}>
              <span style={{ fontSize:12, color:'#475569', minWidth:50 }}>{ordinal(ev.day)}</span>
              <i className={`fa-solid ${ev.type==='income' ? 'fa-hand-holding-dollar' : 'fa-file-invoice-dollar'}`} style={{ fontSize:12, color:ev.color, flexShrink:0 }} />
              <span style={{ flex:1, fontSize:13 }}>{ev.label}</span>
              <span style={{ fontSize:12, color:ev.color, fontWeight:600 }}>
                {ev.type==='income' ? '+ income' : ev.amount ? fmt(ev.amount) : ''}
              </span>
            </div>
          ));
        })()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
